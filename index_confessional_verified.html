============================================================ */
const SECTION_FIELDS = {
  quotations:   ['title','quote','author','source','page','tags','notes'],
  confessional: ['title','text','confession','chapter','tags','notes'],
  books:        ['title','author','link','tags','notes'],
  websites:     ['title','url','description','tags'],
  scripture:    ['title','reference','verseText','verseType','tags','notes'],
  arguments:    ['title','position','claim','supportingScripture','objections','responses','tags','notes'],
  notes:        ['title','content','tags'],
  media:        ['title','fileRef','description','tags'],
};

function buildFormHtml(secId, existing) {
  const ev = existing || {};
  const field = (id, label, type='input', opts=[]) => {
    const v = ev[id] || '';
    const lbl = `<label class="form-label">${label}</label>`;
    if (type === 'textarea') return `<div class="form-group">${lbl}<textarea class="form-textarea" id="f_${id}" placeholder="${label}">${escHtml(v)}</textarea></div>`;
    if (type === 'select')   return `<div class="form-group">${lbl}<select class="form-select" id="f_${id}">${opts.map(o=>`<option value="${o}"${v===o?' selected':''}>${o}</option>`).join('')}</select></div>`;
    if (type === 'tags')     return buildTagInputHtml(id, Array.isArray(v)?v:(v?v.split(',').map(t=>t.trim()).filter(Boolean):[]));
    return `<div class="form-group">${lbl}<input class="form-input" id="f_${id}" type="text" placeholder="${label}" value="${escHtml(v)}"></div>`;
  };
  let html = '';
  if (secId === 'quotations')   html = field('title','Title') + field('quote','Quote Text','textarea') + `<div class="form-row">` + field('author','Author') + field('source','Source (Book)') + `</div>` + field('page','Page Number') + field('tags','Tags','tags') + field('notes','Notes','textarea');
  else if (secId === 'confessional') html = field('title','Title') + field('text','Text','textarea') + `<div class="form-row">` + field('confession','Confession Name') + field('chapter','Chapter / Section') + `</div>` + field('proofs','Scripture Proofs','textarea') + field('tags','Tags','tags') + field('notes','Notes','textarea');
  else if (secId === 'books')        html = field('title','Title') + field('author','Author') + field('link','URL / Link') + field('tags','Tags','tags') + field('notes','Notes','textarea');
  else if (secId === 'websites')     html = field('title','Title') + field('url','URL') + field('description','Description','textarea') + field('tags','Tags','tags');
  else if (secId === 'scripture')    html = field('title','Label / Title') + `<div class="form-row">` + field('reference','Reference (e.g. Rom 5:1)') + field('verseType','Type','select',['proof','typological','disputed']) + `</div>` + field('verseText','Verse Text','textarea') + field('tags','Tags','tags') + field('notes','Notes','textarea');
  else if (secId === 'arguments')    html = field('title','Title') + field('position','Position') + field('claim','Claim','textarea') + field('supportingScripture','Supporting Scripture') + field('objections','Objections','textarea') + field('responses','Responses','textarea') + field('tags','Tags','tags');
  else if (secId === 'notes')        html = field('title','Title') + field('content','Content','textarea') + field('tags','Tags','tags');
  else if (secId === 'media')        html = field('title','Title') + buildFileUploadHtml(ev) + field('fileRef','File Reference / URL (optional)') + field('description','Description','textarea') + field('tags','Tags','tags');
  return html;
}

/* ============================================================
   FILE UPLOAD
============================================================ */
function buildFileUploadHtml(existing) {
  // Reset pending file state
  window._pendingFileDataURL = (existing && existing.fileDataURL) || '';
  window._pendingFileName = (existing && existing.fileName) || '';
  const existingPreview = (existing && existing.fileDataURL)
    ? `<div class="file-preview-row" id="file-preview-row">
        <img class="file-preview-img" src="${escAttr(existing.fileDataURL)}" alt="${escHtml(existing.fileName||'')}">
        <div class="file-preview-info">
          <div class="file-preview-name">${escHtml(existing.fileName||'Attached file')}</div>
        </div>
        <button class="file-preview-remove" onclick="clearFileUpload()">✕</button>
      </div>`
    : '<div id="file-preview-row"></div>';
  return `<div class="form-group">
    <label class="form-label">Image / File Upload</label>
    <div class="file-upload-zone" id="file-drop-zone"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="handleFileDrop(event)"
      onclick="document.getElementById('f_file_input').click()">
      <input type="file" id="f_file_input" accept="image/*,.pdf,.txt" style="display:none" onchange="handleFileSelect(this)">
      Drop image/file here or <strong>click to browse</strong>
    </div>
    ${existingPreview}
  </div>`;
}

function handleFileSelect(input) {
  if (input.files && input.files[0]) processUploadedFile(input.files[0]);
}
function handleFileDrop(event) {
  event.preventDefault();
  document.getElementById('file-drop-zone')?.classList.remove('dragover');
  const file = event.dataTransfer.files[0];
  if (file) processUploadedFile(file);
}
function processUploadedFile(file) {
  if (file.size > 5 * 1024 * 1024) { alert('File too large — max 5 MB.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    window._pendingFileDataURL = e.target.result;
    window._pendingFileName = file.name;
    const isImage = file.type.startsWith('image/');
    const row = document.getElementById('file-preview-row');
    if (row) row.innerHTML = `<div class="file-preview-row">
      ${isImage ? `<img class="file-preview-img" src="${e.target.result}" alt="${escHtml(file.name)}">` : '<span style="font-size:24px;">📄</span>'}
      <div class="file-preview-info">
        <div class="file-preview-name">${escHtml(file.name)}</div>
        <div class="file-preview-size">${(file.size/1024).toFixed(1)} KB</div>
      </div>
      <button class="file-preview-remove" onclick="clearFileUpload()">✕</button>
    </div>`;
  };
  reader.readAsDataURL(file);
}
function clearFileUpload() {
  window._pendingFileDataURL = '';
  window._pendingFileName = '';
  const row = document.getElementById('file-preview-row');
  if (row) row.innerHTML = '';
  const inp = document.getElementById('f_file_input');
  if (inp) inp.value = '';
}

/* ============================================================
   TAG INPUT WIDGET
============================================================ */
function buildTagInputHtml(fieldId, existingTags) {
  const tagsJson = JSON.stringify(existingTags).replace(/"/g,'&quot;');
  return `<div class="form-group">
    <label class="form-label">Tags</label>
    <div class="tag-input-container" id="tic_${fieldId}">
      <div class="tag-input-wrap" id="tiw_${fieldId}" onclick="focusTagInput('${fieldId}')">
        ${existingTags.map(t => `<span class="tag-pill" data-tag="${escAttr(t)}">${escHtml(t)}<button class="tag-pill-remove" onclick="removeTag('${fieldId}','${escAttr(t)}')">×</button></span>`).join('')}
        <input class="tag-text-input" id="f_tags_${fieldId}" placeholder="Type or pick a tag…"
          oninput="showTagDropdown('${fieldId}',this.value)"
          onkeydown="tagKeyDown(event,'${fieldId}')"
          onfocus="showTagDropdown('${fieldId}',this.value)"
        >
      </div>
      <div class="tag-dropdown" id="tdd_${fieldId}" style="display:none;"></div>
    </div>
    <input type="hidden" id="f_tags" data-tags-for="${fieldId}">
  </div>`;
}

function focusTagInput(fieldId) { document.getElementById('f_tags_'+fieldId)?.focus(); }

function showTagDropdown(fieldId, query) {
  const dd = document.getElementById('tdd_'+fieldId);
  if (!dd) return;
  const existing = getTagsFromWidget(fieldId);
  const ql = query.toLowerCase();
  const allT = [...new Set([...DEFAULT_TAGS, ...allTags()])].sort();
  const filtered = allT.filter(t => !existing.includes(t) && t.toLowerCase().includes(ql));
  if (!filtered.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = filtered.map(t => `<div class="tag-dropdown-item" onmousedown="addTagFromDropdown('${fieldId}','${escAttr(t)}')">${escHtml(t)}</div>`).join('');
  dd.style.display = 'block';
}

function addTagFromDropdown(fieldId, tag) {
  addTagToWidget(fieldId, tag);
  const inp = document.getElementById('f_tags_'+fieldId);
  if (inp) inp.value = '';
  const dd = document.getElementById('tdd_'+fieldId);
  if (dd) dd.style.display = 'none';
  // re-show dropdown for next pick
  setTimeout(() => { if (inp) { inp.focus(); showTagDropdown(fieldId, ''); } }, 50);
}

function addTagToWidget(fieldId, tag) {
  tag = tag.trim();
  if (!tag) return;
  const existing = getTagsFromWidget(fieldId);
  if (existing.includes(tag)) return;
  const wrap = document.getElementById('tiw_'+fieldId);
  if (!wrap) return;
  const inp = document.getElementById('f_tags_'+fieldId);
  const pill = document.createElement('span');
  pill.className = 'tag-pill';
  pill.dataset.tag = tag;
  pill.innerHTML = `${escHtml(tag)}<button class="tag-pill-remove" onclick="removeTag('${fieldId}','${escAttr(tag)}')">×</button>`;
  wrap.insertBefore(pill, inp);
}

function removeTag(fieldId, tag) {
  const wrap = document.getElementById('tiw_'+fieldId);
  if (!wrap) return;
  const pills = wrap.querySelectorAll('.tag-pill[data-tag]');
  pills.forEach(p => { if (p.dataset.tag === tag) p.remove(); });
}

function tagKeyDown(e, fieldId) {
  const inp = document.getElementById('f_tags_'+fieldId);
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = inp.value.trim().replace(/,/g,'');
    if (val) { addTagToWidget(fieldId, val); inp.value = ''; showTagDropdown(fieldId,''); }
  } else if (e.key === 'Escape') {
    const dd = document.getElementById('tdd_'+fieldId);
    if (dd) dd.style.display = 'none';
  }
}

function getTagsFromWidget(fieldId) {
  const wrap = document.getElementById('tiw_'+fieldId);
  if (!wrap) return [];
  return [...wrap.querySelectorAll('.tag-pill[data-tag]')].map(p => p.dataset.tag);
}

// Hide dropdowns when clicking outside
document.addEventListener('click', e => {
  document.querySelectorAll('.tag-dropdown').forEach(dd => {
    if (!dd.closest('.tag-input-container')?.contains(e.target)) dd.style.display = 'none';
  });
});

/* ============================================================
   GATHER FORM DATA
============================================================ */
function gatherFormData(secId) {
  const get = id => { const el = document.getElementById('f_'+id); return el ? el.value.trim() : ''; };
  // Tags can come from widget or legacy text input
  let tags = [];
  const tagWidgetWrap = document.querySelector('.tag-input-wrap');
  if (tagWidgetWrap) {
    // find the fieldId from the wrap's id: "tiw_tags"
    const fieldId = tagWidgetWrap.id.replace('tiw_','');
    tags = getTagsFromWidget(fieldId);
  } else {
    tags = get('tags').split(',').map(t=>t.trim()).filter(Boolean);
  }
  const base = { title: get('title'), tags };
  if (secId === 'quotations')   return {...base, quote: get('quote'), author: get('author'), source: get('source'), page: get('page'), notes: get('notes') };
  if (secId === 'confessional') return {...base, text: get('text'), confession: get('confession'), chapter: get('chapter'), proofs: get('proofs'), notes: get('notes') };
  if (secId === 'books')        return {...base, author: get('author'), link: get('link'), notes: get('notes') };
  if (secId === 'websites')     return {...base, url: get('url'), description: get('description') };
  if (secId === 'scripture')    return {...base, reference: get('reference'), verseText: get('verseText'), verseType: get('verseType'), notes: get('notes') };
  if (secId === 'arguments')    return {...base, position: get('position'), claim: get('claim'), supportingScripture: get('supportingScripture'), objections: get('objections'), responses: get('responses') };
  if (secId === 'notes')        return {...base, content: get('content') };
  if (secId === 'media')        return {...base, fileRef: get('fileRef'), description: get('description'), fileDataURL: window._pendingFileDataURL||'', fileName: window._pendingFileName||'' };
  return base;
}

function hasDuplicateTitle(subtopicKey, sectionId, title, ignoreId) {
  const norm = String(title || '').trim().toLowerCase();
  if (!norm) return false;
  return getEntries(subtopicKey, sectionId).some(e =>
    e.id !== ignoreId && String(e.title || '').trim().toLowerCase() === norm
  );
}
function confirmDuplicateIfNeeded(subtopicKey, sectionId, data, ignoreId) {
  if (!data?.title) return true;
  if (!hasDuplicateTitle(subtopicKey, sectionId, data.title, ignoreId)) return true;
  return confirm('An entry with this title already exists in this section for this subtopic. Save it anyway?');
}

============================================================ */
function openAddModal(secId) {
  const sec = SECTIONS.find(s => s.id === secId);
  modalState = { mode:'add', subtopicKey: currentSubtopicKey, sectionId: secId };
  document.getElementById('modal-title').textContent = `Add ${sec.name}`;
  document.getElementById('modal-body').innerHTML = buildFormHtml(secId, null);
  document.getElementById('modal-overlay').classList.add('open');
  focusFirstModalInput();
}

function openEditModal(secId, entryId, stKey) {
  const key = stKey || currentSubtopicKey;
  const entries = getEntries(key, secId);
  const entry = entries.find(e => e.id === entryId);
  if (!entry) return;
  const sec = SECTIONS.find(s => s.id === secId);
  modalState = { mode:'edit', subtopicKey: key, sectionId: secId, entryId };
  // Pre-load file state for media entries
  window._pendingFileDataURL = entry.fileDataURL || '';
  window._pendingFileName = entry.fileName || '';
  document.getElementById('modal-title').textContent = `Edit ${sec.name}`;
  document.getElementById('modal-body').innerHTML = buildFormHtml(secId, entry);
  document.getElementById('modal-overlay').classList.add('open');
  focusFirstModalInput();
}

function saveModalEntry() {
  if (!modalState) return;

  if (modalState.mode === 'addNode') { saveAddNode(); return; }

  if (modalState.mode === 'quickAdd') {
    if (!addDestLocusId || !addDestTopicId || !addDestStName) {
      // Open the picker for the user to choose
      document.getElementById('qa-dest-picker')?.classList.add('open');
      document.getElementById('qa-dest-search-input')?.focus();
      return;
    }
    const secId = document.getElementById('qa_section')?.value;
    if (!secId) return;
    const key = subtopicKey(addDestLocusId, addDestTopicId, addDestStName);
    const data = gatherFormData(secId);
    if (!confirmDuplicateIfNeeded(key, secId, data)) return;
    addEntry(key, secId, data);
    saveRecentDest(addDestLocusId, addDestTopicId, addDestStName);
    closeModal();
    updateStats();
    if (currentSubtopicKey === key) renderSubtopicView();
    if (currentTab === 'tags') _buildTagView();
    if (currentTab === 'resource') _buildResourceView();
    return;
  }

  const data = gatherFormData(modalState.sectionId);
  if (!confirmDuplicateIfNeeded(modalState.subtopicKey, modalState.sectionId, data, modalState.entryId)) return;
  if (modalState.mode === 'add') {
    addEntry(modalState.subtopicKey, modalState.sectionId, data);
  } else {
    updateEntry(modalState.subtopicKey, modalState.sectionId, modalState.entryId, data);
  }
  closeModal();
  if (currentSubtopicKey === modalState.subtopicKey) renderSubtopicView();
  if (currentTab === 'tags') _buildTagView();
  if (currentTab === 'resource') _buildResourceView();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalState = null;
  window._pendingFileDataURL = '';
  window._pendingFileName = '';
}
function closeModalOnOverlay(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function focusFirstModalField() {
  const target = document.querySelector('#modal-body input:not([type="hidden"]), #modal-body textarea, #modal-body select');
  if (target) setTimeout(() => target.focus(), 50);

document.addEventListener('keydown', e => {

/* ============================================================
   GLOBAL SEARCH
============================================================ */
let searchTimeout;
function handleGlobalSearch(q) {
  clearTimeout(searchTimeout);
  if (!q.trim()) { if (currentSubtopicKey) showSubtopicView(); else showWelcome(); return; }
  searchTimeout = setTimeout(() => performSearch(q.trim()), 250);
}

function performSearch(q) {
  hideAllViews();
  const ql = q.toLowerCase();
  const results = [];
  allEntries().forEach(({stKey, secId, entry}) => {
    const text = JSON.stringify(entry).toLowerCase();
    if (text.includes(ql)) {
      const parts = stKey.split('__');
      const locus = getFullTree().find(l => l.id === parts[0]);
      const topic  = locus?.topics.find(t => t.id === parts[1]);
      const stName = parts[2]?.replace(/_/g,' ');
      results.push({ stKey, secId, entry, locusName: locus?.name||parts[0], topicName: topic?.name||parts[1], stName });
    }
  });
  const sec = document.getElementById('search-results');
  sec.style.display = 'block';
  if (!results.length) {
    sec.innerHTML = `<h2>Search: "${escHtml(q)}"</h2><div class="empty-state">No results found.</div>`;
    return;
  }
  sec.innerHTML = `<h2>Search: "${escHtml(q)}" &nbsp;<span style="color:var(--text3);font-size:13px;">${results.length} result${results.length!==1?'s':''}</span></h2>` +
    results.map(r => {
      const snippet = JSON.stringify(r.entry).replace(/["{}\[\]]/g,' ').substring(0,120);
      return `<div class="search-result-item" onclick="goToEntry('${escAttr(r.stKey)}','${escAttr(r.locusName)}','${escAttr(r.topicName)}','${escAttr(r.stName||'')}')">
        <div class="sr-path">${escHtml(r.locusName)} › ${escHtml(r.topicName)} › ${escHtml(r.stName||'')} › ${escHtml(r.secId)}</div>
        <div class="sr-title">${escHtml(r.entry.title||'(untitled)')}</div>
        <div class="sr-snippet">${escHtml(snippet)}…</div>
      </div>`;
    }).join('');
  document.getElementById('breadcrumb').innerHTML = `<span class="bc-item current">Search: ${escHtml(q)}</span>`;
}

function goToEntry(stKey, locusName, topicName, stName) {
  const parts = stKey.split('__');
  selectSubtopic(parts[0], parts[1], stName.replace(/_/g,' '), locusName, topicName);
}

    el.innerHTML = `<h2>Recently Added</h2>` + all.map(({stKey, secId, entry}) => {
      const parts = stKey.split('__');
      const locus = getFullTree().find(l=>l.id===parts[0]);
      const topic = locus?.topics.find(t=>t.id===parts[1]);
      const stName = parts[2]?.replace(/_/g,' ');
      return `<div class="search-result-item" onclick="goToEntry('${escAttr(stKey)}','${escAttr(locus?.name||'')}','${escAttr(topic?.name||'')}','${escAttr(stName||'')}')">
        <div class="sr-path">${escHtml(locus?.name||'')} › ${escHtml(topic?.name||'')} › ${escHtml(stName||'')} › ${escHtml(secId)}</div>

    const el = document.getElementById('compare-view');
    el.style.display = 'flex';
    const opts = [];
    getFullTree().forEach(l => l.topics.forEach(t => t.subtopics.forEach(st => {
      const k = subtopicKey(l.id, t.id, st);
      opts.push(`<option value="${escAttr(k)}|${escAttr(l.name)}|${escAttr(t.name)}|${escAttr(st)}">${escHtml(l.name)} › ${escHtml(t.name)} › ${escHtml(st)}</option>`);

    el.innerHTML = `<h2>Compare Subtopics</h2>

      <select class="form-select" id="cmp-left" style="flex:1;">${opts.join('')}</select>
      <select class="form-select" id="cmp-right" style="flex:1;">${opts.join('')}</select>

    </div>
    <div class="compare-columns" id="cmp-cols"><div class="empty-state" style="flex:1;">Select two subtopics and click Compare.</div></div>`;
  }
}

function renderCompare() {
  const lv = document.getElementById('cmp-left').value;
  const rv = document.getElementById('cmp-right').value;
  const parse = v => { const [key,ln,tn,st] = v.split('|'); return {key,ln,tn,st}; };
  const L = parse(lv), R = parse(rv);
  const col = (side) => `<div class="compare-col">
    <div class="compare-col-header">${escHtml(side.ln)} › ${escHtml(side.st)}</div>
    ${SECTIONS.map(s => {
      const entries = getEntries(side.key, s.id);
      return `<div class="section-block" style="margin-bottom:10px;">
        <div class="section-header" style="cursor:default;">
          <span class="section-icon">${s.icon}</span><span class="section-name">${s.name}</span><span class="section-count">${entries.length}</span>
        </div>
        ${entries.length ? `<div class="section-body">${entries.map(e=>renderEntryCard(e,s.id,side.key)).join('')}</div>` : ''}
      </div>`;
    }).join('')}
  </div>`;
  document.getElementById('cmp-cols').innerHTML = col(L) + col(R);
}

/* ============================================================
   IMPORT / EXPORT
============================================================ */
function exportData() {
  const payload = {
    version: 2,
    exportedAt: new Date().toISOString(),
    db: DB,
    tree: TREE
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `5-solas-archive-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);

      if (imported && typeof imported === 'object' && imported.db) {
        DB = imported.db || {};
        TREE = Array.isArray(imported.tree) && imported.tree.length ? imported.tree : cloneDefaultTree();
      } else {
        // legacy DB-only import
        DB = {...DB, ...imported};
      }

      saveData(DB);
      saveTreeSnapshot();
      renderTree();

      if (currentTab === 'tags') renderTagView();
      else if (currentTab === 'resource') renderResourceView();
      else if (currentSubtopicKey) renderSubtopicView();
      else showWelcome();

      updateStats();
      alert('Import successful!');
    } catch(err) { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escHtmlWithBreaks(s) { return escHtml(s).replace(/\n/g, '<br>'); }
function escAttr(s) { if (!s) return ''; return String(s).replace(/`/g,'\\`').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function timeAgo(ts) {
  const diff = Date.now() - ts;
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 30) return days + ' days ago';
  const months = Math.floor(days / 30);
  if (months === 1) return '1 month ago';
  if (months < 12) return months + ' months ago';
  return Math.floor(months / 12) + ' year' + (Math.floor(months/12) > 1 ? 's' : '') + ' ago';
}

/* ============================================================
   PULL-TO-REFRESH (mobile)
============================================================ */
(function() {
  var startY = 0, currentDist = 0, active = false;
  var threshold = 70;

  function ca()   { return document.getElementById('content-area'); }
  function ind()  { return document.getElementById('ptr-indicator'); }
  function icon() { return document.getElementById('ptr-icon'); }
  function txt()  { return document.getElementById('ptr-text'); }

  document.addEventListener('touchstart', function(e) {
    var el = ca();
    if (el && el.scrollTop === 0 && el.contains(e.target)) {
      startY = e.touches[0].clientY;
      active = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!active) return;
    var el = ca();
    if (!el || el.scrollTop > 0) { active = false; return; }
    var dist = e.touches[0].clientY - startY;
    if (dist <= 0) return;
    e.preventDefault();
    currentDist = dist;
    var h = Math.min(dist * 0.6, 56);
    ind().style.height = h + 'px';
    var ready = dist >= threshold;
    icon().style.transform = ready ? 'rotate(180deg)' : 'rotate(0deg)';
    txt().textContent = ready ? 'Release to refresh' : 'Pull to refresh';
  }, { passive: false });

  document.addEventListener('touchend', function() {
    if (!active) return;
    active = false;
    var wasReady = currentDist >= threshold;
    currentDist = 0;
    ind().style.height = '0';
    icon().style.transform = 'rotate(0deg)';
    txt().textContent = 'Pull to refresh';
    if (wasReady) window.location.reload();
  }, { passive: true });
})();

function seedDefaultConfessionalEntries() {
  const versionKey = '5sa_confessional_seed_v3';
  if (localStorage.getItem(versionKey) === '1') return;
  let changed = false;
  DEFAULT_CONFESSIONAL_SEEDS.forEach((seed, idx) => {
    const key = subtopicKey(seed.locusId, seed.topicId, seed.subtopicName);
    const arr = getEntries(key, seed.sectionId);
    const exists = arr.some(e =>
      (e.confession || '').trim() === (seed.entry.confession || '').trim() &&
      (e.chapter || '').trim() === (seed.entry.chapter || '').trim()
    );
    if (!exists) {
      const entry = {
        ...seed.entry,
        id: 'seed_' + (idx + 1) + '_' + Math.random().toString(36).slice(2, 8),
        created: Date.now() + idx
      };
      arr.push(entry);
      setEntries(key, seed.sectionId, arr);
      changed = true;
    }
  });
  localStorage.setItem(versionKey, '1');
  if (changed) DB = loadData();
}

   INIT
============================================================ */

function applyConfessionalCorrections() {
  const byRef = {};
  DEFAULT_CONFESSIONAL_SEEDS.forEach(seed => {
    byRef[(seed.entry.confession + '||' + seed.entry.chapter).toLowerCase()] = seed.entry;
  });
  let changed = false;
  Object.keys(DB).forEach(stKey => {
    const bucket = DB[stKey];
    if (!bucket || !bucket.confessional || !Array.isArray(bucket.confessional)) return;
    bucket.confessional = bucket.confessional.map(entry => {
      const refKey = ((entry.confession || '') + '||' + (entry.chapter || '')).toLowerCase();
      const fresh = byRef[refKey];
      if (!fresh) return entry;
      if (!entry.id || !String(entry.id).startsWith('seed_')) return entry;
      changed = true;
      return {
        ...entry,
        title: fresh.title,
        text: fresh.text,
        confession: fresh.confession,
        chapter: fresh.chapter,
        proofs: fresh.proofs || '',
        tags: Array.isArray(entry.tags) && entry.tags.length ? fresh.tags : fresh.tags
      };
    });
  });
  if (changed) saveData(DB);
}

seedDefaultConfessionalEntries();
applyConfessionalCorrections();
renderTree();
updateStats();
showLokiHome();
