<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 Solas Archive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root {
    --bg:        #0a0a0a;
    --bg2:       #111111;
    --bg3:       #1a1a1a;
    --bg4:       #222222;
    --border:    #3a3020;
    --border2:   #4a3f28;
    --gold:      #d4a017;
    --gold2:     #e07b00;
    --gold3:     #f0c040;
    --amber:     #e07b00;
    --text:      #fff8e0;
    --text2:     #e0b87a;
    --text3:     #a08850;
    --red:       #8b2020;
    --green:     #1a5c2a;
    --sidebar-w: 280px;
    --header-h:  56px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; overscroll-behavior-y: none; }
  body { height: 100%; overflow: hidden; overscroll-behavior-y: none; }
  body {
    font-family: 'EB Garamond', Georgia, serif; color: var(--text); font-size: 17px; line-height: 1.6;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,80,0,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 100%, rgba(212,160,23,0.04) 0%, transparent 60%);
  }
  button { cursor: pointer; font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  a { color: var(--gold2); text-decoration: none; }
  a:hover { color: var(--gold3); }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ===== LAYOUT ===== */
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ===== HEADER ===== */
  #header {
    min-height: var(--header-h);
    background: var(--bg2);
    border-bottom: none;
    display: flex; align-items: center;
    padding: 0 12px; gap: 10px;
    flex-shrink: 0; z-index: 100; overflow: hidden;
    position: relative;
  }
  #header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber), var(--gold), var(--amber), transparent);
    pointer-events: none;
  }
  #header-logo { width: 40px; height: 40px; flex-shrink: 0; clip-path: circle(49% at center); mix-blend-mode: screen; filter: contrast(2.5) drop-shadow(0 0 9px rgba(200,134,10,.7)); }
  #header-title {
    font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600;
    letter-spacing: .12em; color: var(--gold2); text-transform: uppercase;
    white-space: nowrap; flex-shrink: 0;
  }
  #header-search-wrap { flex: 1; max-width: 420px; position: relative; margin: 0 auto; }
  #global-search {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 7px 36px 7px 12px; border-radius: 4px;
    font-size: 14px; font-family: 'Rajdhani', sans-serif; letter-spacing: .04em;
    outline: none; transition: border-color .2s;
  }
  #global-search:focus { border-color: var(--gold); }
  #global-search::placeholder { color: var(--text3); }
  .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
  #header-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: auto; }
  .hdr-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
    padding: 6px 10px; border-radius: 4px; font-family: 'Rajdhani', sans-serif;
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    transition: all .2s; white-space: nowrap; flex-shrink: 0;
  }
  .hdr-btn:hover { border-color: var(--gold); color: var(--gold2); }
  .hdr-btn.active { border-color: var(--gold); color: var(--gold2); background: rgba(200,134,10,.08); }

  /* Quick Add Button — gradient accent */
  #quick-add-btn {
    background: linear-gradient(135deg, #1a0e00, #2a1800); border: 1px solid var(--amber); color: var(--gold3);
    padding: 6px 12px; border-radius: 4px; font-family: 'Rajdhani', sans-serif;
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 700;
    transition: all .2s; white-space: nowrap; flex-shrink: 0;
    box-shadow: 0 0 14px rgba(224,123,0,0.15), inset 0 1px 0 rgba(240,192,64,0.08);
  }
  #quick-add-btn:hover { background: linear-gradient(135deg, #2a1800, #3a2200); box-shadow: 0 0 20px rgba(224,123,0,0.25), inset 0 1px 0 rgba(240,192,64,0.12); }

  /* ===== BODY SPLIT ===== */
  #body { display: flex; flex: 1; overflow: hidden; }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: var(--sidebar-w); background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  #sidebar-header { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  #sidebar-search {
    flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    padding: 5px 9px; border-radius: 3px; font-size: 13px; font-family: 'Rajdhani', sans-serif; outline: none;
  }
  #sidebar-search:focus { border-color: var(--gold); }
  #sidebar-search::placeholder { color: var(--text3); }
  #add-locus-btn, #collapse-tree-btn {
    background: none; border: 1px solid var(--border); color: var(--gold);
    width: 28px; height: 28px; border-radius: 3px; font-size: 16px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s;
  }
  #add-locus-btn:hover, #collapse-tree-btn:hover { border-color: var(--gold); background: rgba(212,160,23,.1); }
  #sidebar-tree { flex: 1; overflow-y: auto; padding: 6px 0; }

  /* Tree nodes */
  .tree-locus-header {
    display: flex; align-items: center; padding: 5px 10px 5px 14px;
    cursor: pointer; user-select: none; transition: background .15s; gap: 6px;
    position: relative;
  }
  .tree-locus-header:hover { background: var(--bg3); }
  .tree-locus-header:hover .tree-node-add { opacity: 1; }
  .tree-arrow { font-size: 10px; color: var(--text3); width: 14px; flex-shrink: 0; transition: transform .2s; }
  .tree-locus.open > .tree-locus-header > .tree-arrow { transform: rotate(90deg); }
  .tree-locus-num { font-family: 'Rajdhani', sans-serif; font-size: 10px; color: var(--gold); letter-spacing: .08em; flex-shrink: 0; }
  .tree-locus-name { font-family: 'Cinzel', serif; font-size: 11.5px; letter-spacing: .06em; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tree-locus.selected > .tree-locus-header { background: rgba(200,134,10,.12); }
  .tree-locus.selected > .tree-locus-header .tree-locus-name { color: var(--gold2); }
  .tree-children { display: none; padding-left: 12px; }
  .tree-locus.open > .tree-children { display: block; }

  .tree-topic-header {
    display: flex; align-items: center; padding: 4px 10px 4px 10px;
    cursor: pointer; transition: background .15s; gap: 6px; position: relative;
  }
  .tree-topic-header:hover { background: var(--bg3); }
  .tree-topic-header:hover .tree-node-add { opacity: 1; }
  .tree-topic-name {
    font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: .06em;
    text-transform: uppercase; color: var(--text2); flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tree-topic.selected > .tree-topic-header .tree-topic-name { color: var(--gold); }
  .tree-subtopics { display: none; padding-left: 14px; }
  .tree-topic.open > .tree-subtopics { display: block; }

  .tree-subtopic {
    padding: 3px 10px 3px 8px; cursor: pointer; font-family: 'EB Garamond', serif;
    font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-left: 2px solid transparent; transition: all .15s;
    display: flex; align-items: center; gap: 4px; position: relative;
  }
  .tree-subtopic:hover { color: var(--text); background: var(--bg3); }
  .tree-subtopic.active { color: var(--gold2); border-left-color: var(--gold); background: rgba(200,134,10,.08); }
  .tree-subtopic span.st-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }

  /* Inline add buttons on hover in tree */
  .tree-node-add {
    opacity: 0; background: none; border: 1px solid var(--border2); color: var(--gold);
    width: 18px; height: 18px; border-radius: 2px; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s; line-height: 1;
  }
  .tree-node-add:hover { background: rgba(200,134,10,.2); border-color: var(--gold); }

  /* ===== MAIN PANEL ===== */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Breadcrumb */
  #breadcrumb {
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text3); flex-shrink: 0;
    background: var(--bg2); flex-wrap: wrap; overflow: hidden;
  }
  .bc-sep { color: var(--border2); flex-shrink: 0; }
  .bc-item { color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
  .bc-item.current { color: var(--gold2); max-width: 220px; }
  .bc-link { cursor: pointer; }
  .bc-link:hover { color: var(--gold2); }

  /* View tabs */
  #view-tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0; padding: 0 16px;
  }
  .view-tab {
    padding: 8px 16px; font-family: 'Rajdhani', sans-serif; font-size: 11px;
    letter-spacing: .1em; text-transform: uppercase; color: var(--text3);
    border: none; background: none; border-bottom: 2px solid transparent;
    margin-bottom: -1px; cursor: pointer; transition: all .2s;
  }
  .view-tab:hover { color: var(--text2); }
  .view-tab.active { color: var(--gold2); border-bottom-color: var(--gold); }

  /* Sidebar overlay (mobile tap-outside-to-close) */
  #sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,.45); }
  #sidebar-overlay.visible { display: block; }

  /* Pull-to-refresh indicator */
  #ptr-indicator {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    height: 0; overflow: hidden; flex-shrink: 0;
    color: var(--gold2); font-family: 'Rajdhani', sans-serif; font-size: 13px;
    letter-spacing: .05em; background: var(--bg2);
  }
  #ptr-icon { font-size: 18px; display: inline-block; transition: transform .2s; }

  /* Content area */
  #content-area { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0; overscroll-behavior-y: contain; }
  #subtopic-view { padding: 20px 20px 60px 20px; }
  #recent-view   { padding: 20px 20px 60px 20px; }
  #search-results { padding: 20px 20px 60px 20px; }
  #tag-view      { padding: 20px 20px 60px 20px; }
  #resource-view { padding: 20px 20px 60px 20px; }
  #compare-view  { padding: 20px; height: 100%; display: flex; flex-direction: column; }

  /* ===== WELCOME SCREEN ===== */
  #welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100%; gap: 24px; padding: 40px; text-align: center;
    box-sizing: border-box; max-width: 100%;
  }
  #welcome-logo { width: 120px; height: 120px; clip-path: circle(49% at center); mix-blend-mode: screen; filter: contrast(2.5) drop-shadow(0 0 28px rgba(200,134,10,.75)); flex-shrink: 0; }
  #welcome h1 { font-family: 'Cinzel', serif; font-size: 26px; letter-spacing: .14em; color: var(--gold2); text-transform: uppercase; overflow-wrap: break-word; word-break: break-word; max-width: 100%; }
  #welcome p { font-family: 'EB Garamond', serif; font-style: italic; font-size: 18px; color: var(--text2); max-width: 480px; line-height: 1.7; }
  #welcome-stats { display: flex; gap: 36px; flex-wrap: wrap; justify-content: center; }
  .ws-stat { text-align: center; }
  .ws-num { font-family: 'Cinzel', serif; font-size: 32px; color: var(--gold); }
  .ws-label { font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--text3); }

  /* ===== SUBTOPIC VIEW ===== */
  #subtopic-title { font-family: 'Cinzel', serif; font-size: 22px; letter-spacing: .1em; color: var(--gold2); margin-bottom: 6px; }
  #subtopic-meta { font-family: 'Rajdhani', sans-serif; font-size: 13px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }

  /* SECTIONS */
  .section-block { margin-bottom: 20px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--bg3); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .section-header:hover { background: var(--bg4); }
  .section-icon { font-size: 15px; width: 20px; text-align: center; }
  .section-name { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); flex: 1; display: flex; align-items: center; }
  .section-name::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border2), transparent); margin-left: 10px; }
  .section-count { font-family: 'Rajdhani', sans-serif; font-size: 11px; color: var(--text3); background: var(--bg); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }
  .section-toggle { font-size: 10px; color: var(--text3); transition: transform .2s; }
  .section-block.collapsed .section-toggle { transform: rotate(-90deg); }
  .section-add-inline {
    background: none; border: 1px solid var(--border2); color: var(--gold);
    width: 26px; height: 26px; border-radius: 3px; font-size: 16px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all .2s; font-family: monospace; line-height: 1;
  }
  .section-add-inline:hover { border-color: var(--gold2); background: rgba(200,134,10,.15); color: var(--gold2); }
  .section-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; background: var(--bg2); }
  .section-block.collapsed .section-body { display: none; }
  @media (hover: none) { .entry-card-actions { opacity: 1 !important; } }
  .add-entry-btn {
    display: flex; align-items: center; gap: 6px; background: none;
    border: 1px dashed var(--border2); color: var(--text3); padding: 8px 12px; border-radius: 4px;
    font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
    transition: all .2s; width: 100%;
  }
  .add-entry-btn:hover { border-color: var(--gold); color: var(--gold2); background: rgba(200,134,10,.05); }

  /* ENTRY CARDS */
  .entry-card { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 12px 14px; position: relative; transition: border-color .2s; }
  .entry-card:hover { border-color: var(--border2); }
  .entry-card.pinned { border-left: 3px solid var(--gold); }
  .entry-card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .entry-card-title { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: .04em; color: var(--text); flex: 1; }
  .entry-card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .2s; }
  .entry-card:hover .entry-card-actions { opacity: 1; }
  .entry-action-btn { background: none; border: 1px solid var(--border); color: var(--text3); width: 24px; height: 24px; border-radius: 3px; font-size: 11px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .entry-action-btn:hover { border-color: var(--gold); color: var(--gold); }
  .entry-action-btn.del:hover { border-color: #b03030; color: #b03030; }
  .entry-card-body { font-size: 15px; color: var(--text2); line-height: 1.6; }
  .entry-quote-text { font-style: italic; color: var(--text); font-size: 16px; border-left: 3px solid var(--gold); padding-left: 12px; margin-bottom: 6px; line-height: 1.65; }
  .entry-meta { font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: .06em; color: var(--text3); display: flex; gap: 14px; flex-wrap: wrap; margin-top: 6px; }
  .entry-meta span { display: flex; align-items: center; gap: 4px; }

  .confessional-proofs {
    margin-top: 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    line-height: 1.55;
    letter-spacing: .04em;
    color: var(--text3);
    padding-top: 8px;
    border-top: 1px solid rgba(212,160,23,.18);
  }
  .confessional-proofs strong {
    color: var(--gold2);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-right: 6px;
  }
  .entry-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; }
  .tag-pill {
    background: rgba(200,134,10,.12); border: 1px solid rgba(200,134,10,.25);
    color: var(--gold2); font-family: 'Rajdhani', sans-serif; font-size: 10px;
    letter-spacing: .08em; text-transform: uppercase; padding: 2px 8px;
    border-radius: 12px; cursor: pointer; transition: all .15s;
  }
  .tag-pill:hover { background: rgba(200,134,10,.25); }
  .tag-pill.selected { background: rgba(200,134,10,.4); border-color: var(--gold2); color: var(--gold3); }

  /* Scripture */
  .scripture-ref { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold2); margin-bottom: 4px; }
  .scripture-type { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-left: 8px; }
  .scripture-type.proof { background: rgba(26,92,42,.3); color: #5cb87a; border: 1px solid rgba(26,92,42,.5); }
  .scripture-type.typological { background: rgba(200,134,10,.15); color: var(--gold2); border: 1px solid rgba(200,134,10,.3); }
  .scripture-type.disputed { background: rgba(139,32,32,.2); color: #d06060; border: 1px solid rgba(139,32,32,.4); }

  /* ===== SEARCH RESULTS ===== */
  #search-results h2, #tag-view h2, #resource-view h2, #recent-view h2, #compare-view h2 {
    font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold2);
    letter-spacing: .1em; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .search-result-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 12px 14px; margin-bottom: 10px; cursor: pointer; transition: all .2s; }
  .search-result-item:hover { border-color: var(--gold); background: var(--bg4); }
  .sr-path { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
  .sr-title { font-family: 'Cinzel', serif; font-size: 13px; color: var(--text); margin-bottom: 4px; }
  .sr-snippet { font-size: 13px; color: var(--text2); }

  /* ===== TAG VIEW ===== */
  .tag-index-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .tag-index-pill {
    background: var(--bg3); border: 1px solid var(--border2); color: var(--text2);
    font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; padding: 4px 12px; border-radius: 14px; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .tag-index-pill:hover { border-color: var(--gold); color: var(--gold2); }
  .tag-index-pill.active { background: linear-gradient(135deg, #2a1800, #1a1000); border-color: var(--amber); color: var(--amber); box-shadow: 0 0 6px rgba(224,123,0,0.2); }
  .tag-count-badge { font-size: 9px; background: var(--bg); border: 1px solid var(--border); color: var(--text3); padding: 1px 5px; border-radius: 8px; }
  .tag-results-header { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: .1em; color: var(--gold); margin-bottom: 12px; }

  /* ===== RESOURCE VIEW ===== */
  .resource-filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
  .res-filter-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text3);
    font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; padding: 5px 12px; border-radius: 4px; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .res-filter-btn:hover { border-color: var(--gold); color: var(--gold2); }
  .res-filter-btn.active { background: linear-gradient(135deg, #2a1800, #1a1000); border-color: var(--amber); color: var(--amber); box-shadow: 0 0 6px rgba(224,123,0,0.2); }
  .res-search-wrap { position: relative; flex: 1; max-width: 340px; }
  .res-search { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 6px 32px 6px 10px; border-radius: 4px; font-size: 13px; font-family: 'Rajdhani', sans-serif; outline: none; }
  .res-search:focus { border-color: var(--gold); }
  .res-search::placeholder { color: var(--text3); }
  .res-sort-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .res-sort-label { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); }

const DB_STORE_KEY = 'reformed_kb';
const TREE_STORE_KEY = 'reformed_kb_tree';
const LEGACY_TREE_STORE_KEY = 'reformed_kb_custom_tree';

function loadData() {
  try { return JSON.parse(localStorage.getItem(DB_STORE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveData(d) { localStorage.setItem(DB_STORE_KEY, JSON.stringify(d)); }

function loadTreeSnapshot() {
  try {
    const stored = JSON.parse(localStorage.getItem(TREE_STORE_KEY) || 'null');
    if (Array.isArray(stored) && stored.length) return stored;
  } catch(e) {}
  try {
    const legacy = JSON.parse(localStorage.getItem(LEGACY_TREE_STORE_KEY) || '[]');
    if (Array.isArray(legacy) && legacy.length) return [...cloneDefaultTree(), ...legacy];
  } catch(e) {}
  return cloneDefaultTree();
}
function saveTreeSnapshot() { localStorage.setItem(TREE_STORE_KEY, JSON.stringify(TREE)); }

let DB = loadData();
TREE = loadTreeSnapshot();

function getEntries(subtopicKey, sectionId) {
  return (DB[subtopicKey] && DB[subtopicKey][sectionId]) ? DB[subtopicKey][sectionId] : [];
}
function setEntries(subtopicKey, sectionId, arr) {
  if (!DB[subtopicKey]) DB[subtopicKey] = {};
  DB[subtopicKey][sectionId] = arr;
  saveData(DB);
}
function addEntry(subtopicKey, sectionId, entry) {
  const arr = getEntries(subtopicKey, sectionId);
  entry.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  entry.created = Date.now();
  arr.push(entry);
  setEntries(subtopicKey, sectionId, arr);
  return entry;
}
function updateEntry(subtopicKey, sectionId, id, updates) {
  const arr = getEntries(subtopicKey, sectionId);
  const idx = arr.findIndex(e => e.id === id);
  if (idx !== -1) { arr[idx] = {...arr[idx], ...updates, updated: Date.now()}; setEntries(subtopicKey, sectionId, arr); }
}
function deleteEntry(subtopicKey, sectionId, id) {
  const arr = getEntries(subtopicKey, sectionId).filter(e => e.id !== id);
  setEntries(subtopicKey, sectionId, arr);
}
function togglePin(subtopicKey, sectionId, id) {
  const arr = getEntries(subtopicKey, sectionId);
  const idx = arr.findIndex(e => e.id === id);
  if (idx !== -1) { arr[idx].pinned = !arr[idx].pinned; setEntries(subtopicKey, sectionId, arr); }
}
function allEntries() {
  const result = [];
  for (const [stKey, sections] of Object.entries(DB)) {
    for (const [secId, entries] of Object.entries(sections)) {
      if (Array.isArray(entries)) entries.forEach(e => result.push({stKey, secId, entry: e}));
    }
  }
  return result;
}
function allTags() {
  const tags = new Set();
  allEntries().forEach(({entry}) => { (entry.tags||[]).forEach(t => tags.add(t)); });
  return [...tags].sort();
}
function updateStats() {
  const entries = allEntries();
  document.getElementById('stat-entries').textContent = entries.length;
  document.getElementById('stat-tags').textContent = allTags().length;
  document.getElementById('stat-loci').textContent = getFullTree().length;
  const lociOverview = document.getElementById('loci-overview');
  const locusView = document.getElementById('locus-view');
  const isLokiHomeVisible = !!(
    lociOverview &&
    locusView &&
    locusView.style.display === 'block' &&
    currentTab === 'loki' &&
    !currentLocusViewId &&
    !currentTopicViewId &&
    !currentSubtopicKey
  );
  if (isLokiHomeVisible) showLokiHome();
}

function countEntriesForSubtopicKey(stKey) {
  const sections = DB[stKey] || {};
  return Object.values(sections).reduce((sum, arr) => sum + (Array.isArray(arr) ? arr.length : 0), 0);
}

function countEntriesForLocus(locusId) {
  return allEntries().filter(({stKey}) => stKey.startsWith(locusId + '__')).length;
}

function countEntriesForTopic(locusId, topicId) {
  return allEntries().filter(({stKey}) => stKey.startsWith(locusId + '__' + topicId + '__')).length;
}

function countPopulatedSubtopics(locusId, topic) {
  return topic.subtopics.filter(st => countEntriesForSubtopicKey(subtopicKey(locusId, topic.id, st)) > 0).length;
}

function openSubtopicPage(locusId, topicId, stName, locusName, topicName) {

}

function renderSubtopicSectionSummary(stKey) {
  const chips = SECTIONS.map(sec => {
    const n = getEntries(stKey, sec.id).length;
    if (!n) return '';
    return `<span class="locus-section-chip">${sec.icon} ${n}</span>`;
  }).filter(Boolean);
  if (!chips.length) return `<div class="locus-subtopic-empty">No entries yet</div>`;
  return `<div class="locus-section-chips">${chips.join('')}</div>`;
}

function switchTab(tab) {
  currentTab = tab;
  ['loki','tags','resource'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === tab);
  });
  if (tab === 'loki') {
    if (currentSubtopicKey) {
      showSubtopicView();
      renderSubtopicView();
    } else if (currentTopicViewId) {
      openTopicPage(currentTopicViewId.locusId, currentTopicViewId.topicId);
    } else if (currentLocusViewId) {
      openLocusPage(currentLocusViewId);
    } else {
      showLokiHome();
    }
  } else if (tab === 'tags') {
    renderTagView();
  } else if (tab === 'resource') {
    renderResourceView();
  }
}

          const key = subtopicKey(locus.id, topic.id, st);
          const isActive = currentSubtopicKey === key;
          const stCount = countEntriesForSubtopicKey(key);
          stHtml += `<div class="tree-subtopic ${stCount > 0 ? 'has-entries' : 'empty'}${isActive?' active':''}" onclick="selectSubtopic('${locus.id}','${topic.id}','${escAttr(st)}','${escAttr(locus.name)}','${escAttr(topic.name)}')">
            <span class="st-label">${escHtml(st)}</span>
            <span class="tree-subtopic-count ${stCount > 0 ? 'has-entries' : ''}">${stCount}</span>
          </div>`;
          anySt = true;
        }
      });
      if (locusMatch || topicMatch || anySt) {
        const isOpen = !fl ? '' : 'open';
        topicsHtml += `<div class="tree-topic ${isOpen}" id="tp_${topic.id}">
          <div class="tree-topic-header" onclick="toggleTopic('${topic.id}')">
            <span class="tree-arrow">▶</span>
            <span class="tree-topic-name">${escHtml(topic.name)}</span>
            <span class="tree-topic-count ${topicCount > 0 ? 'has-entries' : ''}">${topicCount}</span>
            <button class="tree-node-add" onclick="event.stopPropagation();openAddNodeModal('subtopic','${locus.id}','${topic.id}')" title="Add Subtopic">+</button>
          </div>
          <div class="tree-subtopics">${stHtml}</div>
        </div>`;
        anyTopic = true;
      }
    });
    if (locusMatch || anyTopic) {
      const isOpen = !fl ? '' : 'open';
      html += `<div class="tree-locus ${isOpen}" id="lc_${locus.id}">
        <div class="tree-locus-header" onclick="toggleLocus('${locus.id}')">
          <span class="tree-arrow">▶</span>
          <span class="tree-locus-num">${String(li+1).padStart(2,'0')}</span>
          <span class="tree-locus-name">${escHtml(locus.name)}</span>
          <span class="tree-locus-count ${locusCount > 0 ? 'has-entries' : ''}">${locusCount}</span>
          <button class="tree-node-add" onclick="event.stopPropagation();openAddNodeModal('topic','${locus.id}',null)" title="Add Topic">+</button>
        </div>
        <div class="tree-children">${topicsHtml}</div>
      </div>`;
    }
  });
  tree.innerHTML = html;
  if (currentSubtopicKey) {
    const parts = currentSubtopicKey.split('__');
    const le = document.getElementById('lc_'+parts[0]);
    const te = document.getElementById('tp_'+parts[1]);
    if (le) le.classList.add('open');
    if (te) te.classList.add('open');
  }
}

function toggleLocus(id) { document.getElementById('lc_'+id)?.classList.toggle('open'); }
function toggleTopic(id)  { document.getElementById('tp_'+id)?.classList.toggle('open'); }
function filterTree(v) { renderTree(v); }
function collapseAllTree() {
  document.querySelectorAll('.tree-locus.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.tree-topic.open').forEach(el => el.classList.remove('open'));
}
function focusTreeNode(locusId, topicId) {
  const le = document.getElementById('lc_'+locusId);
  const te = document.getElementById('tp_'+topicId);
  if (le) { le.classList.add('open'); le.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  if (te) te.classList.add('open');
}

function isDuplicateNodeName(list, name) {
  const norm = name.trim().toLowerCase();
  return list.some(item => String(item).trim().toLowerCase() === norm);
}
function focusFirstModalInput() {
  setTimeout(() => {
    const first = document.querySelector('#modal-body input:not([type="hidden"]), #modal-body textarea, #modal-body select');
    first?.focus();
  }, 50);
}

/* ============================================================
   ADD LOCUS / TOPIC / SUBTOPIC
============================================================ */
function openAddNodeModal(type, locusId, topicId) {
  let titleText = '', bodyHtml = '';
  if (type === 'locus') {
    titleText = 'Add New Locus';
    bodyHtml = `<div class="form-group"><label class="form-label">Locus Name</label><input class="form-input" id="f_nodeName" type="text" placeholder="e.g. Missiology"></div>`;
  } else if (type === 'topic') {
    const locus = getFullTree().find(l => l.id === locusId);
    titleText = `Add Topic to: ${locus ? locus.name : locusId}`;
    bodyHtml = `<div class="form-group"><label class="form-label">Topic Name</label><input class="form-input" id="f_nodeName" type="text" placeholder="e.g. Missional Ecclesiology"></div>`;
  } else if (type === 'subtopic') {
    const locus = getFullTree().find(l => l.id === locusId);
    const topic = locus?.topics.find(t => t.id === topicId);
    titleText = `Add Subtopic to: ${topic ? topic.name : topicId}`;
    bodyHtml = `<div class="form-group"><label class="form-label">Subtopic Name</label><input class="form-input" id="f_nodeName" type="text" placeholder="e.g. Church Planting Theology"></div>`;
  }
  modalState = { mode: 'addNode', nodeType: type, locusId, topicId };
  document.getElementById('modal-title').textContent = titleText;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-overlay').classList.add('open');
  focusFirstModalInput();
}

function saveAddNode() {
  const name = document.getElementById('f_nodeName')?.value.trim();
  if (!name) return;
  const { nodeType, locusId, topicId } = modalState;
  if (nodeType === 'locus') {
    if (isDuplicateNodeName(getFullTree().map(l => l.name), name)) { alert('That locus already exists.'); return; }
    const newId = 'lc_' + Date.now().toString(36);
    TREE.push({ id: newId, name, topics: [] });
  } else if (nodeType === 'topic') {
    const locus = getFullTree().find(l => l.id === locusId);
    if (locus) {
      if (isDuplicateNodeName(locus.topics.map(t => t.name), name)) { alert('That topic already exists in this locus.'); return; }
      const newId = 't_' + Date.now().toString(36);
      locus.topics.push({ id: newId, name, subtopics: [] });
    }
  } else if (nodeType === 'subtopic') {
    const locus = getFullTree().find(l => l.id === locusId);
    const topic = locus?.topics.find(t => t.id === topicId);
    if (topic) {
      if (isDuplicateNodeName(topic.subtopics, name)) { alert('That subtopic already exists in this topic.'); return; }
      topic.subtopics.push(name);
    }
  }
  saveTreeSnapshot();
  closeModal();
  renderTree();
  updateStats();
}

/* ============================================================
   TOPIC FILTER HELPERS
============================================================ */
let _topicSearchTimer = null;

function matchesTopicSearch(entry, q) {
  const ql = q.toLowerCase();
  const fields = [
    entry.title, entry.author, entry.source, entry.confession,
    entry.quote, entry.text, entry.content, entry.notes,
    entry.reference, entry.verseText, entry.url, entry.description,
    entry.position, entry.claim, entry.supportingScripture,
    entry.objections, entry.responses, entry.fileRef, entry.fileName
  ];
  if (fields.some(f => f && String(f).toLowerCase().includes(ql))) return true;
  if ((entry.tags||[]).some(t => t.toLowerCase().includes(ql))) return true;
  return false;
}

function applyTopicFilters(entries) {
  let out = entries.slice();
  if (topicSearch)     out = out.filter(e => matchesTopicSearch(e, topicSearch));
  if (topicTagFilter)  out = out.filter(e => (e.tags||[]).includes(topicTagFilter));
  if (topicSortBy === 'newest') {
    out.sort((a,b) => (b.created||0) - (a.created||0));
  } else if (topicSortBy === 'title') {
    out.sort((a,b) => (a.title||'').localeCompare(b.title||''));
  } else if (topicSortBy === 'author') {
    out.sort((a,b) => (a.author||'').localeCompare(b.author||''));
  } else if (topicSortBy === 'source') {
    out.sort((a,b) => (a.source||a.confession||a.url||'').localeCompare(b.source||b.confession||b.url||''));
  } else {
    // 'pinned' — pinned first, then newest
    out.sort((a,b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return (b.created||0) - (a.created||0);
    });
  }
  return out;
}

function setTopicTypeFilter(secId) {
  if (topicTypeFilters.has(secId)) topicTypeFilters.delete(secId);
  else topicTypeFilters.add(secId);
  renderSubtopicView();
}
function setTopicAllFilter() {
  topicTypeFilters = new Set();
  renderSubtopicView();
}
function setTopicSearchDebounced(q) {
  clearTimeout(_topicSearchTimer);
  _topicSearchTimer = setTimeout(() => { topicSearch = q; renderSubtopicView(); }, 250);
}
function setTopicTagFilter(tag) {
  topicTagFilter = (topicTagFilter === tag) ? null : tag;
  renderSubtopicView();
}
function setTopicSort(val) {
  topicSortBy = val;
  renderSubtopicView();
}
function clearTopicFilters() {
  topicTypeFilters = new Set();
  topicSearch = '';
  topicTagFilter = null;
  topicSortBy = 'pinned';
  renderSubtopicView();
}

function setTagViewTypeFilter(secId) {
  if (tagViewTypeFilters.has(secId)) tagViewTypeFilters.delete(secId);
  else tagViewTypeFilters.add(secId);
  _buildTagView();
}
function setTagViewAllFilter() {
  tagViewTypeFilters = new Set();
  _buildTagView();
}

/* ============================================================
   SUBTOPIC VIEW
============================================================ */
function selectSubtopic(locusId, topicId, stName, locusName, topicName) {
  currentSubtopicKey = subtopicKey(locusId, topicId, stName);
  currentSubtopicLabel = stName;
  currentLocusName = locusName;
  currentTopicName = topicName;
  currentLocusViewId = locusId;
  currentTopicViewId = { locusId, topicId };
  // Reset in-topic filters on every navigation
  topicTypeFilters = new Set();
  topicSearch = '';
  topicTagFilter = null;
  topicSortBy = 'pinned';
  document.getElementById('breadcrumb').innerHTML =
    `<span class="bc-item bc-link" onclick="showLokiHome()">Loci</span>
     <span class="bc-sep">›</span>
     <span class="bc-item bc-link" onclick="openLocusPage('${escAttr(locusId)}')">${escHtml(locusName)}</span>
     <span class="bc-sep">›</span>
     <span class="bc-item bc-link" onclick="openTopicPage('${escAttr(locusId)}','${escAttr(topicId)}')">${escHtml(topicName)}</span>
     <span class="bc-sep">›</span>
     <span class="bc-item current">${escHtml(stName)}</span>`;
  // switch to loki tab if needed
  currentTab = 'loki';
  ['loki','tags','resource'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t === 'loki'));
  hideAllViews();
  renderSubtopicView();
  document.getElementById('subtopic-view').style.display = 'block';
  renderTree();
  closeSidebarMobile();
}

function renderSubtopicView() {
  const el = document.getElementById('subtopic-view');
  const key = currentSubtopicKey;

  // ── Type filter chips ──
  const allActive = topicTypeFilters.size === 0;
  const typeChipsHtml =
    `<button class="topic-filter-chip topic-filter-all${allActive?' active':''}" onclick="setTopicAllFilter()">All</button>` +
    SECTIONS.map(s =>
      `<button class="topic-filter-chip${topicTypeFilters.has(s.id)?' active':''}" onclick="setTopicTypeFilter('${s.id}')">
        ${s.icon} ${s.name.replace(' / Resources','').replace(' / Bookmarks','')}
      </button>`
    ).join('');

  // ── Sort select ──
  const sortOptsHtml = [
    ['pinned','Pinned First'],['newest','Newest'],
    ['title','Title A–Z'],['author','Author A–Z'],['source','Source A–Z']
  ].map(([v,l]) => `<option value="${v}"${topicSortBy===v?' selected':''}>${l}</option>`).join('');

  const controlsHtml = `<div class="topic-controls">
    <div class="topic-filter-bar">${typeChipsHtml}</div>
    <div class="topic-search-row">
      <div class="topic-search-wrap">
        <input class="topic-search-input" type="text" placeholder="Search within this subtopic…"
          value="${escHtml(topicSearch)}"
          oninput="setTopicSearchDebounced(this.value)">
        <span class="search-icon" style="font-size:12px;">⌕</span>
      </div>
      <div class="topic-sort-wrap">
        <span class="topic-sort-label">Sort:</span>
        <select class="topic-sort-select" onchange="setTopicSort(this.value)">${sortOptsHtml}</select>
      </div>
    </div>
  </div>`;

  // ── Determine which sections are active (type filter) ──
  const activeSections = SECTIONS.filter(s =>
    topicTypeFilters.size === 0 || topicTypeFilters.has(s.id)
  );

  // ── Gather entries per section with search+tag filters ──
  // First pass: apply search only (for building the tag cloud)
  const sectionDataPreTag = activeSections.map(sec => {
    const raw = getEntries(key, sec.id);
    const afterSearch = (topicSearch)
      ? raw.filter(e => matchesTopicSearch(e, topicSearch))
      : raw.slice();
    return { sec, raw, afterSearch };
  });

  // ── Tag bar — unique tags from post-search entries (before tag filter) ──
  const tagSet = new Set();
  sectionDataPreTag.forEach(({afterSearch}) =>
    afterSearch.forEach(e => (e.tags||[]).forEach(t => tagSet.add(t)))
  );
  const sortedTags = [...tagSet].sort();
  const tagBarHtml = sortedTags.length
    ? `<div class="topic-tag-bar">${sortedTags.map(t =>
        `<button class="topic-tag-chip${topicTagFilter===t?' active':''}" onclick="setTopicTagFilter('${escAttr(t)}')">${escHtml(t)}</button>`
      ).join('')}</div>`
    : '';

  // ── Second pass: apply tag filter + sort ──
  const sectionDataFinal = sectionDataPreTag.map(({sec, raw, afterSearch}) => {
    const filtered = applyTopicFilters(
      topicTagFilter ? afterSearch.filter(e => (e.tags||[]).includes(topicTagFilter)) : afterSearch
    );
    return { sec, raw, filtered };
  });

  // ── Stats row ──
  const totalRaw = SECTIONS.reduce((sum, s) => sum + getEntries(key, s.id).length, 0);
  const totalVisible = sectionDataFinal.reduce((sum, {filtered}) => sum + filtered.length, 0);
  const filtersActive = topicTypeFilters.size > 0 || topicSearch !== '' || topicTagFilter !== null;
  const statsRowHtml = filtersActive
    ? `<div class="topic-stats-row">
        <span>Showing ${totalVisible} of ${totalRaw} entr${totalRaw !== 1 ? 'ies' : 'y'}</span>
        <button class="clear-filters-btn" onclick="clearTopicFilters()">✕ Clear filters</button>
      </div>`
    : '';

  // ── Featured (pinned) block ──
  const pinnedItems = [];
  sectionDataFinal.forEach(({sec, filtered}) =>
    filtered.filter(e => e.pinned).forEach(e => pinnedItems.push({e, sec}))
  );
  const featuredHtml = pinnedItems.length
    ? `<div class="section-block featured-block" id="sb___featured__">
        <div class="section-header" onclick="toggleSection('__featured__')">
          <span class="section-icon">★</span>
          <span class="section-name">Featured References</span>
          <span class="section-count">${pinnedItems.length}</span>
          <span class="section-toggle">▾</span>
        </div>
        <div class="section-body">
          ${pinnedItems.map(({e, sec}) => renderEntryCard(e, sec.id, key)).join('')}
        </div>
      </div>`
    : '';

  // ── Section blocks ──
  let sectionsHtml = '';
  sectionDataFinal.forEach(({sec, raw, filtered}) => {
    // When filters active, hide sections with zero visible entries
    if (filtersActive && filtered.length === 0) return;
    // When no filters active, hide sections with zero entries entirely (clean view)
    if (!filtersActive && raw.length === 0) return;
    const entriesToShow = filtersActive ? filtered : raw;
    const displayCount = filtersActive ? filtered.length : raw.length;
    sectionsHtml += `<div class="section-block" id="sb_${sec.id}">
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <span class="section-icon">${sec.icon}</span>
        <span class="section-name">${sec.name}</span>
        <span class="section-count">${displayCount}</span>
        <button class="section-add-inline" onclick="event.stopPropagation();openAddModal('${sec.id}')" title="Add entry">+</button>
        <span class="section-toggle">▾</span>
      </div>
      <div class="section-body">
        ${renderEntries(entriesToShow, sec.id, key)}
        <button class="add-entry-btn" onclick="openAddModal('${sec.id}')">+ Add ${escHtml(sec.name.replace(' / Resources','').replace(' / Bookmarks',''))}</button>
      </div>
    </div>`;
  });

  // ── No results message when filters are active but nothing matches ──
  if (filtersActive && totalVisible === 0) {
    sectionsHtml = `<div class="empty-state">No entries match the current filters. <button class="clear-filters-btn" style="margin-left:8px;" onclick="clearTopicFilters()">Clear filters</button></div>`;
  }

  el.innerHTML = `
    <div id="subtopic-title">${escHtml(currentSubtopicLabel)}</div>
    <div id="subtopic-meta">${escHtml(currentLocusName)} &nbsp;›&nbsp; ${escHtml(currentTopicName)}</div>
    ${controlsHtml}
    ${tagBarHtml}
    ${statsRowHtml}
    ${featuredHtml}
    ${sectionsHtml}
  `;
  updateStats();
}

function toggleSection(secId) { document.getElementById('sb_'+secId)?.classList.toggle('collapsed'); }
function renderEntries(entries, secId, key) {
  if (!entries.length) return '';
  return entries.map(e => renderEntryCard(e, secId, key)).join('');
}

function getEntryPathMeta(key, secId) {
  const parts = (key || '').split('__');
  const locus = getFullTree().find(l => l.id === parts[0]);
  const topic = locus?.topics.find(t => t.id === parts[1]);
  const stName = parts[2]?.replace(/_/g,' ');
  const sec = SECTIONS.find(s => s.id === secId);
  return {
    locusId: parts[0] || '',
    topicId: parts[1] || '',
    locusName: locus?.name || '',
    topicName: topic?.name || '',
    stName: stName || '',
    secName: sec?.name || secId,
    secIcon: sec?.icon || ''
  };
}

function renderEntryBodyHtml(e, secId, expanded) {
  const largeBodyCls = expanded ? ' style="font-size:inherit;"' : '';
  if (secId === 'quotations') {
    return `<div class="entry-quote-text">${escHtml(e.quote||'')}</div>
    <div class="entry-meta">
      ${e.author ? `<span>— ${escHtml(e.author)}</span>` : ''}
      ${e.source ? `<span>📖 ${escHtml(e.source)}</span>` : ''}
      ${e.page   ? `<span>p. ${escHtml(e.page)}</span>` : ''}
    </div>`;
  } else if (secId === 'confessional') {
    return `<div class="entry-quote-text" style="border-left:none;padding-left:0;margin-bottom:10px;white-space:normal;">${escHtmlWithBreaks(e.text||'')}</div>
    <div class="entry-meta">
      ${e.confession ? `<span>⛪ ${escHtml(e.confession)}</span>` : ''}
      ${e.chapter    ? `<span>§ ${escHtml(e.chapter)}</span>` : ''}
    </div>
    ${e.proofs ? `<div class="confessional-proofs"><strong>Scripture proofs:</strong>${escHtml(e.proofs)}</div>` : ''}
    ${e.notes ? `<div class="entry-card-body" style="color:var(--text3);font-size:13px;margin-top:8px;">${escHtmlWithBreaks(e.notes)}</div>` : ''}`;
  } else if (secId === 'books') {
    return `<div class="entry-meta">
      ${e.author ? `<span>✍ ${escHtml(e.author)}</span>` : ''}
      ${e.link   ? `<span><a href="${escAttr(e.link)}" target="_blank" onclick="event.stopPropagation()">🔗 Link</a></span>` : ''}
    </div>
    ${e.notes ? `<div class="entry-card-body"${largeBodyCls} style="margin-top:6px;">${escHtml(e.notes)}</div>` : ''}`;
  } else if (secId === 'websites') {
    return `${e.url ? `<div class="entry-meta"><a href="${escAttr(e.url)}" target="_blank" onclick="event.stopPropagation()">🔗 ${escHtml(e.url)}</a></div>` : ''}
    ${e.description ? `<div class="entry-card-body"${largeBodyCls}>${escHtml(e.description)}</div>` : ''}`;
  } else if (secId === 'scripture') {
    const typeClass = e.verseType || 'proof';
    return `<div class="scripture-ref">${escHtml(e.reference||'')} <span class="scripture-type ${typeClass}">${typeClass}</span></div>
    <div class="entry-card-body"${largeBodyCls}>${escHtml(e.verseText||'')}</div>
    ${e.notes ? `<div class="entry-card-body" style="color:var(--text3);font-size:13px;margin-top:4px;">${escHtml(e.notes)}</div>` : ''}`;
  } else if (secId === 'arguments') {
    return `<div class="entry-card-body"${largeBodyCls}><strong style="color:var(--gold);">Position:</strong> ${escHtml(e.position||'')}</div>
    <div class="entry-card-body"${largeBodyCls}><strong>Claim:</strong> ${escHtml(e.claim||'')}</div>
    ${e.objections ? `<div class="entry-card-body"${largeBodyCls}><strong style="color:#c05050;">Objection:</strong> ${escHtml(e.objections)}</div>` : ''}
    ${e.responses  ? `<div class="entry-card-body"${largeBodyCls}><strong style="color:#5cb87a;">Response:</strong> ${escHtml(e.responses)}</div>` : ''}`;
  } else if (secId === 'notes') {
    return `<div class="entry-card-body"${largeBodyCls}>${escHtml(e.content||'')}</div>`;
  } else if (secId === 'media') {
    const imgHtml = e.fileDataURL
      ? `<img src="${escAttr(e.fileDataURL)}" alt="${escHtml(e.fileName||'')}" style="max-width:100%;max-height:${expanded ? '320px' : '200px'};border-radius:4px;border:1px solid var(--border);margin-bottom:10px;display:block;">`
      : '';
    return `${imgHtml}<div class="entry-card-body"${largeBodyCls}>${escHtml(e.fileRef||e.fileName||'')} ${e.description ? '— '+escHtml(e.description) : ''}</div>`;
  }
  return '';
}

function renderEntryCard(e, secId, key, showPath) {
  const cardKey = key || currentSubtopicKey;
  const tagsHtml = (e.tags||[]).map(t => `<span class="tag-pill" onclick="event.stopPropagation();filterByTag('${escAttr(t)}')">${escHtml(t)}</span>`).join('');
  const meta = getEntryPathMeta(key, secId);
  const body = renderEntryBodyHtml(e, secId, false);

  let pathHtml = '';
  if (showPath && key) {
    pathHtml = `<div class="entry-locus-path">${escHtml(meta.locusName)} › ${escHtml(meta.topicName)} › ${escHtml(meta.stName)} <span class="sr-sec-badge">${meta.secIcon} ${meta.secName}</span></div>`;
  }

  const updatedHtml = (e.updated && e.updated !== e.created)
    ? `<div class="entry-meta" style="margin-top:5px;"><span style="opacity:.6;">✎ ${timeAgo(e.updated)}</span></div>`
    : '';

  return `<div class="entry-card clickable-card${e.pinned?' pinned':''}" id="ec_${e.id}" onclick="openEntryDetail('${secId}','${e.id}','${escAttr(cardKey)}')">
    ${pathHtml}
    <div class="entry-card-top">
      <span class="entry-card-title">${escHtml(e.title||'(untitled)')}</span>
      <div class="entry-card-actions">
        ${cardKey ? `
        <button class="entry-action-btn" onclick="event.stopPropagation();togglePinEntry('${secId}','${e.id}','${escAttr(cardKey)}')" title="${e.pinned?'Unpin':'Pin'}">⚑</button>
        <button class="entry-action-btn" onclick="event.stopPropagation();openEditModal('${secId}','${e.id}','${escAttr(cardKey)}')" title="Edit">✎</button>
        <button class="entry-action-btn del" onclick="event.stopPropagation();confirmDelete('${secId}','${e.id}','${escAttr(cardKey)}')" title="Delete">✕</button>
        ` : `
        <button class="entry-action-btn" disabled style="opacity:.3;" title="Pin">⚑</button>
        <button class="entry-action-btn" disabled style="opacity:.3;" title="Edit">✎</button>
        <button class="entry-action-btn del" disabled style="opacity:.3;" title="Delete">✕</button>
        `}
      </div>
    </div>
    <div>${body}</div>
    ${updatedHtml}
    ${tagsHtml ? `<div class="entry-tags">${tagsHtml}</div>` : ''}
  </div>`;
}

function openEntryDetail(secId, entryId, stKey) {
  const key = stKey || currentSubtopicKey;
  if (!key) return;
  const entry = getEntries(key, secId).find(e => e.id === entryId);
  if (!entry) return;
  currentDetailState = { secId, entryId, stKey: key };
  const meta = getEntryPathMeta(key, secId);
  const body = renderEntryBodyHtml(entry, secId, true);
  const tagsHtml = (entry.tags||[]).map(t => `<span class="tag-pill" onclick="closeEntryDetail();filterByTag('${escAttr(t)}')">${escHtml(t)}</span>`).join('');
  const updatedHtml = (entry.updated && entry.updated !== entry.created)
    ? `<div class="entry-meta" style="margin-top:10px;"><span style="opacity:.6;">✎ ${timeAgo(entry.updated)}</span></div>`
    : '';
  const createdHtml = entry.created ? `<div class="entry-meta" style="margin-top:10px;"><span>${new Date(entry.created).toLocaleDateString()}</span></div>` : '';
  const actions = `
    <div class="entry-detail-actions">
      <button class="entry-action-btn" onclick="togglePinFromDetail()" title="${entry.pinned ? 'Unpin' : 'Pin'}">⚑</button>
      <button class="entry-action-btn" onclick="openEditFromDetail()" title="Edit">✎</button>
      <button class="entry-action-btn del" onclick="deleteFromDetail()" title="Delete">✕</button>
    </div>`;
  const pathHtml = `
    <span class="path-link" onclick="closeEntryDetail();showLokiHome()">Loci</span>
    <span class="bc-sep">›</span>
    <span class="path-link" onclick="closeEntryDetail();openLocusPage('${escAttr(meta.locusId)}')">${escHtml(meta.locusName)}</span>
    <span class="bc-sep">›</span>
    <span class="path-link" onclick="closeEntryDetail();openTopicPage('${escAttr(meta.locusId)}','${escAttr(meta.topicId)}')">${escHtml(meta.topicName)}</span>
    <span class="bc-sep">›</span>
    <span class="path-link" onclick="closeEntryDetail();selectSubtopic('${escAttr(meta.locusId)}','${escAttr(meta.topicId)}','${escAttr(meta.stName)}','${escAttr(meta.locusName)}','${escAttr(meta.topicName)}')">${escHtml(meta.stName)}</span>
    <span class="bc-sep">›</span>
    <span class="path-current">${escHtml(entry.title||'(untitled)')}</span>`;
  document.getElementById('entry-detail-modal').innerHTML = `
    <div id="entry-detail-head">
      <div class="entry-detail-path">${pathHtml}</div>
      <div id="entry-detail-topbar">
        <span class="sr-sec-badge">${meta.secIcon} ${meta.secName}</span>
        ${actions}
        <button id="entry-detail-close" onclick="closeEntryDetail()">✕</button>
      </div>
      <div class="entry-detail-title">${escHtml(entry.title||'(untitled)')}</div>
    </div>
    <div id="entry-detail-content">
      ${body}
      ${updatedHtml || createdHtml}
      ${tagsHtml ? `<div class="entry-tags">${tagsHtml}</div>` : ''}
    </div>`;
  document.getElementById('entry-detail-overlay').classList.add('open');
}

function closeEntryDetail() {
  document.getElementById('entry-detail-overlay').classList.remove('open');
  currentDetailState = null;
}
function closeEntryDetailOnOverlay(e) {
  if (e.target === document.getElementById('entry-detail-overlay')) closeEntryDetail();
}
function togglePinFromDetail() {
  if (!currentDetailState) return;
  const s = currentDetailState;
  togglePin(s.stKey, s.secId, s.entryId);
  if (currentSubtopicKey === s.stKey) renderSubtopicView();
  if (currentTab === 'tags') _buildTagView();
  if (currentTab === 'resource') _buildResourceView();
  openEntryDetail(s.secId, s.entryId, s.stKey);
}
function openEditFromDetail() {
  if (!currentDetailState) return;
  const s = currentDetailState;
  closeEntryDetail();
  setTimeout(() => openEditModal(s.secId, s.entryId, s.stKey), 20);
}
function deleteFromDetail() {
  if (!currentDetailState) return;
  const s = currentDetailState;
  if (confirm('Delete this entry?')) {
    deleteEntry(s.stKey, s.secId, s.entryId);
    closeEntryDetail();
    if (currentSubtopicKey === s.stKey) renderSubtopicView();
    if (currentTab === 'tags') _buildTagView();
    if (currentTab === 'resource') _buildResourceView();
    updateStats();
  }
}

/* ============================================================
   TAG VIEW
============================================================ */
function renderTagView() {
  hideAllViews();
  tagViewTypeFilters = new Set();
  document.getElementById('tag-view').style.display = 'block';
  document.getElementById('breadcrumb').innerHTML = `<span class="bc-item current">Browse by Tag</span>`;
  _buildTagView();
}

function _buildTagView() {
  const el = document.getElementById('tag-view');
  // gather tag → entries map
  const tagMap = {};
  allEntries().forEach(({stKey, secId, entry}) => {
    (entry.tags||[]).forEach(t => {
      if (!tagMap[t]) tagMap[t] = [];
      tagMap[t].push({stKey, secId, entry});
    });
  });
  const sortedTags = Object.keys(tagMap).sort();

  if (!sortedTags.length) {
    el.innerHTML = `<h2>Browse by Tag</h2><div class="empty-state">No tags yet. Add entries with tags to browse here.</div>`;
    return;
  }

  let pillsHtml = sortedTags.map(t => {
    const cnt = tagMap[t].length;
    return `<div class="tag-index-pill${activeTagFilter===t?' active':''}" onclick="setTagFilter('${escAttr(t)}')">
      ${escHtml(t)} <span class="tag-count-badge">${cnt}</span>
    </div>`;
  }).join('');

  let resultsHtml = '';
  if (activeTagFilter && tagMap[activeTagFilter]) {
    const items = tagMap[activeTagFilter];
    // Type filter bar
    const typeBar = `<div class="resource-filter-bar" style="margin-bottom:12px;">
      <button class="res-filter-btn${tagViewTypeFilters.size===0?' active':''}" onclick="setTagViewAllFilter()">All</button>
      ${SECTIONS.map(s => {
        const count = items.filter(i => i.secId === s.id).length;
        if (!count) return '';
        return `<button class="res-filter-btn${tagViewTypeFilters.has(s.id)?' active':''}" onclick="setTagViewTypeFilter('${s.id}')">
          ${s.icon} ${s.name.replace(' / Resources','').replace(' / Bookmarks','')} <span style="opacity:.6;font-size:.85em;">${count}</span>
        </button>`;
      }).join('')}
    </div>`;
    // Apply type filter
    const visible = (tagViewTypeFilters.size === 0)
      ? items
      : items.filter(i => tagViewTypeFilters.has(i.secId));
    resultsHtml = typeBar;
    resultsHtml += `<div class="tag-results-header">— ${escHtml(activeTagFilter)} — ${visible.length} entr${visible.length!==1?'ies':'y'}</div>`;
    resultsHtml += visible.map(({stKey, secId, entry}) => renderEntryCard(entry, secId, stKey, true)).join('');
  } else if (activeTagFilter) {
    resultsHtml = `<div class="empty-state">No entries for tag "${escHtml(activeTagFilter)}".</div>`;
  } else {
    resultsHtml = `<div class="empty-state" style="padding:16px 0;">Select a tag above to see all entries with that tag.</div>`;
  }

  el.innerHTML = `<h2>Browse by Tag</h2>
    <div class="tag-index-grid">${pillsHtml}</div>
    <div id="tag-results">${resultsHtml}</div>`;
}

function setTagFilter(tag) {
  activeTagFilter = (activeTagFilter === tag) ? null : tag;
  _buildTagView();
}

function filterByTag(tag) {
  activeTagFilter = tag;
  currentTab = 'tags';
  ['loki','tags','resource'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t === 'tags'));
  renderTagView();
}

/* ============================================================
   RESOURCE / TYPE VIEW
============================================================ */
function renderResourceView() {
  hideAllViews();
  document.getElementById('resource-view').style.display = 'block';
  document.getElementById('breadcrumb').innerHTML = `<span class="bc-item current">Browse by Resource Type</span>`;
  _buildResourceView();
}

function _buildResourceView() {
  const el = document.getElementById('resource-view');

  // Filter bar
  const filterBtns = SECTIONS.map(s =>
    `<button class="res-filter-btn${activeResFilters.has(s.id)?' active':''}" onclick="toggleResFilter('${s.id}')">
      ${s.icon} ${s.name.replace(' / Resources','').replace(' / Bookmarks','')}
    </button>`
  ).join('');

  // Sort options
  const sortOpts = `<select class="res-sort-select" id="res-sort" onchange="resSortBy=this.value;_buildResourceView()">
    <option value="created"${resSortBy==='created'?' selected':''}>Newest</option>
    <option value="title"${resSortBy==='title'?' selected':''}>Title A–Z</option>
    <option value="author"${resSortBy==='author'?' selected':''}>Author</option>
    <option value="section"${resSortBy==='section'?' selected':''}>Type</option>
  </select>`;

  // Gather entries
  let entries = allEntries().filter(({secId}) => activeResFilters.has(secId));

  // Text search
  if (resSearchQuery) {
    const ql = resSearchQuery.toLowerCase();
    entries = entries.filter(({entry}) => JSON.stringify(entry).toLowerCase().includes(ql));
  }

  // Sort
  if (resSortBy === 'title') entries.sort((a,b) => (a.entry.title||'').localeCompare(b.entry.title||''));
  else if (resSortBy === 'author') entries.sort((a,b) => (a.entry.author||'').localeCompare(b.entry.author||''));
  else if (resSortBy === 'section') entries.sort((a,b) => a.secId.localeCompare(b.secId));
  else entries.sort((a,b) => (b.entry.created||0) - (a.entry.created||0));

  const entriesHtml = entries.length
    ? entries.map(({stKey, secId, entry}) => renderEntryCard(entry, secId, stKey, true)).join('')
    : `<div class="empty-state">No entries match the current filters.</div>`;

  el.innerHTML = `<h2>Browse by Resource Type</h2>
    <div class="resource-filter-bar">
      ${filterBtns}
      <div class="res-sort-wrap">
        <span class="res-sort-label">Sort:</span>
        ${sortOpts}
      </div>
    </div>
    <div class="resource-filter-bar" style="margin-top:-6px;margin-bottom:12px;">
      <div class="res-search-wrap">
        <input class="res-search" id="res-search-input" type="text" placeholder="Search within filtered results…"
          value="${escHtml(resSearchQuery)}" oninput="resSearchQuery=this.value;_buildResourceView()">
        <span class="search-icon" style="font-size:12px;">⌕</span>
      </div>
      <span style="font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.08em;color:var(--text3);margin-left:8px;">${entries.length} result${entries.length!==1?'s':''}</span>
    </div>
    <div id="res-results">${entriesHtml}</div>`;
}

function toggleResFilter(secId) {
  if (activeResFilters.has(secId)) {
    if (activeResFilters.size > 1) activeResFilters.delete(secId);
  } else {
    activeResFilters.add(secId);
  }
  _buildResourceView();
}

/* ============================================================
   ADD MODAL — DESTINATION HELPERS
============================================================ */
function getRecentDests() {
  try { return JSON.parse(localStorage.getItem('5sa_rdests') || '[]'); } catch { return []; }
}
function saveRecentDest(locusId, topicId, stName) {
  const k = `${locusId}||${topicId}||${stName}`;
  let r = getRecentDests().filter(x => x.k !== k);
  r.unshift({ k, locusId, topicId, stName });
  localStorage.setItem('5sa_rdests', JSON.stringify(r.slice(0, 6)));
}
function pathLabel(locusId, topicId, stName) {
  const tree = getFullTree();
  const l = tree.find(x => x.id === locusId);
  const t = l?.topics.find(x => x.id === topicId);
  return `${l?.name || locusId} › ${t?.name || topicId} › ${stName}`;
}
function allDestPaths() {
  const out = [];
  getFullTree().forEach(l => l.topics.forEach(t => t.subtopics.forEach(st => {
    out.push({ locusId: l.id, topicId: t.id, stName: st,
               label: `${l.name} › ${t.name} › ${st}`,
               parentLabel: `${l.name} › ${t.name}` });
  })));
  return out;
}

/* ============================================================
   QUICK ADD MODAL (no sidebar navigation required)
============================================================ */
function openQuickAddModal() {
  // Auto-set destination from current subtopic or fall back to most recent
  if (currentSubtopicKey) {
    const parts = currentSubtopicKey.split('__');
    addDestLocusId = parts[0];
    addDestTopicId = parts[1];
    addDestStName  = (parts[2] || '').replace(/_/g, ' ');
  } else {
    const recent = getRecentDests();
    if (recent.length) {
      addDestLocusId = recent[0].locusId;
      addDestTopicId = recent[0].topicId;
      addDestStName  = recent[0].stName;
    } else {
      addDestLocusId = addDestTopicId = addDestStName = null;
    }
  }

  const hasDest = !!(addDestLocusId && addDestTopicId && addDestStName);
  const secId   = SECTIONS[0].id;

  modalState = { mode: 'quickAdd' };
  document.getElementById('modal-title').textContent = 'Add Entry';
  document.getElementById('modal-body').innerHTML = _buildAddModalHtml(hasDest, secId);

  document.getElementById('modal-overlay').classList.add('open');
  focusFirstModalField();

  // If no destination yet, open the picker and focus search
  if (!hasDest) {
    document.getElementById('qa-dest-picker').classList.add('open');
    _qaDestSearch('');
    setTimeout(() => document.getElementById('qa-dest-search-input')?.focus(), 80);
  }

  // Populate advanced selectors
  updateQATopics();
  if (hasDest) focusFirstModalInput();
}

function _buildAddModalHtml(hasDest, secId) {
  const destLabel = hasDest ? escHtml(pathLabel(addDestLocusId, addDestTopicId, addDestStName)) : '';
  const tree = getFullTree();
  const locusOpts = tree.map(l => `<option value="${l.id}">${escHtml(l.name)}</option>`).join('');

  return `
    <div class="qa-dest-bar">
      <span class="qa-dest-label">Destination</span>
      ${hasDest
        ? `<span class="qa-dest-path" id="qa-dest-display">${destLabel}</span>
           <button class="qa-dest-btn" id="qa-dest-btn" onclick="toggleQADestPicker()">Change</button>`
        : `<span class="qa-dest-path" id="qa-dest-display" style="color:var(--text3);font-style:italic;">None chosen</span>
           <button class="qa-dest-btn" id="qa-dest-btn" onclick="toggleQADestPicker()">Choose…</button>`
      }
    </div>
    <div id="qa-dest-picker" class="qa-dest-picker">
      <input class="qa-dest-search" id="qa-dest-search-input" type="text"
        placeholder="Search destinations…" autocomplete="off"
        oninput="_qaDestSearch(this.value)">
      <div id="qa-recent-dests">${_buildRecentDestsHtml()}</div>
      <div id="qa-dest-results"></div>
      <details class="qa-create-dest">
        <summary>Create new destination</summary>
        <div class="qa-create-sel-group">
          <div class="qa-field-wrap">
            <label class="form-label">Locus</label>
            <div class="qa-row">
              <select class="form-select" id="qa_locus" onchange="updateQATopics()">${locusOpts}</select>
              <button class="qa-add-btn" onclick="toggleQAInline('locus')" title="New locus">+</button>
            </div>
            <div class="qa-inline-form" id="qa_inline_locus">
              <input type="text" id="qa_new_locus" placeholder="New locus name…" onkeydown="if(event.key==='Enter')saveQALocus()">
              <button class="btn btn-primary" onclick="saveQALocus()">Add</button>
              <button class="btn btn-secondary" onclick="toggleQAInline('locus',false)">✕</button>
            </div>
          </div>
          <div class="qa-field-wrap">
            <label class="form-label">Topic</label>
            <div class="qa-row">
              <select class="form-select" id="qa_topic" onchange="updateQASubtopics()"></select>
              <button class="qa-add-btn" onclick="toggleQAInline('topic')" title="New topic">+</button>
            </div>
            <div class="qa-inline-form" id="qa_inline_topic">
              <input type="text" id="qa_new_topic" placeholder="New topic name…" onkeydown="if(event.key==='Enter')saveQATopic()">
              <button class="btn btn-primary" onclick="saveQATopic()">Add</button>
              <button class="btn btn-secondary" onclick="toggleQAInline('topic',false)">✕</button>
            </div>
          </div>
          <div class="qa-field-wrap">
            <label class="form-label">Subtopic</label>
            <div class="qa-row">
              <select class="form-select" id="qa_subtopic"></select>
              <button class="qa-add-btn" onclick="toggleQAInline('subtopic')" title="New subtopic">+</button>
            </div>
            <div class="qa-inline-form" id="qa_inline_subtopic">
              <input type="text" id="qa_new_subtopic" placeholder="New subtopic name…" onkeydown="if(event.key==='Enter')saveQASubtopic()">
              <button class="btn btn-primary" onclick="saveQASubtopic()">Add</button>
              <button class="btn btn-secondary" onclick="toggleQAInline('subtopic',false)">✕</button>
            </div>
          </div>
          <button class="qa-use-dest-btn" onclick="applyQACreate()">Use This Destination</button>
        </div>
      </details>
    </div>
    <div class="form-group">
      <label class="form-label">Resource Type</label>
      <select class="form-select" id="qa_section" onchange="_qaUpdateForm()">
        ${SECTIONS.map(s => `<option value="${s.id}">${s.icon} ${s.name}</option>`).join('')}
      </select>
    </div>
    <div id="qa_form">${buildFormHtml(secId, null)}</div>
  `;
}

function toggleQADestPicker() {
  const picker = document.getElementById('qa-dest-picker');
  const opening = !picker.classList.contains('open');
  picker.classList.toggle('open', opening);
  if (opening) {
    const inp = document.getElementById('qa-dest-search-input');
    if (inp) { inp.value = ''; _qaDestSearch(''); setTimeout(() => inp.focus(), 50); }
  }
}

function _qaDestSearch(q) {
  const results = document.getElementById('qa-dest-results');
  if (!results) return;
  const ql = q.trim().toLowerCase();
  if (!ql) { results.innerHTML = ''; return; }
  const paths = allDestPaths();
  const filtered = paths.filter(p => p.label.toLowerCase().includes(ql));
  if (filtered.length) {
    results.innerHTML = filtered.slice(0, 12).map(p =>
      `<button class="qa-dest-result" onclick="pickQADest('${escAttr(p.locusId)}','${escAttr(p.topicId)}','${escAttr(p.stName)}')">
        <span class="qa-dest-result-path">${escHtml(p.parentLabel)}</span>
        <span class="qa-dest-result-sub">${escHtml(p.stName)}</span>
      </button>`
    ).join('');
  } else {
    results.innerHTML = `<div class="qa-no-results">No match — use "Create new destination" below</div>`;
  }
}

function pickQADest(locusId, topicId, stName) {
  addDestLocusId = locusId;
  addDestTopicId = topicId;
  addDestStName  = stName;
  const disp = document.getElementById('qa-dest-display');
  const btn  = document.getElementById('qa-dest-btn');
  if (disp) { disp.textContent = pathLabel(locusId, topicId, stName); disp.style.fontStyle = ''; disp.style.color = ''; }
  if (btn)  { btn.textContent = 'Change'; }
  document.getElementById('qa-dest-picker')?.classList.remove('open');
}

function _buildRecentDestsHtml() {
  const recent = getRecentDests();
  if (!recent.length) return '';
  return `<div class="qa-recent-label">Recent</div>` +
    recent.map(r => {
      const tree = getFullTree();
      const l = tree.find(x => x.id === r.locusId);
      const t = l?.topics.find(x => x.id === r.topicId);
      const parentLabel = `${l?.name || r.locusId} › ${t?.name || r.topicId}`;
      return `<button class="qa-dest-recent-item" onclick="pickQADest('${escAttr(r.locusId)}','${escAttr(r.topicId)}','${escAttr(r.stName)}')">
        <span class="qa-dest-recent-path">${escHtml(parentLabel)}</span>
        <span class="qa-dest-recent-sub">${escHtml(r.stName)}</span>
      </button>`;
    }).join('');
}

function applyQACreate() {
  const locusId = document.getElementById('qa_locus')?.value;
  const topicId = document.getElementById('qa_topic')?.value;
  const stName  = document.getElementById('qa_subtopic')?.value;
  if (!locusId || !topicId || !stName) { alert('Please select a complete Locus › Topic › Subtopic.'); return; }
  pickQADest(locusId, topicId, stName);
}

function _qaUpdateForm() {
  const secId = document.getElementById('qa_section')?.value;
  if (!secId) return;
  document.getElementById('qa_form').innerHTML = buildFormHtml(secId, null);
}

function updateQATopics() {
  const locusId = document.getElementById('qa_locus')?.value;
  const locus = getFullTree().find(l => l.id === locusId);
  if (!locus) return;
  const sel = document.getElementById('qa_topic');
  sel.innerHTML = locus.topics.map(t => `<option value="${t.id}">${escHtml(t.name)}</option>`).join('');
  updateQASubtopics();
}
function updateQASubtopics() {
  const locusId = document.getElementById('qa_locus')?.value;
  const topicId = document.getElementById('qa_topic')?.value;
  const locus = getFullTree().find(l => l.id === locusId);
  const topic = locus?.topics.find(t => t.id === topicId);
  if (!topic) return;
  const sel = document.getElementById('qa_subtopic');
  sel.innerHTML = topic.subtopics.map(st => `<option value="${escAttr(st)}">${escHtml(st)}</option>`).join('');
}

/* ============================================================
   QUICK ADD INLINE + BUTTONS
============================================================ */
function toggleQAInline(type, forceOpen) {
  const el = document.getElementById('qa_inline_' + type);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  const shouldOpen = forceOpen !== undefined ? forceOpen : !isOpen;
  el.classList.toggle('open', shouldOpen);
  if (shouldOpen) {
    const inp = document.getElementById('qa_new_' + type);
    if (inp) { inp.value = ''; setTimeout(() => inp.focus(), 50); }
  }
}

function saveQALocus() {
  const name = document.getElementById('qa_new_locus')?.value.trim();
  if (!name) return;
  if (isDuplicateNodeName(getFullTree().map(l => l.name), name)) { alert('That locus already exists.'); return; }
  const newId = 'lc_' + Date.now().toString(36);
  TREE.push({ id: newId, name, topics: [] });
  saveTreeSnapshot();
  toggleQAInline('locus', false);
  // Rebuild locus dropdown and select new one
  const sel = document.getElementById('qa_locus');
  if (sel) {
    const opt = document.createElement('option');
    opt.value = newId; opt.textContent = name; opt.selected = true;
    sel.appendChild(opt);
    updateQATopics();
  }
  renderTree(); updateStats();
}

function saveQATopic() {
  const name = document.getElementById('qa_new_topic')?.value.trim();
  const locusId = document.getElementById('qa_locus')?.value;
  if (!name || !locusId) return;
  const locus = getFullTree().find(l => l.id === locusId);
  if (!locus) return;
  if (isDuplicateNodeName(locus.topics.map(t => t.name), name)) { alert('That topic already exists in this locus.'); return; }
  const newId = 't_' + Date.now().toString(36);
  locus.topics.push({ id: newId, name, subtopics: [] });
  saveTreeSnapshot();
  toggleQAInline('topic', false);
  // Rebuild topic dropdown and select new one
  const sel = document.getElementById('qa_topic');
  if (sel) {
    const opt = document.createElement('option');
    opt.value = newId; opt.textContent = name; opt.selected = true;
    sel.appendChild(opt);
    updateQASubtopics();
  }
  renderTree(); updateStats();
}

function saveQASubtopic() {
  const name = document.getElementById('qa_new_subtopic')?.value.trim();
  const locusId = document.getElementById('qa_locus')?.value;
  const topicId = document.getElementById('qa_topic')?.value;
  if (!name || !locusId || !topicId) return;
  const locus = getFullTree().find(l => l.id === locusId);
  const topic = locus?.topics.find(t => t.id === topicId);
  if (!topic) return;
  if (isDuplicateNodeName(topic.subtopics, name)) { alert('That subtopic already exists in this topic.'); return; }
  topic.subtopics.push(name);
  saveTreeSnapshot();
  toggleQAInline('subtopic', false);
  // Rebuild subtopic dropdown and select new one
  const sel = document.getElementById('qa_subtopic');
  if (sel) {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name; opt.selected = true;
    sel.appendChild(opt);
  }
  renderTree();
}
// updateQAForm retained for compatibility; _qaUpdateForm is the new version
