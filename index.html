    }
  },
  {
    "locusId": "l10",
    "topicId": "t10g",
    "subtopicName": "Privileges of Adoption",
    "sectionId": "confessional",
    "entry": {
      "title": "Adoption Grants the Privileges of God\u2019s Children",
      "text": "All those that are justified, God vouchsafed, in and for the sake of his only Son Jesus Christ, to make partakers of the grace of adoption, by which they are taken into the number, and enjoy the liberties and privileges of the children of God, have his name put upon them, receive the spirit of adoption, have access to the throne of grace with boldness, are enabled to cry Abba, Father, are pitied, protected, provided for, and chastened by him as by a Father, yet never cast off, but sealed to the day of redemption, and inherit the promises as heirs of everlasting salvation.",
      "confession": "London Baptist Confession 1689",
      "chapter": "12.1",
      "proofs": "Ephesians 1:5; Galatians 4:4, 5; John 1:12; Romans 8:17; 2 Corinthians 6:18; Revelation 3:12; Romans 8:15; Galatians 4:6; Ephesians 2:18; Psalms 103:13; Proverbs 14:26; 1 Peter 5:7; Hebrews 12:6; Isaiah 54:8, 9; Lamentations 3:31; Ephesians 4:30; Hebrews 1:14; Hebrews 6:12",
      "tags": [
        "London Baptist Confession 1689",
        "Adoption",
        "Privileges of Adoption",
        "Children of God"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10h",
    "subtopicName": "Progressive Sanctification",
    "sectionId": "confessional",
    "entry": {
      "title": "Believers Are Truly and Progressively Sanctified",
      "text": "They who are united to Christ, effectually called, and regenerated, having a new heart and a new spirit created in them through the virtue of Christ's death and resurrection, are also farther sanctified, really and personally, through the same virtue, by His Word and Spirit dwelling in them; the dominion of the whole body of sin is destroyed, and the several lusts thereof are more and more weakened and mortified, and they more and more quickened and strengthened in all saving graces, to the practice of all true holiness, without which no man shall see the Lord.",
      "confession": "London Baptist Confession 1689",
      "chapter": "13.1",
      "proofs": "Acts 20:32; Romans 6:5, 6; John 17:17; Ephesians 3:16-19; 1 Thessalonians 5:21-23; Romans 6:14; Galatians 5:24; Colossians 1:11; 2 Corinthians 7:1; Hebrews 12:14",
      "tags": [
        "London Baptist Confession 1689",
        "Sanctification",
        "Progressive Sanctification",
        "Holiness"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10h",
    "subtopicName": "Progressive Sanctification",
    "sectionId": "confessional",
    "entry": {
      "title": "Sanctification Remains Imperfect in This Life",
      "text": "This sanctification is throughout the whole man, yet imperfect in this life; there abideth still some remnants of corruption in every part, whence ariseth a continual and irreconcilable war; the flesh lusting against the Spirit, and the Spirit against the flesh.",
      "confession": "London Baptist Confession 1689",
      "chapter": "13.2",
      "proofs": "1 Thessalonians 5:23; Romans 7:18, 23; Galatians 5:17; 1 Peter 2:11",
      "tags": [
        "London Baptist Confession 1689",
        "Sanctification",
        "Progressive Sanctification",
        "Conflict with Sin"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10h",
    "subtopicName": "Means of Sanctification",
    "sectionId": "confessional",
    "entry": {
      "title": "The Regenerate Overcome through the Spirit\u2019s Strength",
      "text": "In which war, although the remaining corruption for a time may much prevail, yet through the continual supply of strength from the sanctifying Spirit of Christ, the regenerate part doth overcome; and so the saints grow in grace, perfecting holiness in the fear of God, pressing after an heavenly life, in evangelical obedience to all the commands which Christ as Head and King, in His Word hath prescribed them.",
      "confession": "London Baptist Confession 1689",
      "chapter": "13.3",
      "proofs": "Romans 7:23; Romans 6:14; Ephesians 4:15, 16; 2 Corinthians 3:18; 2 Corinthians 7:1",
      "tags": [
        "London Baptist Confession 1689",
        "Sanctification",
        "Means of Sanctification",
        "Growth in Grace"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10e",
    "subtopicName": "Saving Faith: Nature",
    "sectionId": "confessional",
    "entry": {
      "title": "Saving Faith Is Wrought and Strengthened by Means of Grace",
      "text": "The grace of faith, whereby the elect are enabled to believe to the saving of their souls, is the work of the Spirit of Christ in their hearts, and is ordinarily wrought by the ministry of the Word; by which also, and by the administration of baptism and the Lord's supper, prayer, and other means appointed of God, it is increased and strengthened.",
      "confession": "London Baptist Confession 1689",
      "chapter": "14.1",
      "proofs": "2 Corinthians 4:13; Ephesians 2:8; Romans 10:14, 17; Luke 17:5; 1 Peter 2:2; Acts 20:32",
      "tags": [
        "London Baptist Confession 1689",
        "Saving Faith",
        "Saving Faith: Nature",
        "Means of Grace"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10e",
    "subtopicName": "Saving Faith: Object",
    "sectionId": "confessional",
    "entry": {
      "title": "Saving Faith Receives and Rests on Christ",
      "text": "By this faith a Christian believeth to be true whatsoever is revealed in the Word for the authority of God himself, and also apprehendeth an excellency therein above all other writings and all things in the world, as it bears forth the glory of God in his attributes, the excellency of Christ in his nature and offices, and the power and fullness of the Holy Spirit in his workings and operations: and so is enabled to cast his soul upon the truth thus believed; and also acteth differently upon that which each particular passage thereof containeth; yielding obedience to the commands, trembling at the threatenings, and embracing the promises of God for this life and that which is to come; but the principal acts of saving faith have immediate relation to Christ, accepting, receiving, and resting upon him alone for justification, sanctification, and eternal life, by virtue of the covenant of grace.",
      "confession": "London Baptist Confession 1689",
      "chapter": "14.2",
      "proofs": "Acts 24:14; Psalms 27:7-10; Psalms 119:72; 2 Timothy 1:12; John 14:14; Isaiah 66:2; Hebrews 11:13; John 1:12; Acts 16:31; Galatians 2:20; Acts 15:11",
      "tags": [
        "London Baptist Confession 1689",
        "Saving Faith",
        "Saving Faith: Object",
        "Christ"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10e",
    "subtopicName": "Saving Faith: Nature",
    "sectionId": "confessional",
    "entry": {
      "title": "Saving Faith Varies in Degree yet Overcomes",
      "text": "This faith, although it be different in degrees, and may be weak or strong, yet it is in the least degree of it different in the kind or nature of it, as is all other saving grace, from the faith and common grace of temporary believers; and therefore, though it may be many times assailed and weakened, yet it gets the victory, growing up in many to the attainment of a full assurance through Christ, who is both the author and finisher of our faith.",
      "confession": "London Baptist Confession 1689",
      "chapter": "14.3",
      "proofs": "Hebrews 5:13, 14; Matthew 6:30; Romans 4:19, 20; 2 Peter 1:1; Ephesians 6:16; 1 John 5:4, 5; Hebrews 6:11, 12; Colossians 2:2; Hebrews 12:2",
      "tags": [
        "London Baptist Confession 1689",
        "Saving Faith",
        "Saving Faith: Nature",
        "Assurance"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10e",
    "subtopicName": "True Repentance",
    "sectionId": "confessional",
    "entry": {
      "title": "God Gives Repentance unto Life",
      "text": "Such of the elect as are converted at riper years, having sometime lived in the state of nature, and therein served divers lusts and pleasures, God in their effectual calling giveth them repentance unto life.",
      "confession": "London Baptist Confession 1689",
      "chapter": "15.1",
      "proofs": "Titus 3:2-5",
      "tags": [
        "London Baptist Confession 1689",
        "Repentance",
        "True Repentance",
        "Conversion"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10e",
    "subtopicName": "True Repentance",
    "sectionId": "confessional",
    "entry": {
      "title": "Believers Who Fall Are Renewed by Repentance",
      "text": "Whereas there is none that doth good and sinneth not, and the best of men may, through the power and deceitfulness of their corruption dwelling in them, with the prevalency of temptation, fall into great sins and provocations; God hath, in the covenant of grace, mercifully provided that believers so sinning and falling be renewed through repentance unto salvation.",
      "confession": "London Baptist Confession 1689",
      "chapter": "15.2",
      "proofs": "Ecclesiastes 7:20; Luke 22:31, 32",
      "tags": [
        "London Baptist Confession 1689",
        "Repentance",
        "True Repentance",
        "Believers"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10e",
    "subtopicName": "True Repentance",
    "sectionId": "confessional",
    "entry": {
      "title": "Saving Repentance Includes Sorrow, Hatred of Sin, and New Obedience",
      "text": "This saving repentance is an evangelical grace, whereby a person, being by the Holy Spirit made sensible of the manifold evils of his sin, doth, by faith in Christ, humble himself for it with godly sorrow, detestation of it, and self-abhorrency, praying for pardon and strength of grace, with a purpose and endeavour, by supplies of the Spirit, to walk before God unto all well-pleasing in all things.",
      "confession": "London Baptist Confession 1689",
      "chapter": "15.3",
      "proofs": "Zechariah 12:10; Acts 11:18; Ezekiel 36:31; 2 Corinthians 7:11; Psalms 119:6; Psalms 119:128",
      "tags": [
        "London Baptist Confession 1689",
        "Repentance",
        "True Repentance",
        "Evangelical Grace"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10e",
    "subtopicName": "True Repentance",
    "sectionId": "confessional",
    "entry": {
      "title": "Repentance Must Continue through the Whole Christian Life",
      "text": "As repentance is to be continued through the whole course of our lives, upon the account of the body of death, and the motions thereof, so it is every man's duty to repent of his particular known sins particularly.",
      "confession": "London Baptist Confession 1689",
      "chapter": "15.4",
      "proofs": "Luke 19:8; 1 Timothy 1:13, 15",
      "tags": [
        "London Baptist Confession 1689",
        "Repentance",
        "True Repentance",
        "Particular Sins"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10e",
    "subtopicName": "True Repentance",
    "sectionId": "confessional",
    "entry": {
      "title": "No Sin Is Too Great to Damn the Repentant",
      "text": "Such is the provision which God hath made through Christ in the covenant of grace for the preservation of believers unto salvation; that although there is no sin so small but it deserves damnation; yet there is no sin so great that it shall bring damnation on them that repent; which makes the constant preaching of repentance necessary.",
      "confession": "London Baptist Confession 1689",
      "chapter": "15.5",
      "proofs": "Romans 6:23; Isaiah 1:16-18 Isaiah 55:7",
      "tags": [
        "London Baptist Confession 1689",
        "Repentance",
        "True Repentance",
        "Preaching"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10h",
    "subtopicName": "Means of Sanctification",
    "sectionId": "confessional",
    "entry": {
      "title": "Good Works Are Only What God Commands",
      "text": "Good works are only such as God hath commanded in his Holy Word, and not such as without the warrant thereof are devised by men out of blind zeal, or upon any pretence of good intentions.",
      "confession": "London Baptist Confession 1689",
      "chapter": "16.1",
      "proofs": "Micah 6:8; Hebrews 13:21; Matthew 15:9; Isaiah 29:13",
      "tags": [
        "London Baptist Confession 1689",
        "Good Works",
        "Means of Sanctification",
        "God's Commandments"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10h",
    "subtopicName": "Means of Sanctification",
    "sectionId": "confessional",
    "entry": {
      "title": "Good Works Are the Fruit and Evidence of True Faith",
      "text": "These good works, done in obedience to God's commandments, are the fruits and evidences of a true and lively faith; and by them believers manifest their thankfulness, strengthen their assurance, edify their brethren, adorn the profession of the gospel, stop the mouths of the adversaries, and glorify God, whose workmanship they are, created in Christ Jesus thereunto, that having their fruit unto holiness they may have the end eternal life.",
      "confession": "London Baptist Confession 1689",
      "chapter": "16.2",
      "proofs": "James 2:18, 22; Psalms 116:12, 13; 1 John 2:3, 5; 2 Peter 1:5-11; Matthew 5:16; 1 Timothy 6:1; 1 Peter 2:15; Philippians 1:11; Ephesians 2:10; Romans 6:22",
      "tags": [
        "London Baptist Confession 1689",
        "Good Works",
        "Means of Sanctification",
        "Fruit of Faith"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10h",
    "subtopicName": "Means of Sanctification",
    "sectionId": "confessional",
    "entry": {
      "title": "Believers Do Good Works by the Spirit\u2019s Power",
      "text": "Their ability to do good works is not at all of themselves, but wholly from the Spirit of Christ; and that they may be enabled thereunto, besides the graces they have already received, there is necessary an actual influence of the same Holy Spirit, to work in them to will and to do of his good pleasure; yet they are not hereupon to grow negligent, as if they were not bound to perform any duty, unless upon a special motion of the Spirit, but they ought to be diligent in stirring up the grace of God that is in them.",
      "confession": "London Baptist Confession 1689",
      "chapter": "16.3",
      "proofs": "John 15:4, 5; 2 Corinthians 3:5; Philippians 2:13; Philippians 2:12; Hebrews 6:11, 12; Isaiah 64:7",
      "tags": [
        "London Baptist Confession 1689",
        "Good Works",
        "Means of Sanctification",
        "Holy Spirit"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10h",
    "subtopicName": "Perfectionism Refuted",
    "sectionId": "confessional",
    "entry": {
      "title": "Even the Best Saints Cannot Do More than Duty Requires",
      "text": "They who in their obedience attain to the greatest height which is possible in this life, are so far from being able to supererogate, and to do more than God requires, as that they fall short of much which in duty they are bound to do.",
      "confession": "London Baptist Confession 1689",
      "chapter": "16.4",
      "proofs": "Job 9:2, 3; Galatians 5:17; Luke 17:10",
      "tags": [
        "London Baptist Confession 1689",
        "Good Works",
        "Perfectionism Refuted",
        "Supererogation"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10h",
    "subtopicName": "Perfectionism Refuted",
    "sectionId": "confessional",
    "entry": {
      "title": "Good Works Cannot Merit Pardon or Eternal Life",
      "text": "We cannot by our best works merit pardon of sin or eternal life at the hand of God, by reason of the great disproportion that is between them and the glory to come, and the infinite distance that is between us and God, whom by them we can neither profit nor satisfy for the debt of our former sins; but when we have done all we can, we have done but our duty, and are unprofitable servants; and because as they are good they proceed from his Spirit, and as they are wrought by us they are defiled and mixed with so much weakness and imperfection, that they cannot endure the severity of God's punishment.",
      "confession": "London Baptist Confession 1689",
      "chapter": "16.5",
      "proofs": "Romans 3:20; Ephesians 2:8, 9; Romans 4:6; Galatians 5:22, 23; Isaiah 64:6; Psalms 143:2",
      "tags": [
        "London Baptist Confession 1689",
        "Good Works",
        "Perfectionism Refuted",
        "Merit"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10h",
    "subtopicName": "Means of Sanctification",
    "sectionId": "confessional",
    "entry": {
      "title": "God Accepts Believers\u2019 Good Works in Christ",
      "text": "Yet notwithstanding the persons of believers being accepted through Christ, their good works also are accepted in him; not as though they were in this life wholly unblameable and unreprovable in God's sight, but that he, looking upon them in his Son, is pleased to accept and reward that which is sincere, although accompanied with many weaknesses and imperfections.",
      "confession": "London Baptist Confession 1689",
      "chapter": "16.6",
      "proofs": "Ephesians 1:6; 1 Peter 2:5; Matthew 25:21, 23; Hebrews 6:10",
      "tags": [
        "London Baptist Confession 1689",
        "Good Works",
        "Means of Sanctification",
        "Accepted in Christ"
      ]
    }
  },
  {
    "locusId": "l7",
    "topicId": "t7e",
    "subtopicName": "Total Depravity",
    "sectionId": "confessional",
    "entry": {
      "title": "Works of the Unregenerate Cannot Please God",
      "text": "Works done by unregenerate men, although for the matter of them they may be things which God commands, and of good use both to themselves and others; yet because they proceed not from a heart purified by faith, nor are done in a right manner according to the word, nor to a right end, the glory of God, they are therefore sinful, and cannot please God, nor make a man meet to receive grace from God, and yet their neglect of them is more sinful and displeasing to God.",
      "confession": "London Baptist Confession 1689",
      "chapter": "16.7",
      "proofs": "2 Kings 10:30; 1 Kings 21:27, 29; Genesis 4:5; Hebrews 11:4, 6; 1 Corinthians 13:1; Matthew 6:2, 5; Amos 5:21, 22; Romans 9:16; Titus 3:5; Job 21:14, 15; Matthew 25:41-43",
      "tags": [
        "London Baptist Confession 1689",
        "Good Works",
        "Total Depravity",
        "Unregenerate"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10i",
    "subtopicName": "Perseverance of the Saints",
    "sectionId": "confessional",
    "entry": {
      "title": "The Saints Can Neither Totally nor Finally Fall Away",
      "text": "Those whom God hath accepted in the beloved, effectually called and sanctified by his Spirit, and given the precious faith of his elect unto, can neither totally nor finally fall from the state of grace, but shall certainly persevere therein to the end, and be eternally saved, seeing the gifts and callings of God are without repentance, whence he still begets and nourisheth in them faith, repentance, love, joy, hope, and all the graces of the Spirit unto immortality; and though many storms and floods arise and beat against them, yet they shall never be able to take them off that foundation and rock which by faith they are fastened upon; notwithstanding, through unbelief and the temptations of Satan, the sensible sight of the light and love of God may for a time be clouded and obscured from them, yet he is still the same, and they shall be sure to be kept by the power of God unto salvation, where they shall enjoy their purchased possession, they being engraven upon the palm of his hands, and their names having been written in the book of life from all eternity.",
      "confession": "London Baptist Confession 1689",
      "chapter": "17.1",
      "proofs": "John 10:28, 29; Philippians 1:6; 2 Timothy 2:19; 1 John 2:19; Psalms 89:31, 32; 1 Corinthians 11:32; Malachi 3:6",
      "tags": [
        "London Baptist Confession 1689",
        "Perseverance",
        "Perseverance of the Saints",
        "Preservation"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10i",
    "subtopicName": "Preservation by God",
    "sectionId": "confessional",
    "entry": {
      "title": "Perseverance Depends on God, Not Free Will",
      "text": "This perseverance of the saints depends not upon their own free will, but upon the immutability of the decree of election, flowing from the free and unchangeable love of God the Father, upon the efficacy of the merit and intercession of Jesus Christ and union with him, the oath of God, the abiding of his Spirit, and the seed of God within them, and the nature of the covenant of grace; from all which ariseth also the certainty and infallibility thereof.",
      "confession": "London Baptist Confession 1689",
      "chapter": "17.2",
      "proofs": "Romans 8:30 Romans 9:11, 16; Romans 5:9, 10; John 14:19; Hebrews 6:17, 18; 1 John 3:9; Jeremiah 32:40",
      "tags": [
        "London Baptist Confession 1689",
        "Perseverance",
        "Preservation by God",
        "Election"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10i",
    "subtopicName": "Preservation by God",
    "sectionId": "confessional",
    "entry": {
      "title": "God Restores His Saints after Grievous Falls",
      "text": "And though they may, through the temptation of Satan and of the world, the prevalency of corruption remaining in them, and the neglect of means of their preservation, fall into grievous sins, and for a time continue therein, whereby they incur God's displeasure and grieve his Holy Spirit, come to have their graces and comforts impaired, have their hearts hardened, and their consciences wounded, hurt and scandalize others, and bring temporal judgments upon themselves, yet shall they renew their repentance and be preserved through faith in Christ Jesus to the end.",
      "confession": "London Baptist Confession 1689",
      "chapter": "17.3",
      "proofs": "Matthew 26:70, 72, 74; Isaiah 64:5, 9; Ephesians 4:30; Psalms 51:10, 12; Psalms 32:3, 4; 2 Samuel 12:14; Luke 22:32, 61, 62",
      "tags": [
        "London Baptist Confession 1689",
        "Perseverance",
        "Preservation by God",
        "Repentance"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10j",
    "subtopicName": "Grounds of Assurance",
    "sectionId": "confessional",
    "entry": {
      "title": "True Believers May Be Assured of Grace and Salvation",
      "text": "Although temporary believers, and other unregenerate men, may vainly deceive themselves with false hopes and carnal presumptions of being in the favour of God and state of salvation, which hope of theirs shall perish; yet such as truly believe in the Lord Jesus, and love him in sincerity, endeavouring to walk in all good conscience before him, may in this life be certainly assured that they are in the state of grace, and may rejoice in the hope of the glory of God, which hope shall never make them ashamed.",
      "confession": "London Baptist Confession 1689",
      "chapter": "18.1",
      "proofs": "Job 8:13, 14; Matthew 7:22, 23; 1 John 2:3; 1 John 3:14, 18, 19, 21, 24; 1 John 5:13; Romans 5:2, 5",
      "tags": [
        "London Baptist Confession 1689",
        "Assurance",
        "Grounds of Assurance",
        "State of Grace"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10j",
    "subtopicName": "Role of the Spirit",
    "sectionId": "confessional",
    "entry": {
      "title": "Assurance Rests on Christ, Grace, and the Spirit\u2019s Witness",
      "text": "This certainty is not a bare conjectural and probable persuasion grounded upon a fallible hope, but an infallible assurance of faith founded on the blood and righteousness of Christ revealed in the Gospel; and also upon the inward evidence of those graces of the Spirit unto which promises are made, and on the testimony of the Spirit of adoption, witnessing with our spirits that we are the children of God; and, as a fruit thereof, keeping the heart both humble and holy.",
      "confession": "London Baptist Confession 1689",
      "chapter": "18.2",
      "proofs": "Hebrews 6:11, 19; Hebrews 6:17, 18; 2 Peter 1:4, 5, 10, 11; Romans 8:15, 16; 1 John 3:1-3",
      "tags": [
        "London Baptist Confession 1689",
        "Assurance",
        "Role of the Spirit",
        "Spirit of Adoption"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10j",
    "subtopicName": "Grounds of Assurance",
    "sectionId": "confessional",
    "entry": {
      "title": "Assurance May Be Attained through Diligent Use of Means",
      "text": "This infallible assurance doth not so belong to the essence of faith, but that a true believer may wait long, and conflict with many difficulties before he be partaker of it; yet being enabled by the Spirit to know the things which are freely given him of God, he may, without extraordinary revelation, in the right use of means, attain thereunto: and therefore it is the duty of every one to give all diligence to make his calling and election sure, that thereby his heart may be enlarged in peace and joy in the Holy Spirit, in love and thankfulness to God, and in strength and cheerfulness in the duties of obedience, the proper fruits of this assurance; -so far is it from inclining men to looseness.",
      "confession": "London Baptist Confession 1689",
      "chapter": "18.3",
      "proofs": "Isaiah 50:10; Psalms 88; Psalms 77:1-12; 1 John 4:13; Hebrews 6:11, 12; Romans 5:1, 2, 5; Romans 14:17; Psalms 119:32; Romans 6:1,2; Titus 2:11, 12, 14",
      "tags": [
        "London Baptist Confession 1689",
        "Assurance",
        "Grounds of Assurance",
        "Diligence"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10j",
    "subtopicName": "False Assurance",
    "sectionId": "confessional",
    "entry": {
      "title": "Assurance May Be Shaken Yet Never Finally Lost",
      "text": "True believers may have the assurance of their salvation divers ways shaken, diminished, and intermitted; as by negligence in preserving of it, by falling into some special sin which woundeth the conscience and grieveth the Spirit; by some sudden or vehement temptation, by God's withdrawing the light of his countenance, and suffering even such as fear him to walk in darkness and to have no light, yet are they never destitute of the seed of God and life of faith, that love of Christ and the brethren, that sincerity of heart and conscience of duty out of which, by the operation of the Spirit, this assurance may in due time be revived, and by the which, in the meantime, they are preserved from utter despair.",
      "confession": "London Baptist Confession 1689",
      "chapter": "18.4",
      "proofs": "Canticles 5:2, 3, 6; Psalms 51:8, 12, 14; Psalms 116:11; Psalms 77:7, 8; Psalms 31:22; Psalms 30:7; 1 John 3:9; Luke 22:32; Psalms 42:5, 11; Lamentations 3:26-31",
      "tags": [
        "London Baptist Confession 1689",
        "Assurance",
        "False Assurance",
        "Darkness"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14b",
    "subtopicName": "Moral Law Perpetuity",
    "sectionId": "confessional",
    "entry": {
      "title": "God Gave Adam a Law unto Life",
      "text": "God gave to Adam a law of universal obedience written in his heart, and a particular precept of not eating the fruit of the tree of knowledge of good and evil; by which he bound him and all his posterity to personal, entire, exact, and perpetual obedience; promised life upon the fulfilling, and threatened death upon the breach of it, and endued him with power and ability to keep it.",
      "confession": "London Baptist Confession 1689",
      "chapter": "19.1",
      "proofs": "Genesis 1:27; Ecclesiastes 7:29; Romans 10:5; Galatians 3:10, 12",
      "tags": [
        "London Baptist Confession 1689",
        "Law of God",
        "Moral Law Perpetuity",
        "Adam"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14b",
    "subtopicName": "Ten Commandments",
    "sectionId": "confessional",
    "entry": {
      "title": "The Moral Law Was Summarized in the Ten Commandments",
      "text": "The same law that was first written in the heart of man continued to be a perfect rule of righteousness after the fall, and was delivered by God upon Mount Sinai, in ten commandments, and written in two tables, the four first containing our duty towards God, and the other six, our duty to man.",
      "confession": "London Baptist Confession 1689",
      "chapter": "19.2",
      "proofs": "Romans 2:14, 15; Deuteronomy 10:4",
      "tags": [
        "London Baptist Confession 1689",
        "Law of God",
        "Ten Commandments",
        "Moral Law"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14b",
    "subtopicName": "Threefold Division of Law",
    "sectionId": "confessional",
    "entry": {
      "title": "Ceremonial Laws Prefigured Christ and Are Now Abrogated",
      "text": "Besides this law, commonly called moral, God was pleased to give to the people of Israel ceremonial laws, containing several typical ordinances, partly of worship, prefiguring Christ, his graces, actions, sufferings, and benefits; and partly holding forth divers instructions of moral duties, all which ceremonial laws being appointed only to the time of reformation, are, by Jesus Christ the true Messiah and only law-giver, who was furnished with power from the Father for that end abrogated and taken away.",
      "confession": "London Baptist Confession 1689",
      "chapter": "19.3",
      "proofs": "Hebrews 10:1; Colossians 2:17; 1 Corinthians 5:7; Colossians 2:14, 16, 17; Ephesians 2:14, 16",
      "tags": [
        "London Baptist Confession 1689",
        "Law of God",
        "Threefold Division of Law",
        "Ceremonial Law"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14a",
    "subtopicName": "General Equity of Mosaic Law",
    "sectionId": "confessional",
    "entry": {
      "title": "Judicial Laws Expired except for Their General Equity",
      "text": "To them also he gave sundry judicial laws, which expired together with the state of that people, not obliging any now by virtue of that institution; their general equity only being of moral use.",
      "confession": "London Baptist Confession 1689",
      "chapter": "19.4",
      "proofs": "1 Corinthians 9:8-10",
      "tags": [
        "London Baptist Confession 1689",
        "Law of God",
        "General Equity of Mosaic Law",
        "Judicial Law"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14b",
    "subtopicName": "Moral Law Perpetuity",
    "sectionId": "confessional",
    "entry": {
      "title": "The Moral Law Forever Binds All Men",
      "text": "The moral law doth for ever bind all, as well justified persons as others, to the obedience thereof, and that not only in regard of the matter contained in it, but also in respect of the authority of God the Creator, who gave it; neither doth Christ in the Gospel any way dissolve, but much strengthen this obligation.",
      "confession": "London Baptist Confession 1689",
      "chapter": "19.5",
      "proofs": "Romans 13:8-10; James 2:8, 10-12; James 2:10, 11; Matthew 5:17-19; Romans 3:31",
      "tags": [
        "London Baptist Confession 1689",
        "Law of God",
        "Moral Law Perpetuity",
        "Perpetual Rule"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14c",
    "subtopicName": "Normative / Guide Use",
    "sectionId": "confessional",
    "entry": {
      "title": "The Law Serves Believers as a Rule of Life",
      "text": "Although true believers be not under the law as a covenant of works, to be thereby justified or condemned, yet it is of great use to them as well as to others, in that as a rule of life, informing them of the will of God and their duty, it directs and binds them to walk accordingly; discovering also the sinful pollutions of their natures, hearts, and lives, so as examining themselves thereby, they may come to further conviction of, humiliation for, and hatred against, sin; together with a clearer sight of the need they have of Christ and the perfection of his obedience; it is likewise of use to the regenerate to restrain their corruptions, in that it forbids sin; and the threatenings of it serve to shew what even their sins deserve, and what afflictions in this life they may expect for them, although freed from the curse and unallayed rigour thereof. The promises of it likewise shew them God's approbation of obedience, and what blessings they may expect upon the performance thereof, though not as due to them by the law as a covenant of works; so as man's doing good and refraining from evil, because the law encourageth to the one and deterreth from the other, is no evidence of his being under the law and not under grace.",
      "confession": "London Baptist Confession 1689",
      "chapter": "19.6",
      "proofs": "Romans 6:14; Galatians 2:16; Romans 8:1; Romans 10:4; Romans 3:20; Romans 7:7, etc; Romans 6:12-14; 1 Peter 3:8-13",
      "tags": [
        "London Baptist Confession 1689",
        "Law of God",
        "Normative / Guide Use",
        "Uses of the Law"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14c",
    "subtopicName": "Normative / Guide Use",
    "sectionId": "confessional",
    "entry": {
      "title": "The Gospel Strengthens Obedience to the Law",
      "text": "Neither are the aforementioned uses of the law contrary to the grace of the Gospel, but do sweetly comply with it, the Spirit of Christ subduing and enabling the will of man to do that freely and cheerfully which the will of God, revealed in the law, requireth to be done.",
      "confession": "London Baptist Confession 1689",
      "chapter": "19.7",
      "proofs": "Galatians 3:21; Ezekiel 36:27",
      "tags": [
        "London Baptist Confession 1689",
        "Law of God",
        "Normative / Guide Use",
        "Law and Gospel",
        "Holy Spirit"
      ]
    }
  },
  {
    "locusId": "l8",
    "topicId": "t8c",
    "subtopicName": "One Covenant of Grace",
    "sectionId": "confessional",
    "entry": {
      "title": "The Covenant of Grace Was Administered Differently under the Law",
      "text": "The covenant of works being broken by sin, and made unprofitable unto life, God was pleased to give forth the promise of Christ, the seed of the woman, as the means of calling the elect, and begetting in them faith and repentance; in this promise the gospel, as to the substance of it, was revealed, and [is] therein effectual for the conversion and salvation of sinners.",
      "confession": "London Baptist Confession 1689",
      "chapter": "20.1",
      "proofs": "Genesis 3:15; Revelation 13:8",
      "tags": [
        "London Baptist Confession 1689",
        "Gospel",
        "One Covenant of Grace",
        "Covenant of Grace"
      ]

  {
    "locusId": "l10",
    "topicId": "t10c",
    "subtopicName": "Internal vs External Call",
    "sectionId": "confessional",
    "entry": {
      "title": "The Gospel Freely Reveals Christ to Sinners",
      "text": "This promise of Christ, and salvation by him, is revealed only by the Word of God; neither do the works of creation or providence, with the light of nature, make discovery of Christ, or of grace by him, so much as in a general or obscure way; much less that men destitute of the revelation of Him by the promise or gospel, should be enabled thereby to attain saving faith or repentance.",
      "confession": "London Baptist Confession 1689",
      "chapter": "20.2",
      "proofs": "Romans 1:17; Romans 10:14,15,17; Proverbs 29:18; Isaiah 25:7; Isaiah 60:2, 3",
      "tags": [
        "London Baptist Confession 1689",

        "Internal vs External Call",

      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10c",
    "subtopicName": "Internal vs External Call",
    "sectionId": "confessional",
    "entry": {
      "title": "The Gospel Is Revealed Only by God\u2019s Good Pleasure",
      "text": "The revelation of the gospel unto sinners, made in divers times and by sundry parts, with the addition of promises and precepts for the obedience required therein, as to the nations and persons to whom it is granted, is merely of the sovereign will and good pleasure of God; not being annexed by virtue of any promise to the due improvement of men's natural abilities, by virtue of common light received without it, which none ever did make, or can do so; and therefore in all ages, the preaching of the gospel has been granted unto persons and nations, as to the extent or straitening of it, in great variety, according to the counsel of the will of God.",
      "confession": "London Baptist Confession 1689",
      "chapter": "20.3",
      "proofs": "Psalms 147:20; Acts 16:7; Romans 1:18-32",
      "tags": [
        "London Baptist Confession 1689",
        "Gospel",
        "Internal vs External Call",
        "Special Revelation"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10c",
    "subtopicName": "Monergism in Calling",
    "sectionId": "confessional",
    "entry": {
      "title": "The Gospel\u2019s Saving Power Rests in the Spirit\u2019s Work",
      "text": "Although the gospel be the only outward means of revealing Christ and saving grace, and is, as such, abundantly sufficient thereunto; yet that men who are dead in trespasses may be born again, quickened or regenerated, there is moreover necessary an effectual insuperable work of the Holy Spirit upon the whole soul, for the producing in them a new spiritual life; without which no other means will effect their conversion unto God.",
      "confession": "London Baptist Confession 1689",
      "chapter": "20.4",
      "proofs": "Psalms 110:3; 1 Corinthians 2:14; Ephesians 1:19, 20; John 6:44; 2 Corinthians 4:4, 6",
      "tags": [
        "London Baptist Confession 1689",
        "Gospel",
        "Monergism in Calling",
        "Free Grace"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14d",
    "subtopicName": "Christian Liberty",
    "sectionId": "confessional",
    "entry": {
      "title": "Christian Liberty Frees Believers to Serve God without Fear",
      "text": "The liberty which Christ hath purchased for believers under the gospel, consists in their freedom from the guilt of sin, the condemning wrath of God, the rigour and curse of the law, and in their being delivered from this present evil world, bondage to Satan, and dominion of sin, from the evil of afflictions, the fear and sting of death, the victory of the grave, and ever- lasting damnation: as also in their free access to God, and their yielding obedience unto Him, not out of slavish fear, but a child-like love and willing mind. All which were common also to believers under the law for the substance of them; but under the New Testament the liberty of Christians is further enlarged, in their freedom from the yoke of a ceremonial law, to which the Jewish church was subjected, and in greater boldness of access to the throne of grace, and in fuller communications of the free Spirit of God, than believers under the law did ordinarily partake of.",
      "confession": "London Baptist Confession 1689",
      "chapter": "21.1",
      "proofs": "Galatians 3:13; Galatians 1:4; Acts 26:18; Romans 8:3; Romans 8:28; 1 Corinthians 15:54-57; 2 Thessalonians 1:10; Romans 8:15; Luke 1:73-75; 1 John 4:18; Galatians 3:9, 14; John 7:38, 39; Hebrews 10:19-21",
      "tags": [
        "London Baptist Confession 1689",
        "Christian Liberty",
        "Conscience"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14d",
    "subtopicName": "Conscience",
    "sectionId": "confessional",
    "entry": {
      "title": "God Alone Is Lord of the Conscience",
      "text": "God alone is Lord of the conscience, and hath left it free from the doctrines and commandments of men which are in any thing contrary to his word, or not contained in it. So that to believe such doctrines, or obey such commands out of conscience, is to betray true liberty of conscience; and the requiring of an implicit faith, an absolute and blind obedience, is to destroy liberty of conscience and reason also.",
      "confession": "London Baptist Confession 1689",
      "chapter": "21.2",
      "proofs": "James 4:12; Romans 14:4; Acts 4:19, 29; 1 Corinthians 7:23; Matthew 15:9; Colossians 2:20, 22, 23; 1 Corinthians 3:5; 2 Corinthians 1:24",
      "tags": [
        "London Baptist Confession 1689",
        "Christian Liberty",
        "Conscience",
        "Lord of the Conscience"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14d",
    "subtopicName": "Conscience",
    "sectionId": "confessional",
    "entry": {
      "title": "Christian Liberty Must Never Be Used for Sin",
      "text": "They who upon pretence of Christian liberty do practice any sin, or cherish any sinful lust, as they do thereby pervert the main design of the grace of the gospel to their own destruction, so they wholly destroy the end of Christian liberty, which is, that being delivered out of the hands of all our enemies, we might serve the Lord without fear, in holiness and righeousness before Him, all the days of our lives.",
      "confession": "London Baptist Confession 1689",
      "chapter": "21.3",
      "proofs": "Romans 6:1, 2; Galatians 5:13; 2 Peter 2:18, 21",
      "tags": [
        "London Baptist Confession 1689",
        "Christian Liberty",
        "Conscience",
        "Holiness"
      ]
    }
  },
  {
    "locusId": "l11",
    "topicId": "t11d",
    "subtopicName": "Regulative Principle of Worship",
    "sectionId": "confessional",
    "entry": {
      "title": "God Alone Determines How He Is to Be Worshiped",
      "text": "The light of nature shews that there is a God, who hath lordship and sovereignty over all; is just, good and doth good unto all; and is therefore to be feared, loved, praised, called upon, trusted in, and served, with all the heart and all the soul, and with all the might. But the acceptable way of worshipping the true God, is instituted by himself, and so limited by his own revealed will, that he may not be worshipped according to the imagination and devices of men, nor the suggestions of Satan, under any visible representations, or any other way not prescribed in the Holy Scriptures.",
      "confession": "London Baptist Confession 1689",
      "chapter": "22.1",
      "proofs": "Jeremiah 10:7; Mark 12:33; Deuteronomy 12:32; Exodus 20:4-6",
      "tags": [
        "London Baptist Confession 1689",
        "Worship",
        "Regulative Principle of Worship",
        "Natural Revelation"
      ]
    }
  },
  {
    "locusId": "l11",
    "topicId": "t11d",
    "subtopicName": "Elements of Worship",
    "sectionId": "confessional",
    "entry": {
      "title": "Worship Is to Be Given to the Triune God Alone",
      "text": "Religious worship is to be given to God the Father, Son, and Holy Spirit, and to him alone; not to angels, saints, or any other creatures; and since the fall, not without a mediator, nor in the mediation of any other but Christ alone.",
      "confession": "London Baptist Confession 1689",
      "chapter": "22.2",
      "proofs": "Matthew 4:9, 10; John 6:23; Matthew 28:19; Romans 1:25; Colossians 2:18; Revelation 19:10; John 14:6; 1 Timothy 2:5",
      "tags": [

        "Trinity"
      ]
    }
  },
  {
    "locusId": "l11",
    "topicId": "t11d",
    "subtopicName": "Elements of Worship",
    "sectionId": "confessional",
    "entry": {
      "title": "Prayer Must Be Made in Christ by the Spirit",
      "text": "Prayer, with thanksgiving, being one part of natural worship, is by God required of all men. But that it may be accepted, it is to be made in the name of the Son, by the help of the Spirit, according to his will; with understanding, reverence, humility, fervency, faith, love, and perseverance; and when with others, in a known tongue.",
      "confession": "London Baptist Confession 1689",
      "chapter": "22.3",
      "proofs": "Psalms 95:1-7; Psalms 65:2; John 14:13, 14; Romans 8:26; 1 John 5:14; 1 Corinthians 14:16, 17",
      "tags": [

    "subtopicName": "Elements of Worship",
    "sectionId": "confessional",
    "entry": {
      "title": "Prayer Is to Be Made for Lawful Matters and Persons",
      "text": "Prayer is to be made for things lawful, and for all sorts of men living, or that shall live hereafter; but not for the dead, nor for those of whom it may be known that they have sinned the sin unto death.",

  {
    "locusId": "l11",
    "topicId": "t11d",
    "subtopicName": "Elements of Worship",
    "sectionId": "confessional",
    "entry": {
      "title": "The Ordinary Elements of Worship Are Appointed by God",
      "text": "The reading of the Scriptures, preaching, and hearing the Word of God, teaching and admonishing one another in psalms, hymns, and spiritual songs, singing with grace in our hearts to the Lord; as also the administration of baptism, and the Lord's supper, are all parts of religious worship of God, to be performed in obedience to him, with understanding, faith, reverence, and godly fear; moreover, solemn humiliation, with fastings, and thanksgivings, upon special occasions, ought to be used in an holy and religious manner.",
      "confession": "London Baptist Confession 1689",
      "chapter": "22.5",
      "proofs": "1 Timothy 4:13; 2 Timothy 4:2; Luke 8:18; Colossians 3:16; Ephesians 5:19; Matthew 28:19, 20; 1 Corinthians 11:26; Esther 4:16; Joel 2:12; Exodus 15:1-19, Psalms 107",
      "tags": [

  },
  {
    "locusId": "l11",
    "topicId": "t11d",
    "subtopicName": "Circumstances",
    "sectionId": "confessional",
    "entry": {
      "title": "God Is to Be Worshiped on Special Occasions Everywhere",
      "text": "Neither prayer nor any other part of religious worship, is now under the gospel, tied unto, or made more acceptable by any place in which it is performed, or towards which it is directed; but God is to be worshipped everywhere in spirit and in truth; as in private families daily, and in secret each one by himself; so more solemnly in the public assemblies, which are not carelessly nor wilfully to be neglected or forsaken, when God by his word or providence calleth thereunto.",
      "confession": "London Baptist Confession 1689",
      "chapter": "22.6",
      "proofs": "John 4:21; Malachi 1:11; 1 Timothy 2:8; Acts 10:2; Matthew 6:11; Psalms 55:17; Matthew 6:6; Hebrews 10:25; Acts 2:42",

  {
    "locusId": "l11",
    "topicId": "t11d",
    "subtopicName": "Lord's Day",
    "sectionId": "confessional",
    "entry": {
      "title": "God Has Appointed One Day in Seven as a Sabbath",
      "text": "As it is the law of nature, that in general a proportion of time, by God's appointment, be set apart for the worship of God, so by his Word, in a positive moral, and perpetual commandment, binding all men, in all ages, he hath particularly appointed one day in seven for a sabbath to be kept holy unto him, which from the beginning of the world to the resurrection of Christ was the last day of the week, and from the resurrection of Christ was changed into the first day of the week, which is called the Lord's day: and is to be continued to the end of the world as the Christian Sabbath, the observation of the last day of the week being abolished.",
      "confession": "London Baptist Confession 1689",
      "chapter": "22.7",
      "proofs": "Exodus 20:8; 1 Corinthians 16:1, 2; Acts 20:7; Revelation 1:10",
      "tags": [
        "London Baptist Confession 1689",
        "Worship",
        "Lord's Day",
        "Sabbath"
      ]
    }
  },
  {

    "subtopicName": "Lord's Day",
    "sectionId": "confessional",
    "entry": {
      "title": "The Lord\u2019s Day Is to Be Kept Holy unto the Lord",
      "text": "The sabbath is then kept holy unto the Lord, when men, after a due preparing of their hearts, and ordering their common affairs aforehand, do not only observe an holy rest all day, from their own works, words and thoughts, about their worldly employment and recreations, but are also taken up the whole time in the public and private exercises of his worship, and in the duties of necessity and mercy.",
      "confession": "London Baptist Confession 1689",
      "chapter": "22.8",
      "proofs": "Isaiah 58:13; Nehemiah 13:15-22; Matthew 12:1-13",
      "tags": [
        "London Baptist Confession 1689",

        "Sabbath",
        "Holy Rest"
      ]
    }
  },
  {

    "entry": {
      "title": "Lawful Oaths Are Part of Religious Worship",
      "text": "A lawful oath is a part of religious worship, wherein the person swearing in truth, righteousness, and judgement, solemnly calleth God to witness what he sweareth, and to judge him according to the truth or falseness thereof.",
      "confession": "London Baptist Confession 1689",
      "chapter": "23.1",
      "proofs": "Exodus 20:7; Deuteronomy 10:20; Jeremiah 4:2; 2 Chronicles 6:22, 23",
      "tags": [

      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14d",
    "subtopicName": "Conscience",
    "sectionId": "confessional",
    "entry": {
      "title": "God\u2019s Name Must Be Used Reverently in Oaths",
      "text": "The name of God only is that by which men ought to swear; and therein it is to be used, with all holy fear and reverence; therefore to swear vainly or rashly by that glorious and dreadful name, or to swear at all by any other thing, is sinful, and to be abhorred; yet as in matter of weight and moment, for confirmation of truth, and ending all strife, an oath is warranted by the word of God; so a lawful oath being imposed by lawful authority in such matters, ought to be taken.",
      "confession": "London Baptist Confession 1689",
      "chapter": "23.2",
      "proofs": "Matthew 5:34, 37; James 5:12; Hebrews 6:16; 2 Corinthians 1:23; Nehemiah 13:25",
      "tags": [
        "London Baptist Confession 1689",
        "Oaths and Vows",
        "Conscience",
        "Oaths",
        "Name of God"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14d",
    "subtopicName": "Conscience",
    "sectionId": "confessional",
    "entry": {
      "title": "Lawful Oaths Bind the Conscience to Truth and Justice",
      "text": "Whosoever taketh an oath warranted by the Word of God, ought duly to consider the weightiness of so solemn an act, and therein to avouch nothing but what he knoweth to be truth; for that by rash, false, and vain oaths, the Lord is provoked, and for them this land mourns.",
      "confession": "London Baptist Confession 1689",
      "chapter": "23.3",
      "proofs": "Leviticus 19:12; Jeremiah 23:10",
      "tags": [
        "London Baptist Confession 1689",
        "Oaths and Vows",
        "Conscience",
        "Oaths",
        "Truthfulness"
      ]
    }
  },

    "sectionId": "confessional",
    "entry": {
      "title": "Vows Must Be Made to God Alone",

      "chapter": "23.4",

    "topicId": "t14d",
    "subtopicName": "Conscience",
    "sectionId": "confessional",
    "entry": {
      "title": "Monastic Vows and Popish Celibacy Are Unlawful Snares",
      "text": "A vow, which is not to be made to any creature, but to God alone, is to be made and performed with all religious care and faithfulness; but popish monastical vows of perpetual single life, professed poverty, and regular obedience, are so far from being degrees of higher perfection, that they are superstitious and sinful snares, in which no Christian may entangle himself.",
      "confession": "London Baptist Confession 1689",
      "chapter": "23.5",
      "proofs": "Psalms 76:11; Genesis 28:20-22; 1 Corinthians 7:2, 9; Ephesians 4:28; Matthew 19:11",
      "tags": [

      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14d",
    "subtopicName": "Vocation & Calling",
    "sectionId": "confessional",
    "entry": {
      "title": "The Civil Magistrate Is Ordained by God",
      "text": "God, the supreme Lord and King of all the world, hath ordained civil magistrates to be under him, over the people, for his own glory and the public good; and to this end hath armed them with the power of the sword, for defence and encouragement of them that do good, and for the punishment of evil doers.",
      "confession": "London Baptist Confession 1689",
      "chapter": "24.1",
      "proofs": "Romans 13:1-4",
      "tags": [
        "London Baptist Confession 1689",
        "Civil Magistrate",
        "Vocation & Calling",
        "State"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14d",
    "subtopicName": "Vocation & Calling",
    "sectionId": "confessional",
    "entry": {
      "title": "Christians May Lawfully Bear the Sword in a Just Cause",
      "text": "It is lawful for Christians to accept and execute the office of a magistrate when called there unto; in the management whereof, as they ought especially to maintain justice and peace, according to the wholesome laws of each kingdom and commonwealth, so for that end they may lawfully now, under the New Testament wage war upon just and necessary occasions.",
      "confession": "London Baptist Confession 1689",
      "chapter": "24.2",
      "proofs": "2 Samuel 23:3; Psalms 82:3, 4; Luke 3:14",
      "tags": [
        "London Baptist Confession 1689",
        "Civil Magistrate",
        "Vocation & Calling",
        "War"
      ]
    }
  },
  {
    "locusId": "l14",
    "topicId": "t14d",
    "subtopicName": "Vocation & Calling",
    "sectionId": "confessional",
    "entry": {
      "title": "Christians Must Submit to Lawful Authority",
      "text": "Civil magistrates being set up by God for the ends aforesaid; subjection, in all lawful things commanded by them, ought to be yielded by us in the Lord, not only for wrath, but for conscience sake; and we ought to make supplications and prayers for kings and all that are in authority, that under them we may live a quiet and peaceable life, in all godliness and honesty.",
      "confession": "London Baptist Confession 1689",
      "chapter": "24.3",
      "proofs": "Romans 13:5-7; 1 Peter 2:17; 1 Timothy 2:1, 2",
      "tags": [
        "London Baptist Confession 1689",
        "Civil Magistrate",
        "Vocation & Calling",
        "Submission"
      ]
    }
  },
  {

      "title": "Marriage Is between One Man and One Woman",

      "title": "Marriage Serves Mutual Help and the Increase of Mankind",

      "chapter": "25.2",
      "proofs": "Genesis 2:18; Genesis 1:28; 1 Corinthians 7:2, 9",

  {

    "topicId": "t14d",
    "subtopicName": "Vocation & Calling",
    "sectionId": "confessional",
    "entry": {
      "title": "Lawful Marriage Must Be Entered Wisely and in the Lord",
      "text": "It is lawful for all sorts of people to marry, who are able with judgment to give their consent; yet it is the duty of Christians to marry in the Lord; and therefore such as profess the true religion, should not marry with infidels, or idolaters; neither should such as are godly, be unequally yoked, by marrying with such as are wicked in their life, or maintain damnable heresy.",
      "confession": "London Baptist Confession 1689",
      "chapter": "25.3",
      "proofs": "Hebrews 13:4; 1 Timothy 4:3; 1 Corinthians 7:39; Nehemiah 13:25-27",
      "tags": [
        "London Baptist Confession 1689",
        "Marriage",
        "Vocation & Calling",
        "Lawful Marriage"
      ]
    }
  },
  {

    "entry": {
      "title": "Marriage within Forbidden Degrees Is Unlawful",
      "text": "Marriage ought not to be within the degrees of consanguinity or affinity, forbidden in the Word; nor can such incestuous marriages ever be made lawful, by any law of man or consent of parties, so as those persons may live together as man and wife.",

      "text": "The purest churches under heaven are subject to mixture and error; and some have so degenerated as to become no churches of Christ, but synagogues of Satan; nevertheless Christ always hath had, and ever shall have a kingdom in this world, to the end thereof, of such as believe in him, and make profession of his name.",
      "confession": "London Baptist Confession 1689",
      "chapter": "26.3",
      "proofs": "1 Corinthians 5; Revelation 2; Revelation 3; Revelation 18:2; 2 Thessalonians 2:11, 12; Matthew 16:18; Psalms 72:17; Psalm 102:28; Revelation 12:17",
      "tags": [

  {
    "locusId": "l15",
    "topicId": "t15a",
    "subtopicName": "Papacy & Infallibility",
    "sectionId": "confessional",
    "entry": {
      "title": "Christ Alone Is Head of the Church, Not the Pope",
      "text": "The Lord Jesus Christ is the Head of the church, in whom, by the appointment of the Father, all power for the calling, institution, order or government of the church, is invested in a supreme and sovereign manner; neither can the Pope of Rome in any sense be head thereof, but is that antichrist, that man of sin, and son of perdition, that exalteth himself in the church against Christ, and all that is called God; whom the Lord shall destroy with the brightness of his coming.",
      "confession": "London Baptist Confession 1689",
      "chapter": "26.4",
      "proofs": "Colossians 1:18; Matthew 28:18-20; Ephesians 4:11, 12; 2 Thessalonians 2:2-9",
      "tags": [
        "London Baptist Confession 1689",
        "Church",

        "Antichrist",
        "Papacy"
      ]
    }
  },
  {
    "locusId": "l11",
    "topicId": "t11a",
    "subtopicName": "Church as Covenant Community",
    "sectionId": "confessional",
    "entry": {
      "title": "Particular Churches Are Ordered by Christ\u2019s Mind",
      "text": "In the execution of this power wherewith he is so intrusted, the Lord Jesus calleth out of the world unto himself, through the ministry of his word, by his Spirit, those that are given unto him by his Father, that they may walk before him in all the ways of obedience, which he prescribeth to them in his word. Those thus called, he commandeth to walk together in particular societies, or churches, for their mutual edification, and the due performance of that public worship, which he requireth of them in the world.",
      "confession": "London Baptist Confession 1689",
      "chapter": "26.5",
      "proofs": "John 10:16; John 12:32; Matthew 28:20; Matthew 18:15-20",
      "tags": [
        "London Baptist Confession 1689",
        "Church",
        "Church as Covenant Community",
        "Particular Churches"
      ]
    }
  },
  {
    "locusId": "l11",
    "topicId": "t11a",
    "subtopicName": "Church as Covenant Community",
    "sectionId": "confessional",
    "entry": {
      "title": "Church Members Are Bound to Walk in Christ\u2019s Ordinances",
      "text": "The members of these churches are saints by calling, visibly manifesting and evidencing (in and by their profession and walking) their obedience unto that call of Christ; and do willingly consent to walk together, according to the appointment of Christ; giving up themselves to the Lord, and one to another, by the will of God, in professed subjection to the ordinances of the Gospel.",
      "confession": "London Baptist Confession 1689",
      "chapter": "26.6",
      "proofs": "Romans. 1:7; 1 Corinthians 1:2; Acts 2:41, 42; Acts 5:13, 14; 2 Corinthians 9:13",
      "tags": [
        "London Baptist Confession 1689",
        "Church",
        "Church as Covenant Community",
        "Church Membership",
        "Ordinances"
      ]
    }
  },
  {
    "locusId": "l11",
    "topicId": "t11b",
    "subtopicName": "Teaching & Ruling Elders",
    "sectionId": "confessional",
    "entry": {
      "title": "Christ Gives Churches Elders and Deacons",
      "text": "To each of these churches thus gathered, according to his mind declared in his word, he hath given all that power and authority, which is in any way needful for their carrying on that order in worship and discipline, which he hath instituted for them to observe; with commands and rules for the due and right exerting, and executing of that power.",
      "confession": "London Baptist Confession 1689",
      "chapter": "26.7",
      "proofs": "Matthew 18:17, 18; 1 Corinthians 5:4, 5; 1 Corinthians 5:13; 2 Corinthians 2:6-8",
      "tags": [
        "London Baptist Confession 1689",
        "Church",
        "Teaching & Ruling Elders",
        "Church Officers",
        "Elders and Deacons"
      ]
    }
  },
  {
    "locusId": "l11",
    "topicId": "t11e",
    "subtopicName": "Keys of the Kingdom",
    "sectionId": "confessional",
    "entry": {
      "title": "Christ Gives Churches Authority for Worship and Discipline",
      "text": "A particular church, gathered and completely organized according to the mind of Christ, consists of officers and members; and the officers appointed by Christ to be chosen and set apart by the church (so called and gathered), for the peculiar administration of ordinances, and execution of power or duty, which he intrusts them with, or calls them to, to be continued to the end of the world, are bishops or elders, and deacons.",
      "confession": "London Baptist Confession 1689",
      "chapter": "26.8",
      "proofs": "Acts 20:17, 28; Philippians 1:1",
      "tags": [
        "London Baptist Confession 1689",
        "Church",
        "Keys of the Kingdom",
        "Church Discipline",
        "Worship"
      ]
    }
  },
  {
    "locusId": "l11",
    "topicId": "t11b",
    "subtopicName": "Congregationalism",
    "sectionId": "confessional",
    "entry": {
      "title": "The Calling of Ministers Belongs to the Church",
      "text": "The way appointed by Christ for the calling of any person, fitted and gifted by the Holy Spirit, unto the office of bishop or elder in a church, is, that he be chosen thereunto by the common suffrage of the church itself; and solemnly set apart by fasting and prayer, with imposition of hands of the eldership of the church, if there be any before constituted therein; and of a deacon that he be chosen by the like suffrage, and set apart by prayer, and the like imposition of hands.",
      "confession": "London Baptist Confession 1689",
      "chapter": "26.9",
      "proofs": "Acts 14:23; 1 Timothy 4:14; Acts 6:3, 5, 6",
      "tags": [
        "London Baptist Confession 1689",

        "Calling"
      ]
    }
  },
  {
    "locusId": "l11",
    "topicId": "t11a",
    "subtopicName": "Church as Covenant Community",
    "sectionId": "confessional",
    "entry": {
      "title": "All Saints Have Communion with Christ and One Another",
      "text": "All saints that are united to Jesus Christ, their head, by his Spirit, and faith, although they are not made thereby one person with him, have fellowship in his graces, sufferings, death, resurrection, and glory; and, being united to one another in love, they have communion in each others gifts and graces, and are obliged to the performance of such duties, public and private, in an orderly way, as do conduce to their mutual good, both in the inward and outward man.",
      "confession": "London Baptist Confession 1689",
      "chapter": "27.1",
      "proofs": "1 John 1:3; John 1:16; Philippians 3:10; Romans 6:5, 6; Ephesians 4:15, 16; 1 Corinthians 12:7; 1 Corinthians 3:21- 23; 1 Thessalonians 5:11, 14; Romans 1:12; 1 John 3:17, 18; Galatians 6:10",
      "tags": [
        "London Baptist Confession 1689",
        "Communion of Saints",
        "Church as Covenant Community",
        "Union with Christ"
      ]
    }
  },
  {
    "locusId": "l11",
    "topicId": "t11a",
    "subtopicName": "Church as Covenant Community",
    "sectionId": "confessional",
    "entry": {
      "title": "Saints Must Maintain Fellowship in Worship and Mercy",
      "text": "Saints by profession are bound to maintain an holy fellowship and communion in the worship of God, and in performing such other spiritual services as tend to their mutual edification; as also in relieving each other in outward things according to their several abilities, and necessities; which communion, according to the rule of the gospel, though especially to be exercised by them, in the relation wherein they stand, whether in families, or churches, yet, as God offereth opportunity, is to be extended to all the household of faith, even all those who in every place call upon the name of the Lord Jesus; nevertheless their communion one with another as saints, doth not take away or infringe the title or propriety which each man hath in his goods and possessions.",
      "confession": "London Baptist Confession 1689",
      "chapter": "27.2",
      "proofs": "Hebrews 10:24, 25; Hebrews 3:12, 13; Acts 11:29, 30; Ephesians 6:4; 1 Corinthians 12:14-27; Acts 5:4; Ephesians 4:28",
      "tags": [
        "London Baptist Confession 1689",
        "Communion of Saints",
        "Church as Covenant Community",
        "Fellowship"
      ]
    }
  },

    "entry": {
      "title": "Baptism Signifies Union with Christ and Newness of Life",
      "text": "Baptism is an ordinance of the New Testament, ordained by Jesus Christ, to be unto the party baptized, a sign of his fellowship with him, in his death and resurrection; of his being engrafted into him; of remission of sins; and of giving up into God, through Jesus Christ, to live and walk in newness of life.",

      "chapter": "29.1",
      "proofs": "Romans 6:3-5; Colossians 2; 12; Galatians 3:27; Mark 1:4; Acts 22:16; Romans 6:4",

      ]
    }
  },

    "topicId": "t12c",
    "subtopicName": "Reformed / Calvinist View",
    "sectionId": "confessional",
    "entry": {
      "title": "The Supper Was Instituted for Remembrance and Spiritual Nourishment",
      "text": "The supper of the Lord Jesus was instituted by him the same night wherein he was betrayed, to be observed in his churches, unto the end of the world, for the perpetual remembrance, and shewing forth the sacrifice of himself in his death, confirmation of the faith of believers in all the benefits thereof, their spiritual nourishment, and growth in him, their further engagement in, and to all duties which they owe to him; and to be a bond and pledge of their communion with him, and with each other.",
      "confession": "London Baptist Confession 1689",
      "chapter": "30.1",
      "proofs": "1 Corinthians 11:23-26; 1 Corinthians 10:16, 17,21",
      "tags": [
        "London Baptist Confession 1689",

        "Spiritual Nourishment"
      ]
    }
  },
  {
    "locusId": "l12",
    "topicId": "t12c",
    "subtopicName": "Roman Catholic Transubstantiation",
    "sectionId": "confessional",
    "entry": {
      "title": "The Supper Is Not a Sacrifice Offered for the Living and Dead",
      "text": "In this ordinance Christ is not offered up to his Father, nor any real sacrifice made at all for remission of sin of the quick or dead, but only a memorial of that one offering up of himself by himself upon the cross, once for all; and a spiritual oblation of all possible praise unto God for the same. So that the popish sacrifice of the mass, as they call it, is most abominable, injurious to Christ's own sacrifice the alone propitiation for all the sins of the elect.",
      "confession": "London Baptist Confession 1689",
      "chapter": "30.2",
      "proofs": "Hebrews 9:25, 26, 28; 1 Corinthians 11:24; Matthew 26:26, 27",
      "tags": [
        "London Baptist Confession 1689",
        "Lord's Supper",
        "Roman Catholic Transubstantiation",
        "Mass as Sacrifice"
      ]
    }
  },
  {

    "topicId": "t12c",
    "subtopicName": "Reformed / Calvinist View",
    "sectionId": "confessional",
    "entry": {
      "title": "The Supper Is for Communicants, Not Private or Papal Use",
      "text": "The Lord Jesus hath, in this ordinance, appointed his ministers to pray, and bless the elements of bread and wine, and thereby to set them apart from a common to a holy use, and to take and break the bread; to take the cup, and, they communicating also themselves, to give both to the communicants.",
      "confession": "London Baptist Confession 1689",
      "chapter": "30.3",
      "proofs": "1 Corinthians 11:23-26, etc.",
      "tags": [
        "London Baptist Confession 1689",
        "Lord's Supper",
        "Reformed / Calvinist View",
        "Institution"
      ]
    }
  },
  {
    "locusId": "l12",
    "topicId": "t12c",
    "subtopicName": "Reformed / Calvinist View",
    "sectionId": "confessional",
    "entry": {
      "title": "Denial of the Cup to the People Is Contrary to Christ\u2019s Institution",
      "text": "The denial of the cup to the people, worshipping the elements, the lifting them up, or carrying them about for adoration, and reserving them for any pretended religious use, are all contrary to the nature of this ordinance, and to the institution of Christ.",
      "confession": "London Baptist Confession 1689",
      "chapter": "30.4",
      "proofs": "Matthew 26:26-28; Matthew 15:9; Exodus 20:4, 5",
      "tags": [
        "London Baptist Confession 1689",

        "Elements"
      ]
    }
  },
  {
    "locusId": "l12",
    "topicId": "t12c",
    "subtopicName": "Roman Catholic Transubstantiation",
    "sectionId": "confessional",
    "entry": {
      "title": "The Elements Remain Bread and Wine, Not Christ\u2019s Body and Blood",
      "text": "The outward elements in this ordinance, duly set apart to the use ordained by Christ, have such relation to him crucified, as that truly, although in terms used figuratively, they are sometimes called by the names of the things they represent, to wit, the body and blood of Christ, albeit, in substance and nature, they still remain truly and only bread and wine, as they were before.",
      "confession": "London Baptist Confession 1689",
      "chapter": "30.5",
      "proofs": "1 Corinthians 11:27; 1 Corinthians 11:26-28",
      "tags": [
        "London Baptist Confession 1689",
        "Lord's Supper",
        "Roman Catholic Transubstantiation",
        "Transubstantiation"
      ]
    }
  },
  {
    "locusId": "l12",
    "topicId": "t12c",
    "subtopicName": "Roman Catholic Transubstantiation",
    "sectionId": "confessional",
    "entry": {
      "title": "Transubstantiation Overthrows Scripture and Reason",
      "text": "That doctrine which maintains a change of the substance of bread and wine, into the substance of Christ's body and blood, commonly called transubstantiation, by consecration of a priest, or by any other way, is repugnant not to Scripture alone, but even to common sense and reason, overthroweth the nature of the ordinance, and hath been, and is, the cause of manifold superstitions, yea, of gross idolatries.",
      "confession": "London Baptist Confession 1689",
      "chapter": "30.6",
      "proofs": "Acts 3:21; Luke 14:6, 39; 1 Corinthians 11:24, 25",
      "tags": [
        "London Baptist Confession 1689",
        "Lord's Supper",
        "Roman Catholic Transubstantiation",
        "Adoration of Elements"
      ]
    }
  },
  {
    "locusId": "l12",
    "topicId": "t12c",
    "subtopicName": "Reformed / Calvinist View",
    "sectionId": "confessional",
    "entry": {
      "title": "Worthy Communicants Spiritually Feed on Christ by Faith",
      "text": "Worthy receivers, outwardly partaking of the visible elements in this ordinance, do then also inwardly by faith, really and indeed, yet not carnally and corporally, but spiritually receive, and feed upon Christ crucified, and all the benefits of his death; the body and blood of Christ being then not corporally or carnally, but spiritually present to the faith of believers in that ordinance, as the elements themselves are to their outward senses.",
      "confession": "London Baptist Confession 1689",
      "chapter": "30.7",
      "proofs": "1 Corinthians 10:16; 1 Corinthians 11:23-26",
      "tags": [
        "London Baptist Confession 1689",
        "Lord's Supper",
        "Reformed / Calvinist View",
        "Spiritual Feeding"
      ]
    }
  },
  {
    "locusId": "l12",
    "topicId": "t12c",
    "subtopicName": "Frequency & Fencing",
    "sectionId": "confessional",
    "entry": {
      "title": "The Ignorant and Ungodly Must Not Receive the Supper",
      "text": "All ignorant and ungodly persons, as they are unfit to enjoy communion with Christ, so are they unworthy of the Lord's table, and cannot, without great sin against him, while they remain such, partake of these holy mysteries, or be admitted thereunto; yea, whosoever shall receive unworthily, are guilty of the body and blood of the Lord, eating and drinking judgment to themselves.",
      "confession": "London Baptist Confession 1689",
      "chapter": "30.8",
      "proofs": "2 Corinthians 6:14, 15; 1 Corinthians 11:29; Matthew 7:6",
      "tags": [
        "London Baptist Confession 1689",
        "Lord's Supper",
        "Frequency & Fencing",
        "Fencing the Table"
      ]
    }
  },
  {
    "locusId": "l13",
    "topicId": "t13a",
    "subtopicName": "Intermediate State",
    "sectionId": "confessional",
    "entry": {
      "title": "The Souls of the Righteous and Wicked Enter Their Fixed Estate at Death",
      "text": "The bodies of men after death return to dust, and see corruption; but their souls, which neither die nor sleep, having an immortal subsistence, immediately return to God who gave them. The souls of the righteous being then made perfect in holiness, are received into paradise, where they are with Christ, and behold the face of God in light and glory, waiting for the full redemption of their bodies; and the souls of the wicked are cast into hell; where they remain in torment and utter darkness, reserved to the judgment of the great day; besides these two places, for souls separated from their bodies, the Scripture acknowledgeth none.",
      "confession": "London Baptist Confession 1689",
      "chapter": "31.1",
      "proofs": "Genesis 3:19; Acts 13:36; Ecclesiastes 12:7; Luke 23:43; 2 Corinthians 5:1, 6,8; Philippians 1:23; Hebrews 12:23; Jude 6, 7; 1 Peter 3:19; Luke 16:23, 24",
      "tags": [
        "London Baptist Confession 1689",
        "State after Death",
        "Intermediate State",
        "Death",
        "Souls after Death"
      ]
    }
  },

    "subtopicName": "Resurrection of the Body",

      "title": "The Saints Alive at Christ\u2019s Coming Will Be Changed",
      "text": "At the last day, such of the saints as are found alive, shall not sleep, but be changed; and all the dead shall be raised up with the selfsame bodies, and none other; although with different qualities, which shall be united again to their souls forever.",

      "proofs": "1 Corinthians 15:51, 52; 1 Thessalonians 4:17; Job 19:26, 27; 1 Corinthians 15:42, 43",

        "Resurrection of the Body",

      ]
    }
  },

    "subtopicName": "General Resurrection",
    "sectionId": "confessional",

      "title": "The Just and Unjust Will Be Raised by Christ\u2019s Power",
      "text": "The bodies of the unjust shall, by the power of Christ, be raised to dishonour; the bodies of the just, by his Spirit, unto honour, and be made conformable to his own glorious body.",
      "confession": "London Baptist Confession 1689",
      "chapter": "31.3",
      "proofs": "Acts 24:15; John 5:28, 29; Philippians 3:21",

      ]

  },
  {
    "locusId": "l13",
    "topicId": "t13c",
    "subtopicName": "Final Judgment",
    "sectionId": "confessional",
    "entry": {
      "title": "God Has Appointed a Day of Final Judgment",
      "text": "God hath appointed a day wherein he will judge the world in righteousness, by Jesus Christ; to whom all power and judgment is given of the Father; in which day, not only the apostate angels shall be judged, but likewise all persons that have lived upon the earth shall appear before the tribunal of Christ, to give an account of their thoughts, words, and deeds, and to receive according to what they have done in the body, whether good or evil.",
      "confession": "London Baptist Confession 1689",
      "chapter": "32.1",
      "proofs": "Acts 17:31; John 5:22, 27; 1 Corinthians 6:3; Jude 6; 2 Corinthians 5:10; Ecclesiastes 12:14; Matthew 12:36; Romans 14:10, 12; Matthew 25:32-46",
      "tags": [
        "London Baptist Confession 1689",
        "Last Judgment",
        "Final Judgment",
        "Christ the Judge"
      ]
    }
  },
  {
    "locusId": "l13",
    "topicId": "t13d",
    "subtopicName": "Hell & Eternal Punishment",
    "sectionId": "confessional",
    "entry": {
      "title": "The Last Judgment Will Manifest God\u2019s Justice and Mercy",
      "text": "The end of God's appointing this day, is for the manifestation of the glory of his mercy, in the eternal salvation of the elect; and of his justice, in the eternal damnation of the reprobate, who are wicked and disobedient; for then shall the righteous go into everlasting life, and receive that fulness of joy and glory with everlasting rewards, in the presence of the Lord; but the wicked, who know not God, and obey not the gospel of Jesus Christ, shall be cast aside into everlasting torments, and punished with everlasting destruction, from the presence of the Lord, and from the glory of his power.",
      "confession": "London Baptist Confession 1689",
      "chapter": "32.2",
      "proofs": "Romans 9:22, 23; Matthew 25:21, 34; 2 Timothy 4:8; Matthew 25:46; Mark 9:48; 2 Thessalonians 1:7-10",
      "tags": [
        "London Baptist Confession 1689",
        "Last Judgment",
        "Hell & Eternal Punishment",

function normalizeExistingConfessionalEntries() {
  let changed = false;
  Object.keys(DB).forEach(stKey => {
    const bucket = DB[stKey];
    if (!bucket || !bucket.confessional || !Array.isArray(bucket.confessional)) return;
    bucket.confessional = bucket.confessional.map(entry => {
      const normalized = normalizeConfessionalEntryFields(entry);
      if ((entry.text || '') !== (normalized.text || '') || (entry.proofs || '') !== (normalized.proofs || '') || (entry.notes || '') !== (normalized.notes || '')) {
        changed = true;
      }
      return normalized;
    });
  });
  if (changed) saveData(DB);
}

function seedDefaultConfessionalEntries() {
  const versionKey = '5sa_confessional_seed_v5_1689full';
  if (localStorage.getItem(versionKey) === '1') return;
  let changed = false;
  DEFAULT_CONFESSIONAL_SEEDS.forEach((seed, idx) => {
    const key = subtopicKey(seed.locusId, seed.topicId, seed.subtopicName);
    const arr = getEntries(key, seed.sectionId);
    const exists = arr.some(e =>
      (e.confession || '').trim() === (seed.entry.confession || '').trim() &&
      (e.chapter || '').trim() === (seed.entry.chapter || '').trim()
    );
    if (!exists) {
      const entry = normalizeConfessionalEntryFields({
        ...seed.entry,
        id: 'seed_' + (idx + 1) + '_' + Math.random().toString(36).slice(2, 8),
        created: Date.now() + idx
      });
      arr.push(entry);
      setEntries(key, seed.sectionId, arr);
      changed = true;
    }
  });
  localStorage.setItem(versionKey, '1');
  if (changed) DB = loadData();
}

   INIT
============================================================ */

function applyConfessionalCorrections() {
  const byRef = {};
  DEFAULT_CONFESSIONAL_SEEDS.forEach(seed => {
    byRef[(seed.entry.confession + '||' + seed.entry.chapter).toLowerCase()] = seed.entry;
  });
  let changed = false;
  Object.keys(DB).forEach(stKey => {
    const bucket = DB[stKey];
    if (!bucket || !bucket.confessional || !Array.isArray(bucket.confessional)) return;
    bucket.confessional = bucket.confessional.map(entry => {
      const refKey = ((entry.confession || '') + '||' + (entry.chapter || '')).toLowerCase();
      const fresh = byRef[refKey];
      if (!fresh) return entry;
      if (!entry.id || !String(entry.id).startsWith('seed_')) return entry;
      changed = true;
      return normalizeConfessionalEntryFields({
        ...entry,
        title: fresh.title,
        text: fresh.text,
        confession: fresh.confession,
        chapter: fresh.chapter,
        proofs: fresh.proofs || '',
        tags: Array.isArray(entry.tags) && entry.tags.length ? fresh.tags : fresh.tags
      });
    });
  });
  if (changed) saveData(DB);
}



const CHROME_PREF_KEY = '5sa_chrome_minimized';

function setChromeMinimized(minimized) {
  document.body.classList.toggle('chrome-minimized', !!minimized);
  const btn = document.getElementById('chrome-toggle-btn');
  if (btn) {
    btn.textContent = minimized ? '↓' : '↑';
    btn.title = minimized ? 'Show top bars' : 'Hide top bars';
    btn.setAttribute('aria-label', minimized ? 'Show top bars' : 'Hide top bars');
  }
  try {
    localStorage.setItem(CHROME_PREF_KEY, minimized ? '1' : '0');
  } catch (e) {}
}

function toggleChromeMinimized() {
  setChromeMinimized(!document.body.classList.contains('chrome-minimized'));
}

normalizeExistingConfessionalEntries();
seedDefaultConfessionalEntries();
applyConfessionalCorrections();
renderTree();
updateStats();
showLokiHome();
setChromeMinimized(localStorage.getItem(CHROME_PREF_KEY) === '1');
</script>
