   TAG INPUT WIDGET
============================================================ */
function buildTagInputHtml(fieldId, existingTags) {
  const tagsJson = JSON.stringify(existingTags).replace(/"/g,'&quot;');
  return `<div class="form-group">
    <label class="form-label">Tags</label>
    <div class="tag-input-container" id="tic_${fieldId}">
      <div class="tag-input-wrap" id="tiw_${fieldId}" onclick="focusTagInput('${fieldId}')">
        ${existingTags.map(t => `<span class="tag-pill" data-tag="${escAttr(t)}">${escHtml(t)}<button class="tag-pill-remove" onclick="removeTag('${fieldId}','${escAttr(t)}')">×</button></span>`).join('')}
        <input class="tag-text-input" id="f_tags_${fieldId}" placeholder="Type or pick a tag…"
          oninput="showTagDropdown('${fieldId}',this.value)"
          onkeydown="tagKeyDown(event,'${fieldId}')"
          onfocus="showTagDropdown('${fieldId}',this.value)"
        >
      </div>
      <div class="tag-dropdown" id="tdd_${fieldId}" style="display:none;"></div>
    </div>
    <input type="hidden" id="f_tags" data-tags-for="${fieldId}">
  </div>`;
}

function focusTagInput(fieldId) { document.getElementById('f_tags_'+fieldId)?.focus(); }

function showTagDropdown(fieldId, query) {
  const dd = document.getElementById('tdd_'+fieldId);
  if (!dd) return;
  const existing = getTagsFromWidget(fieldId);
  const ql = query.toLowerCase();
  const allT = [...new Set([...DEFAULT_TAGS, ...allTags()])].sort();
  const filtered = allT.filter(t => !existing.includes(t) && t.toLowerCase().includes(ql));
  if (!filtered.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = filtered.map(t => `<div class="tag-dropdown-item" onmousedown="addTagFromDropdown('${fieldId}','${escAttr(t)}')">${escHtml(t)}</div>`).join('');
  dd.style.display = 'block';
}

function addTagFromDropdown(fieldId, tag) {
  addTagToWidget(fieldId, tag);
  const inp = document.getElementById('f_tags_'+fieldId);
  if (inp) inp.value = '';
  const dd = document.getElementById('tdd_'+fieldId);
  if (dd) dd.style.display = 'none';
  // re-show dropdown for next pick
  setTimeout(() => { if (inp) { inp.focus(); showTagDropdown(fieldId, ''); } }, 50);
}

function addTagToWidget(fieldId, tag) {
  tag = tag.trim();
  if (!tag) return;
  const existing = getTagsFromWidget(fieldId);
  if (existing.includes(tag)) return;
  const wrap = document.getElementById('tiw_'+fieldId);
  if (!wrap) return;
  const inp = document.getElementById('f_tags_'+fieldId);
  const pill = document.createElement('span');
  pill.className = 'tag-pill';
  pill.dataset.tag = tag;
  pill.innerHTML = `${escHtml(tag)}<button class="tag-pill-remove" onclick="removeTag('${fieldId}','${escAttr(tag)}')">×</button>`;
  wrap.insertBefore(pill, inp);
}

function removeTag(fieldId, tag) {
  const wrap = document.getElementById('tiw_'+fieldId);
  if (!wrap) return;
  const pills = wrap.querySelectorAll('.tag-pill[data-tag]');
  pills.forEach(p => { if (p.dataset.tag === tag) p.remove(); });
}

function tagKeyDown(e, fieldId) {
  const inp = document.getElementById('f_tags_'+fieldId);
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = inp.value.trim().replace(/,/g,'');
    if (val) { addTagToWidget(fieldId, val); inp.value = ''; showTagDropdown(fieldId,''); }
  } else if (e.key === 'Escape') {
    const dd = document.getElementById('tdd_'+fieldId);
    if (dd) dd.style.display = 'none';
  }
}

function getTagsFromWidget(fieldId) {
  const wrap = document.getElementById('tiw_'+fieldId);
  if (!wrap) return [];
  return [...wrap.querySelectorAll('.tag-pill[data-tag]')].map(p => p.dataset.tag);
}

// Hide dropdowns when clicking outside
document.addEventListener('click', e => {
  document.querySelectorAll('.tag-dropdown').forEach(dd => {
    if (!dd.closest('.tag-input-container')?.contains(e.target)) dd.style.display = 'none';
  });
});

/* ============================================================
   GATHER FORM DATA
============================================================ */
function gatherFormData(secId) {
  const get = id => { const el = document.getElementById('f_'+id); return el ? el.value.trim() : ''; };
  // Tags can come from widget or legacy text input
  let tags = [];
  const tagWidgetWrap = document.querySelector('.tag-input-wrap');
  if (tagWidgetWrap) {
    // find the fieldId from the wrap's id: "tiw_tags"
    const fieldId = tagWidgetWrap.id.replace('tiw_','');
    tags = getTagsFromWidget(fieldId);
  } else {
    tags = get('tags').split(',').map(t=>t.trim()).filter(Boolean);
  }
  const base = { title: get('title'), tags };
  if (secId === 'quotations')   return {...base, quote: get('quote'), author: get('author'), source: get('source'), page: get('page'), notes: get('notes') };
  if (secId === 'confessional') return {...base, text: get('text'), confession: get('confession'), chapter: get('chapter'), proofs: get('proofs'), notes: get('notes') };
  if (secId === 'books')        return {...base, author: get('author'), link: get('link'), notes: get('notes') };
  if (secId === 'websites')     return {...base, url: get('url'), description: get('description') };
  if (secId === 'scripture')    return {...base, reference: get('reference'), verseText: get('verseText'), verseType: get('verseType'), notes: get('notes') };
  if (secId === 'arguments')    return {...base, position: get('position'), claim: get('claim'), supportingScripture: get('supportingScripture'), objections: get('objections'), responses: get('responses') };
  if (secId === 'notes')        return {...base, content: get('content') };
  if (secId === 'media')        return {...base, fileRef: get('fileRef'), description: get('description'), fileDataURL: window._pendingFileDataURL||'', fileName: window._pendingFileName||'' };
  return base;
}

function hasDuplicateTitle(subtopicKey, sectionId, title, ignoreId) {
  const norm = String(title || '').trim().toLowerCase();
  if (!norm) return false;
  return getEntries(subtopicKey, sectionId).some(e =>
    e.id !== ignoreId && String(e.title || '').trim().toLowerCase() === norm
  );
}
function confirmDuplicateIfNeeded(subtopicKey, sectionId, data, ignoreId) {
  if (!data?.title) return true;
  if (!hasDuplicateTitle(subtopicKey, sectionId, data.title, ignoreId)) return true;
  return confirm('An entry with this title already exists in this section for this subtopic. Save it anyway?');
}

function openAddModal(secId) {

function openEditModal(secId, entryId, stKey) {
  const key = stKey || currentSubtopicKey;
  const entries = getEntries(key, secId);
  const entry = entries.find(e => e.id === entryId);
  if (!entry) return;
  const sec = SECTIONS.find(s => s.id === secId);
  modalState = { mode:'edit', subtopicKey: key, sectionId: secId, entryId };
  // Pre-load file state for media entries
  window._pendingFileDataURL = entry.fileDataURL || '';
  window._pendingFileName = entry.fileName || '';
  document.getElementById('modal-title').textContent = `Edit ${sec.name}`;
  document.getElementById('modal-body').innerHTML = buildFormHtml(secId, entry);
  document.getElementById('modal-overlay').classList.add('open');
  focusFirstModalInput();
}

function saveModalEntry() {
  if (!modalState) return;

  if (modalState.mode === 'addNode') { saveAddNode(); return; }

  if (modalState.mode === 'quickAdd') {
    if (!addDestLocusId || !addDestTopicId || !addDestStName) {
      // Open the picker for the user to choose
      document.getElementById('qa-dest-picker')?.classList.add('open');
      document.getElementById('qa-dest-search-input')?.focus();
      return;
    }
    const secId = document.getElementById('qa_section')?.value;
    if (!secId) return;
    const key = subtopicKey(addDestLocusId, addDestTopicId, addDestStName);
    const data = gatherFormData(secId);
    if (!confirmDuplicateIfNeeded(key, secId, data)) return;
    addEntry(key, secId, data);
    saveRecentDest(addDestLocusId, addDestTopicId, addDestStName);
    closeModal();
    updateStats();
    if (currentSubtopicKey === key) renderSubtopicView();
    if (currentTab === 'tags') _buildTagView();
    if (currentTab === 'resource') _buildResourceView();
    return;
  }

  const data = gatherFormData(modalState.sectionId);
  if (!confirmDuplicateIfNeeded(modalState.subtopicKey, modalState.sectionId, data, modalState.entryId)) return;
  if (modalState.mode === 'add') {
    addEntry(modalState.subtopicKey, modalState.sectionId, data);
  } else {
    updateEntry(modalState.subtopicKey, modalState.sectionId, modalState.entryId, data);
  }
  closeModal();
  updateStats();
  if (currentSubtopicKey === modalState.subtopicKey) renderSubtopicView();
  if (currentTab === 'tags') _buildTagView();
  if (currentTab === 'resource') _buildResourceView();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalState = null;
  window._pendingFileDataURL = '';
  window._pendingFileName = '';
}
function closeModalOnOverlay(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

/* ============================================================
   GLOBAL SEARCH
============================================================ */
let searchTimeout;
function handleGlobalSearch(q) {
  clearTimeout(searchTimeout);
  if (!q.trim()) { if (currentSubtopicKey) showSubtopicView(); else showWelcome(); return; }
  searchTimeout = setTimeout(() => performSearch(q.trim()), 250);
}

function performSearch(q) {
  hideAllViews();
  const ql = q.toLowerCase();
  const results = [];
  allEntries().forEach(({stKey, secId, entry}) => {
    const text = JSON.stringify(entry).toLowerCase();
    if (text.includes(ql)) {
      const parts = stKey.split('__');
      const locus = getFullTree().find(l => l.id === parts[0]);
      const topic  = locus?.topics.find(t => t.id === parts[1]);
      const stName = parts[2]?.replace(/_/g,' ');
      results.push({ stKey, secId, entry, locusName: locus?.name||parts[0], topicName: topic?.name||parts[1], stName });
    }
  });
  const sec = document.getElementById('search-results');
  sec.style.display = 'block';
  if (!results.length) {
    sec.innerHTML = `<h2>Search: "${escHtml(q)}"</h2><div class="empty-state">No results found.</div>`;

  }
  sec.innerHTML = `<h2>Search: "${escHtml(q)}" &nbsp;<span style="color:var(--text3);font-size:13px;">${results.length} result${results.length!==1?'s':''}</span></h2>` +
    results.map(r => {
      const snippet = JSON.stringify(r.entry).replace(/["{}\[\]]/g,' ').substring(0,120);
      return `<div class="search-result-item" onclick="goToEntry('${escAttr(r.stKey)}','${escAttr(r.locusName)}','${escAttr(r.topicName)}')">
        <div class="sr-path">${escHtml(r.locusName)} › ${escHtml(r.topicName)} › ${escHtml(r.stName||'')} › ${escHtml(r.secId)}</div>
        <div class="sr-title">${escHtml(r.entry.title||'(untitled)')}</div>
        <div class="sr-snippet">${escHtml(snippet)}…</div>
      </div>`;
    }).join('');
  document.getElementById('breadcrumb').innerHTML = `<span class="bc-item current">Search: ${escHtml(q)}</span>`;
}

function goToEntry(stKey, locusName, topicName) {
  const parts = stKey.split('__');
  // Derive stName from the key itself — avoids apostrophe corruption that
  // occurs when stName is passed through escAttr() in an onclick attribute.
  const stName = (parts[2] || '').replace(/_/g, ' ');
  selectSubtopic(parts[0], parts[1], stName, locusName, topicName);
}

function renderCompare() {
  const lv = document.getElementById('cmp-left').value;
  const rv = document.getElementById('cmp-right').value;
  const parse = v => { const [key,ln,tn,st] = v.split('|'); return {key,ln,tn,st}; };

  const col = (side) => `<div class="compare-col">
    <div class="compare-col-header">${escHtml(side.ln)} › ${escHtml(side.st)}</div>
    ${SECTIONS.map(s => {
      const entries = getEntries(side.key, s.id);
      return `<div class="section-block" style="margin-bottom:10px;">

}

============================================================ */
function exportData() {
  const payload = {
    version: 2,
    exportedAt: new Date().toISOString(),
    db: DB,
    tree: TREE
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `5-solas-archive-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);

      if (imported && typeof imported === 'object' && imported.db) {
        DB = imported.db || {};
        TREE = Array.isArray(imported.tree) && imported.tree.length ? imported.tree : cloneDefaultTree();
      } else {
        // legacy DB-only import
        DB = {...DB, ...imported};
      }

      saveData(DB);
      saveTreeSnapshot();
      renderTree();

      if (currentTab === 'tags') renderTagView();
      else if (currentTab === 'resource') renderResourceView();
      else if (currentSubtopicKey) renderSubtopicView();
      else showLokiHome();
setChromeMinimized(localStorage.getItem(CHROME_PREF_KEY) === '1');

      updateStats();
      alert('Import successful!');
    } catch(err) { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

/* ============================================================
   UTILITIES
============================================================ */
function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escHtmlWithBreaks(s) { return escHtml(s).replace(/\n/g, '<br>'); }
function normalizeInlineSpacing(s) {
  return String(s || '')
    .replace(/\u00a0/g, ' ')
    .replace(/[ \t]+/g, ' ')
    .replace(/\s+([,.;:!?])/g, '$1')
    .replace(/\(\s+/g, '(')
    .replace(/\s+\)/g, ')')
    .trim();
}
function normalizeWrappedParagraphText(s) {
  if (!s) return '';
  const raw = String(s).replace(/\r\n?/g, '\n').replace(/\u00a0/g, ' ');
  const paragraphs = raw
    .split(/\n\s*\n+/)
    .map(p => p.split(/\n+/).map(line => line.trim()).filter(Boolean).join(' '))
    .map(normalizeInlineSpacing)
    .filter(Boolean);
  return paragraphs.join('\n\n');
}
function normalizeProofText(s) {
  return normalizeWrappedParagraphText(s).replace(/\n{2,}/g, '\n');
}
function splitProofRefs(s) {
  const normalized = normalizeProofText(s);
  if (!normalized) return [];
  return normalized
    .split(/\s*;\s*|\n+/)
    .map(part => normalizeInlineSpacing(part))
    .filter(Boolean);
}
function buildProofLookupUrl(ref) {
  return 'https://www.biblegateway.com/passage/?search=' + encodeURIComponent(ref);
}
function renderProofLinksHtml(proofs) {
  const refs = splitProofRefs(proofs);
  if (!refs.length) return '';
  const chips = refs.map(ref => `<a class="proof-link-chip" href="${buildProofLookupUrl(ref)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escHtml(ref)}</a>`).join('');
  return `<div class="confessional-proofs"><span class="proof-links-label">Scripture proofs</span><div class="proof-links-wrap">${chips}</div><span class="proof-links-help">Tap a reference to open the verse.</span></div>`;
}
function textToParagraphHtml(s) {
  const normalized = normalizeWrappedParagraphText(s);
  if (!normalized) return '';
  // Split on one or more newlines — normalizeWrappedParagraphText already
  // collapses soft-wrapped lines into spaces, so any remaining \n marks a
  // genuine paragraph boundary (including seed data that uses single \n).
  return normalized.split(/\n+/).map(p => `<p>${escHtml(p)}</p>`).join('');
}
function normalizeConfessionalEntryFields(entry) {
  if (!entry || typeof entry !== 'object') return entry;
  return {
    ...entry,
    text: normalizeWrappedParagraphText(entry.text || ''),
    proofs: normalizeProofText(entry.proofs || ''),
    notes: normalizeWrappedParagraphText(entry.notes || '')
  };
}
function escAttr(s) { if (!s) return ''; return String(s).replace(/`/g,'\\`').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function timeAgo(ts) {
  const diff = Date.now() - ts;
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 30) return days + ' days ago';
  const months = Math.floor(days / 30);
  if (months === 1) return '1 month ago';
  if (months < 12) return months + ' months ago';
  return Math.floor(months / 12) + ' year' + (Math.floor(months/12) > 1 ? 's' : '') + ' ago';
}

/* ============================================================
   PULL-TO-REFRESH (mobile)
============================================================ */
(function() {
  var startY = 0, currentDist = 0, active = false;
  var threshold = 70;

  function ca()   { return document.getElementById('content-area'); }
  function ind()  { return document.getElementById('ptr-indicator'); }
  function icon() { return document.getElementById('ptr-icon'); }
  function txt()  { return document.getElementById('ptr-text'); }

  document.addEventListener('touchstart', function(e) {
    var el = ca();
    if (el && el.scrollTop === 0 && el.contains(e.target)) {
      startY = e.touches[0].clientY;
      active = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!active) return;
    var el = ca();
    if (!el || el.scrollTop > 0) { active = false; return; }
    var dist = e.touches[0].clientY - startY;
    if (dist <= 0) return;
    e.preventDefault();
    currentDist = dist;
    var h = Math.min(dist * 0.6, 56);
    ind().style.height = h + 'px';
    var ready = dist >= threshold;
    icon().style.transform = ready ? 'rotate(180deg)' : 'rotate(0deg)';
    txt().textContent = ready ? 'Release to refresh' : 'Pull to refresh';
  }, { passive: false });

  document.addEventListener('touchend', function() {
    if (!active) return;
    active = false;
    var wasReady = currentDist >= threshold;
    currentDist = 0;
    ind().style.height = '0';
    icon().style.transform = 'rotate(0deg)';
    txt().textContent = 'Pull to refresh';
    if (wasReady) window.location.reload();
  }, { passive: true });
})();

    "entry": {

      "text": "Those whom God effectually calls, He also freely justifies; not by infusing righteousness into them, but by pardoning their sins, and by accounting and accepting their persons as righteous; not for any thing wrought in them, or done by them, but for Christ's sake alone; nor by imputing faith itself, the act of believing, or any other evangelical obedience to them, as their righteousness; but by imputing the obedience and satisfaction of Christ unto them; they receiving and resting on Him and His righteousness by faith; which faith they have not of themselves, it is the gift of God.",

      "title": "Believers neither totally nor finally fall away",
      "text": "Thus it is not in consequence of their own merits or strength, but of\nGod's free mercy, that they neither totally fall from faith and grace nor\ncontinue and perish finally in their backslidings; which, with respect to\nthemselves is not only possible, but would undoubtedly happen; but\nwith respect to God, it is utterly impossible, since His counsel cannot\nbe changed nor His promise fail; neither can the call according to His\npurpose be revoked, nor the merit, intercession, and preservation of\nChrist be rendered ineffectual, nor the sealing of the Holy Spirit be\nfrustrated or obliterated.",

      "text": "That I, with body and soul, both in life and in death, am not my\nown, but belong to my faithful Savior Jesus Christ, who with His\nprecious blood has fully satisfied for all my sins, and redeemed\nme from all the power of the devil; and so preserves me that\nwithout the will of my Father in heaven not a hair can fall from my\nhead; indeed, that all things must work together for my salvation.\nWherefore, by His Holy Spirit, He also assures me of eternal life,\nand makes me heartily willing and ready from now on to live unto\nHim.",

  {
    "locusId": "l11",
    "topicId": "t11a",
    "subtopicName": "Visible & Invisible Church",
    "sectionId": "confessional",
    "entry": {
      "title": "One catholic or universal church",
      "text": "We believe and profess one catholic or universal Church, which is a holy\ncongregation of true Christian believers, all expecting their salvation in\nJesus Christ, being washed by His blood, sanctified and sealed by the\nHoly Spirit.\nThis Church has been from the beginning of the world, and will be to\nthe end thereof; which is evident from this that Christ is an eternal King,\nwhich without subjects He cannot be. And this holy Church is preserved\nor supported by God against the rage of the whole world; though it\nsometimes for a while appears very small, and in the eyes of men to\nbe reduced to nothing; as during the perilous reign of Ahab the Lord\nreserved unto Him seven thousand men who had not bowed their knees\nto Baal.\nFurthermore, this holy Church is not confined, bound, or limited to a\ncertain place or to certain persons, but is spread and dispersed over the\nwhole world; and yet is joined and united with heart and will, by the\npower of faith, in one and the same Spirit.",

      "chapter": "Article 27",

    "topicId": "t1b",
    "subtopicName": "Sufficiency",
    "sectionId": "confessional",
    "entry": {
      "title": "Sufficiency: Sola Scriptura",
      "text": "The Holy Scripture is the only sufficient, certain, and infallible rule of all saving knowledge, faith, and obedience, although the light of nature, and the works of creation and providence do so far manifest the goodness, wisdom, and power of God, as to leave men inexcusable; yet are they not sufficient to give that knowledge of God and his will which is necessary unto salvation. Therefore it pleased the Lord at sundry times and in divers manners to reveal himself, and to declare that his will unto his church; and afterward for the better preserving and propagating of the truth, and for the more sure establishment and comfort of the church against the corruption of the flesh, and the malice of Satan, and of the world, to commit the same wholly unto writing; which maketh the Holy Scriptures to be most necessary, those former ways of God's revealing his will unto his people being now ceased.",
      "confession": "London Baptist Confession 1689",

      "proofs": "2 Timothy 3:15-17; Isaiah 8:20; Luke 16:29, 31; Ephesians 2:20; Romans 1:19-21; Romans 2:14,15; Psalms 19:1- 3; Hebrews 1:1; Proverbs 22:19-21; Romans 15:4; 2 Peter 1:19,20",

    }

    "topicId": "t1b",
    "subtopicName": "Authority & Autopistia",
    "sectionId": "confessional",
    "entry": {
      "title": "The Holy Spirit Bears Witness to Scripture",
      "text": "We may be moved and induced by the testimony of the church of God to an high and reverent esteem of the Holy Scriptures; and the heavenliness of the matter, the efficacy of the doctrine, and the majesty of the style, the consent of all the parts, the scope of the whole (which is to give all glory to God), the full discovery it makes of the only way of man's salvation, and many other incomparable excellencies, and entire perfections thereof, are arguments whereby it doth abundantly evidence itself to be the Word of God; yet notwithstanding, our full persuasion and assurance of the infallible truth, and divine authority thereof, is from the inward work of the Holy Spirit bearing witness by and with the Word in our hearts.",

      "chapter": "1.5",

      "tags": [

    "subtopicName": "Sufficiency",
    "sectionId": "confessional",
    "entry": {
      "title": "Sufficiency: Whole Counsel of God",
      "text": "The whole counsel of God concerning all things necessary for his own glory, man's salvation, faith and life, is either expressly set down or necessarily contained in the Holy Scripture: unto which nothing at any time is to be added, whether by new revelation of the Spirit, or traditions of men. Nevertheless, we acknowledge the inward illumination of the Spirit of God to be necessary for the saving understanding of such things as are revealed in the Word, and that there are some circumstances concerning the worship of God, and government of the church, common to human actions and societies, which are to be ordered by the light of nature and Christian prudence, according to the general rules of the Word, which are always to be observed.",

      "proofs": "2 Timothy 3:15-17; Galatians 1:8,9; John 6:45; 1 Corinthians 2:9-12; 1 Corinthians 11:13, 14; 1 Corinthians 14:26,40",

  {
    "locusId": "l1",
    "topicId": "t1b",
    "subtopicName": "Preservation of Text",
    "sectionId": "confessional",
    "entry": {
      "title": "Scripture Must Be Preserved and Translated",
      "text": "The Old Testament in Hebrew (which was the native language of the people of God of old), and the New Testament in Greek (which at the time of the writing of it was most generally known to the nations), being immediately inspired by God, and by his singular care and providence kept pure in all ages, are therefore authentic; so as in all controversies of religion, the church is finally to appeal to them. But because these original tongues are not known to all the people of God, who have a right unto, and interest in the Scriptures, and are commanded in the fear of God to read and search them, therefore they are to be translated into the vulgar language of every nation unto which they come, that the Word of God dwelling plentifully in all, they may worship him in an acceptable manner, and through patience and comfort of the Scriptures may have hope.",
      "confession": "London Baptist Confession 1689",
      "chapter": "1.8",
      "proofs": "Romans 3:2; Isaiah 8:20; Acts 15:15; John 5:39; 1 Corinthians 14:6, 9, 11, 12, 24, 28; Colossians 3:16",
      "tags": [

      ]
    }
  },

  {
    "locusId": "l2",
    "topicId": "t2c",
    "subtopicName": "Independence",
    "sectionId": "confessional",
    "entry": {
      "title": "God Is All-Sufficient and Sovereign over All",
      "text": "God, having all life, glory, goodness, blessedness, in and of himself, is alone in and unto himself all- sufficient, not standing in need of any creature which he hath made, nor deriving any glory from them, but only manifesting his own glory in, by, unto, and upon them; he is the alone fountain of all being, of whom, through whom, and to whom are all things, and he hath most sovereign dominion over all creatures, to do by them, for them, or upon them, whatsoever himself pleaseth; in his sight all things are open and manifest, his knowledge is infinite, infallible, and independent upon the creature, so as nothing is to him contingent or uncertain; he is most holy in all his counsels, in all his works, and in all his commands; to him is due from angels and men, whatsoever worship, service, or obedience, as creatures they owe unto the Creator, and whatever he is further pleased to require of them.",

      "title": "One God in Three Divine Subsistences",
      "text": "In this divine and infinite Being there are three subsistences, the Father, the Word or Son, and Holy Spirit, of one substance, power, and eternity, each having the whole divine essence, yet the essence undivided: the Father is of none, neither begotten nor proceeding; the Son is eternally begotten of the Father; the Holy Spirit proceeding from the Father and the Son; all infinite, without beginning, therefore but one God, who is not to be divided in nature and being, but distinguished by several peculiar relative properties and personal relations; which doctrine of the Trinity is the foundation of all our communion with God, and comfortable dependence on him.",

    "entry": {
      "title": "Election Is of Free Grace Alone",
      "text": "Those of mankind that are predestinated to life, God, before the foundation of the world was laid, according to his eternal and immutable purpose, and the secret counsel and good pleasure of his will, hath chosen in Christ unto everlasting glory, out of his mere free grace and love, without any other thing in the creature as a condition or cause moving him thereunto.",
      "confession": "London Baptist Confession 1689",
      "chapter": "3.5",
      "proofs": "Ephesians 1:4, 9, 11; Romans 8:30; 2 Timothy 1:9; 1 Thessalonians 5:9; Romans 9:13, 16; Ephesians 2:5, 12",
      "tags": [
        "London Baptist Confession 1689",
        "Decree",
        "Unconditional Election",
        "Election",
        "Grace"
      ]
    }
  },

    "sectionId": "confessional",
    "entry": {
      "title": "God Ordains Both the Elect and Their Means",
      "text": "As God hath appointed the elect unto glory, so he hath, by the eternal and most free purpose of his will, foreordained all the means thereunto; wherefore they who are elected, being fallen in Adam, are redeemed by Christ, are effectually called unto faith in Christ, by his Spirit working in due season, are justified, adopted, sanctified, and kept by his power through faith unto salvation; neither are any other redeemed by Christ, or effectually called, justified, adopted, sanctified, and saved, but the elect only.",
      "confession": "London Baptist Confession 1689",
      "chapter": "3.6",
      "proofs": "1 Peter 1:2; 2 Thessalonians 2:13; 1 Thessalonians 5:9, 10; Romans 8:30; 2 Thessalonians 2:13; 1 Peter 1:5; John 10:26; John 17:9; John 6:64",

    "subtopicName": "Unconditional Election",
    "sectionId": "confessional",
    "entry": {
      "title": "Predestination Must Be Handled with Care",
      "text": "The doctrine of the high mystery of predestination is to be handled with special prudence and care, that men attending the will of God revealed in his Word, and yielding obedience thereunto, may, from the certainty of their effectual vocation, be assured of their eternal election; so shall this doctrine afford matter of praise, reverence, and admiration of God, and of humility, diligence, and abundant consolation to all that sincerely obey the gospel.",
      "confession": "London Baptist Confession 1689",
      "chapter": "3.7",
      "proofs": "1 Thessalonians 1:4, 5; 2 Peter 1:10; Ephesians 1:6; Romans 11:33; Romans 11:5, 6, 20; Luke 10:20",
      "tags": [

      ]
    }

    "entry": {
      "title": "The Triune God Created All Things in Six Days",
      "text": "In the beginning it pleased God the Father, Son, and Holy Spirit, for the manifestation of the glory of his eternal power, wisdom, and goodness, to create or make the world, and all things therein, whether visible or invisible, in the space of six days, and all very good.",

  {

    "subtopicName": "Image of God",
    "sectionId": "confessional",
    "entry": {
      "title": "Man Was Created in God\u2019s Image",
      "text": "After God had made all other creatures, he created man, male and female, with reasonable and immortal souls, rendering them fit unto that life to God for which they were created; being made after the image of God, in knowledge, righteousness, and true holiness; having the law of God written in their hearts, and power to fulfil it, and yet under a possibility of transgressing, being left to the liberty of their own will, which was subject to change.",
      "confession": "London Baptist Confession 1689",
      "chapter": "4.2",

      "tags": [

    }

    "sectionId": "confessional",
    "entry": {
      "title": "Adam Was Given a Probationary Command",

  {

    "topicId": "t6a",
    "subtopicName": "Government",
    "sectionId": "confessional",
    "entry": {
      "title": "Providence Upholds and Governs All Things",
      "text": "God the good Creator of all things, in his infinite power and wisdom doth uphold, direct, dispose, and govern all creatures and things, from the greatest even to the least, by his most wise and holy providence, to the end for the which they were created, according unto his infallible foreknowledge, and the free and immutable counsel of his own will; to the praise of the glory of his wisdom, power, justice, infinite goodness, and mercy.",
      "confession": "London Baptist Confession 1689",
      "chapter": "5.1",
      "proofs": "Hebrews 1:3; Job 38:11; Isaiah 46:10, 11; Psalms 135:6; Matthew 10:29-31; Ephesians 1:11",
      "tags": [

        "Government",

      ]
    }
  },
  {
    "locusId": "l6",
    "topicId": "t6b",
    "subtopicName": "Primary & Secondary Causation",
    "sectionId": "confessional",
    "entry": {
      "title": "Providence Works through Second Causes",
      "text": "Although in relation to the foreknowledge and decree of God, the first cause, all things come to pass immutably and infallibly; so that there is not anything befalls any by chance, or without his providence; yet by the same providence he ordereth them to fall out according to the nature of second causes, either necessarily, freely, or contingently.",
      "confession": "London Baptist Confession 1689",
      "chapter": "5.2",
      "proofs": "Acts 2:23; Proverbs 16:33; Genesis 8:22",
      "tags": [
        "London Baptist Confession 1689",

        "Second Causes"
      ]
    }
  },

    "subtopicName": "Miracles",
    "sectionId": "confessional",
    "entry": {
      "title": "God Is Free to Work with or without Means",
      "text": "God, in his ordinary providence maketh use of means, yet is free to work without, above, and against them at his pleasure.",

  {
    "locusId": "l6",
    "topicId": "t6c",
    "subtopicName": "Decree & Sin",
    "sectionId": "confessional",
    "entry": {
      "title": "Providence Extends Even to the Fall and Sinful Acts",
      "text": "The almighty power, unsearchable wisdom, and infinite goodness of God, so far manifest themselves in his providence, that his determinate counsel extendeth itself even to the first fall, and all other sinful actions both of angels and men; and that not by a bare permission, which also he most wisely and powerfully boundeth, and otherwise ordereth and governeth, in a manifold dispensation to his most holy ends; yet so, as the sinfulness of their acts proceedeth only from the creatures, and not from God, who, being most holy and righteous, neither is nor can be the author or approver of sin.",
      "confession": "London Baptist Confession 1689",
      "chapter": "5.4",
      "proofs": "Romans 11:32-34; 2 Samuel 24:1, 1 Chronicles 21:1; 2 Kings 19:28; Psalms 76; 10; Genesis 1:20; Isaiah 10:6, 7, 12; Psalms 1:21; 1 John 2:16",

        "Sin"
      ]
    }
  },
  {
    "locusId": "l6",
    "topicId": "t6b",
    "subtopicName": "Special Providence in Redemption",
    "sectionId": "confessional",
    "entry": {
      "title": "God Uses Trials to Chasten and Humble His Children",
      "text": "The most wise, righteous, and gracious God doth oftentimes leave for a season his own children to manifold temptations and the corruptions of their own hearts, to chastise them for their former sins, or to discover unto them the hidden strength of corruption and deceitfulness of their hearts, that they may be humbled; and to raise them to a more close and constant dependence for their support upon himself; and to make them more watchful against all future occasions of sin, and for other just and holy ends. So that whatsoever befalls any of his elect is by his appointment, for his glory, and their good.",
      "confession": "London Baptist Confession 1689",
      "chapter": "5.5",
      "proofs": "2 Chronicles 32:25, 26, 31; 2 Corinthians 12:7-9; Romans 8:28",
      "tags": [

      ]
    }
  },
  {
    "locusId": "l6",
    "topicId": "t6c",
    "subtopicName": "Theodicy",
    "sectionId": "confessional",
    "entry": {
      "title": "God Judicially Hardens the Wicked",
      "text": "As for those wicked and ungodly men whom God, as the righteous judge, for former sin doth blind and harden; from them he not only withholdeth his grace, whereby they might have been enlightened in their understanding, and wrought upon their hearts; but sometimes also withdraweth the gifts which they had, and exposeth them to such objects as their corruption makes occasion of sin; and withal, gives them over to their own lusts, the temptations of the world, and the power of Satan, whereby it comes to pass that they harden themselves, under those means which God useth for the softening of others.",
      "confession": "London Baptist Confession 1689",
      "chapter": "5.6",
      "proofs": "Romans 1:24-26, 28; Romans 11:7, 8; Deuteronomy 29:4; Matthew 13:12; Deuteronomy 2:30; 2 Kings 8:12, 13; Psalms 81:11, 12; 2 Thessalonians 2:10-12; Exodus 8:15, 32; Isaiah 6:9, 10; 1 Peter 2:7, 8",

        "Hardening"
      ]
    }
  },

  {

    "topicId": "t7d",
    "subtopicName": "Historical Fall",
    "sectionId": "confessional",
    "entry": {
      "title": "Adam Fell by Willful Transgression",
      "text": "Although God created man upright and perfect, and gave him a righteous law, which had been unto life had he kept it, and threatened death upon the breach thereof, yet he did not long abide in this honour; Satan using the subtlety of the serpent to subdue Eve, then by her seducing Adam, who, without any compulsion, did willfully transgress the law of their creation, and the command given unto them, in eating the forbidden fruit, which God was pleased, according to his wise and holy counsel to permit, having purposed to order it to his own glory.",
      "confession": "London Baptist Confession 1689",
      "chapter": "6.1",
      "proofs": "Genesis 2:16, 17; Genesis 3:12,13; 2 Corinthians 11:3",

    "subtopicName": "Immediate Effects",

    "entry": {
      "title": "The Fall Brought Death and Defilement",

    "subtopicName": "Imputation of Adam's Sin",
    "sectionId": "confessional",
    "entry": {
      "title": "Adam\u2019s Guilt and Corruption Pass to His Posterity",
      "text": "They being the root, and by God's appointment, standing in the room and stead of all mankind, the guilt of the sin was imputed, and corrupted nature conveyed, to all their posterity descending from them by ordinary generation, being now conceived in sin, and by nature children of wrath, the servants of sin, the subjects of death, and all other miseries, spiritual, temporal, and eternal, unless the Lord Jesus set them free.",

      "title": "Indwelling Corruption Remains in the Regenerate",
      "text": "The corruption of nature, during this life, doth remain in those that are regenerated; and although it be through Christ pardoned and mortified, yet both itself, and the first motions thereof, are truly and properly sin.",

      "title": "Life Was Attainable Only by Covenant Condescension",

    "subtopicName": "One Covenant of Grace",
    "sectionId": "confessional",
    "entry": {
      "title": "God Makes a Covenant of Grace with Sinners",
      "text": "Moreover, man having brought himself under the curse of the law by his fall, it pleased the Lord to make a covenant of grace, wherein he freely offereth unto sinners life and salvation by Jesus Christ, requiring of them faith in him, that they may be saved; and promising to give unto all those that are ordained unto eternal life, his Holy Spirit, to make them willing and able to believe.",

  {

    "topicId": "t8a",
    "subtopicName": "Pactum Salutis",
    "sectionId": "confessional",
    "entry": {
      "title": "The Covenant of Grace Was Revealed Progressively",
      "text": "This covenant is revealed in the gospel; first of all to Adam in the promise of salvation by the seed of the woman, and afterwards by farther steps, until the full discovery thereof was completed in the New Testament; and it is founded in that eternal covenant transaction that was between the Father and the Son about the redemption of the elect; and it is alone by the grace of this covenant that all the posterity of fallen Adam that ever were saved did obtain life and blessed immortality, man being now utterly incapable of acceptance with God upon those terms on which Adam stood in his state of innocency.",
      "confession": "London Baptist Confession 1689",
      "chapter": "7.3",
      "proofs": "Genesis 3:15; Hebrews 1:1; 2 Timothy 1:9; Titus 1:2; Hebrews 11; 6, 13; Romans 4:1, 2, &c.; Acts 4:12; John 8:56",
      "tags": [

      ]
    }
  },
  {
    "locusId": "l9",
    "topicId": "t9d",
    "subtopicName": "Munus Regium",
    "sectionId": "confessional",
    "entry": {
      "title": "Christ Was Eternally Ordained as Mediator",
      "text": "It pleased God, in His eternal purpose, to choose and ordain the Lord Jesus, his only begotten Son, according to the covenant made between them both, to be the mediator between God and man; the prophet, priest, and king; head and saviour of the church, the heir of all things, and judge of the world; unto whom he did from all eternity give a people to be his seed and to be by him in time redeemed, called, justified, sanctified, and glorified.",
      "confession": "London Baptist Confession 1689",
      "chapter": "8.1",
      "proofs": "Isaiah 42:1; 1 Peter 1:19, 20; Acts 3:22; Hebrews 5:5, 6; Psalms 2:6; Luke 1:33; Ephesians 1:22, 23; Hebrews 1:2; Acts 17:31; Isaiah 53:10; John 17:6; Romans 8:30",
      "tags": [
        "London Baptist Confession 1689",
        "Christ the Mediator",
        "Munus Regium",
        "Threefold Office"
      ]
    }
  },
  {
    "locusId": "l9",
    "topicId": "t9a",
    "subtopicName": "One Person Two Natures",
    "sectionId": "confessional",
    "entry": {
      "title": "Christ Is One Person in Two Distinct Natures",
      "text": "The Son of God, the second person in the Holy Trinity, being very and eternal God, the brightness of the Father's glory, of one substance and equal with him who made the world, who upholdeth and governeth all things he hath made, did, when the fullness of time was come, take upon him man's nature, with all the essential properties and common infirmities thereof, yet without sin; being conceived by the Holy Spirit in the womb of the Virgin Mary, the Holy Spirit coming down upon her: and the power of the Most High overshadowing her; and so was made of a woman of the tribe of Judah, of the seed of Abraham and David according to the Scriptures; so that two whole, perfect, and distinct natures were inseparably joined together in one person, without conversion, composition, or confusion; which person is very God and very man, yet one Christ, the only mediator between God and man.",
      "confession": "London Baptist Confession 1689",
      "chapter": "8.2",
      "proofs": "John 1:14; Galatians 4; 4; Romans 8:3; Hebrews 2:14, 16, 17; Hebrews 4:15; Matthew 1:22, 23; Luke 1:27, 31, 35; Romans 9:5; 1 Timothy 2:5",
      "tags": [
        "London Baptist Confession 1689",
        "Christ the Mediator",
        "One Person Two Natures",
        "Hypostatic Union",
        "Incarnation"
      ]
    }
  },
  {
    "locusId": "l9",
    "topicId": "t9d",
    "subtopicName": "Munus Sacerdotale",
    "sectionId": "confessional",
    "entry": {
      "title": "Christ Was Anointed and Equipped for His Office",
      "text": "The Lord Jesus, in his human nature thus united to the divine, in the person of the Son, was sanctified and anointed with the Holy Spirit above measure, having in Him all the treasures of wisdom and knowledge; in whom it pleased the Father that all fullness should dwell, to the end that being holy, harmless, undefiled, and full of grace and truth, he might be throughly furnished to execute the office of mediator and surety; which office he took not upon himself, but was thereunto called by his Father; who also put all power and judgement in his hand, and gave him commandment to execute the same.",
      "confession": "London Baptist Confession 1689",
      "chapter": "8.3",
      "proofs": "Psalms 45:7; Acts 10:38; John 3:34; Colossians 2:3; Colossians 1:19; Hebrews 7:26; John 1:14; Hebrews 7:22; Hebrews 5:5; John 5:22, 27; Matthew 28:18; Acts 2:36",
      "tags": [
        "London Baptist Confession 1689",
        "Christ the Mediator",
        "Munus Sacerdotale",
        "Mediator",
        "Anointing"
      ]
    }
  },
  {
    "locusId": "l9",
    "topicId": "t9e",
    "subtopicName": "Humiliation: Suffering & Death",
    "sectionId": "confessional",
    "entry": {
      "title": "Christ Fulfilled the Law, Suffered, Rose, and Will Return",
      "text": "This office the Lord Jesus did most willingly undertake, which that he might discharge he was made under the law, and did perfectly fulfil it, and underwent the punishment due to us, which we should have borne and suffered, being made sin and a curse for us; enduring most grievous sorrows in his soul, and most painful sufferings in his body; was crucified, and died, and remained in the state of the dead, yet saw no corruption: on the third day he arose from the dead with the same body in which he suffered, with which he also ascended into heaven, and there sitteth at the right hand of his Father making intercession, and shall return to judge men and angels at the end of the world.",
      "confession": "London Baptist Confession 1689",
      "chapter": "8.4",
      "proofs": "Psalms 40:7, 8; Hebrews 10:5-10; John 10:18; Gal 4:4; Matthew 3:15; Galatians 3:13; Isaiah 53:6; 1 Peter 3:18; 2 Corinthians 5:21; Matthew 26:37, 38; Luke 22:44; Matthew 27:46; Acts 13:37; 1 Corinthians 15:3, 4; John 20:25, 27; Mark 16:19; Acts 1:9-11; Romans 8:34; Hebrews 9:24; Acts 10:42; Romans 14:9, 10; Acts 1:11; 2 Peter 2:4",
      "tags": [
        "London Baptist Confession 1689",
        "Christ the Mediator",
        "Humiliation: Suffering & Death",
        "Humiliation",
        "Exaltation"
      ]
    }
  },

    "topicId": "t10a",
    "subtopicName": "Penal Substitution",
    "sectionId": "confessional",
    "entry": {
      "title": "Christ Fully Satisfied God\u2019s Justice for the Elect",
      "text": "The Lord Jesus, by his perfect obedience and sacrifice of himself, which he through the eternal Spirit once offered up unto God, hath fully satisfied the justice of God, procured reconciliation, and purchased an everlasting inheritance in the kingdom of heaven, for all those whom the Father hath given unto Him.",
      "confession": "London Baptist Confession 1689",
      "chapter": "8.5",
      "proofs": "Hebrews 9:14; Hebrews 10:14; Romans 3:25, 26; John 17:2; Hebrews 9:15",
      "tags": [
        "London Baptist Confession 1689",
        "Christ the Mediator",
        "Penal Substitution",
        "Atonement",
        "Satisfaction"
      ]
    }

    "entry": {
      "title": "Christ Effectually Applies Redemption to His People",
      "text": "To all those for whom Christ hath obtained eternal redemption, he doth certainly and effectually apply and communicate the same, making intercession for them; uniting them to himself by his Spirit, revealing unto them, in and by his Word, the mystery of salvation, persuading them to believe and obey, governing their hearts by his Word and Spirit, and overcoming all their enemies by his almighty power and wisdom, in such manner and ways as are most consonant to his wonderful and unsearchable dispensation; and all of free and absolute grace, without any condition foreseen in them to procure it.",

      "text": "God hath endued the will of man with that natural liberty and power of acting upon choice, that it is neither forced, nor by any necessity of nature determined to do good or evil.",

      "text": "When God converts a sinner, and translates him into the state of grace, he freeth him from his natural bondage under sin, and by his grace alone enables him freely to will and to do that which is spiritually good; yet so as that by reason of his remaining corruptions, he doth not perfectly, nor only will, that which is good, but doth also will that which is evil.",

  {
    "locusId": "l10",
    "topicId": "t10c",
    "subtopicName": "Internal vs External Call",
    "sectionId": "confessional",
    "entry": {
      "title": "God Effectually Calls the Elect by Word and Spirit",
      "text": "Those whom God hath predestinated unto life, he is pleased in his appointed, and accepted time, effectually to call, by his Word and Spirit, out of that state of sin and death in which they are by nature, to grace and salvation by Jesus Christ; enlightening their minds spiritually and savingly to understand the things of God; taking away their heart of stone, and giving unto them a heart of flesh; renewing their wills, and by his almighty power determining them to that which is good, and effectually drawing them to Jesus Christ; yet so as they come most freely, being made willing by his grace.",
      "confession": "London Baptist Confession 1689",
      "chapter": "10.1",
      "proofs": "Romans 8:30; Romans 11:7; Ephesians 1:10, 11; 2 Thessalonians 2:13, 14; Ephesians 2:1-6; Acts 26:18; Ephesians 1:17, 18; Ezekiel 36:26; Deuteronomy 30:6; Ezekiel 36:27; Ephesians 1:19; Psalm 110:3; Song of Solomon 1:4",
      "tags": [
        "London Baptist Confession 1689",
        "Effectual Calling",
        "Internal vs External Call",
        "Grace"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10d",
    "subtopicName": "Monergism in Regeneration",
    "sectionId": "confessional",
    "entry": {
      "title": "Effectual Calling Is of Free and Special Grace Alone",
      "text": "This effectual call is of God's free and special grace alone, not from anything at all foreseen in man, nor from any power or agency in the creature, being wholly passive therein, being dead in sins and trespasses, until being quickened and renewed by the Holy Spirit; he is thereby enabled to answer this call, and to embrace the grace offered and conveyed in it, and that by no less power than that which raised up Christ from the dead.",

      "chapter": "10.2",
      "proofs": "2 Timothy 1:9; Ephesians 2:8; 1 Corinthians 2:14; Ephesians 2:5; John 5:25; Ephesians 1:19, 20",

      "text": "Others not elected, although they may be called by the ministry of the Word, and may have some common operations of the Spirit, yet not being effectually drawn by the Father, they neither will nor can truly come to Christ, and therefore cannot be saved: much less can men that receive not the Christian religion be saved; be they never so diligent to frame their lives according to the light of nature and the law of that religion they do profess.",

  {
    "locusId": "l10",
    "topicId": "t10f",
    "subtopicName": "Forensic Justification",
    "sectionId": "confessional",
    "entry": {
      "title": "Justification Is by Christ\u2019s Imputed Righteousness Alone",
      "text": "Those whom God effectually calleth, he also freely justifieth, not by infusing righteousness into them, but by pardoning their sins, and by accounting and accepting their persons as righteous; not for anything wrought in them, or done by them, but for Christ's sake alone; not by imputing faith itself, the act of believing, or any other evangelical obedience to them, as their righteousness; but by imputing Christ's active obedience unto the whole law, and passive obedience in his death for their whole and sole righteousness by faith, which faith they have not of themselves; it is the gift of God.",
      "confession": "London Baptist Confession 1689",
      "chapter": "11.1",
      "proofs": "Romans 3:24; Romans 8:30; Romans 4:5-8; Ephesians 1:7; 1 Corinthians 1:30, 31; Romans 5:17-19; Philippians 3:8, 9; Ephesians 2:8-10; John 1:12; Romans 5:17",
      "tags": [
        "London Baptist Confession 1689",
        "Justification",
        "Forensic Justification",
        "Imputation"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10f",
    "subtopicName": "Faith Alone / Sola Fide",
    "sectionId": "confessional",
    "entry": {
      "title": "Faith Alone Is the Instrument of Justification",
      "text": "Faith thus receiving and resting on Christ and his righteousness, is the alone instrument of justification; yet it is not alone in the person justified, but is ever accompanied with all other saving graces, and is no dead faith, but worketh by love.",
      "confession": "London Baptist Confession 1689",
      "chapter": "11.2",
      "proofs": "Romans 3:28; Galatians 5:6; James 2:17, 22, 26",
      "tags": [

        "Faith Alone"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10f",
    "subtopicName": "Forensic Justification",
    "sectionId": "confessional",
    "entry": {
      "title": "Christ\u2019s Obedience and Death Fully Satisfy for the Justified",
      "text": "Christ, by his obedience and death, did fully discharge the debt of all those that are justified; and did, by the sacrifice of himself in the blood of his cross, undergoing in their stead the penalty due unto them, make a proper, real, and full satisfaction to God's justice in their behalf; yet, inasmuch as he was given by the Father for them, and his obedience and satisfaction accepted in their stead, and both freely, not for anything in them, their justification is only of free grace, that both the exact justice and rich grace of God might be glorified in the justification of sinners.",
      "confession": "London Baptist Confession 1689",
      "chapter": "11.3",
      "proofs": "Hebrews 10:14; 1 Peter 1:18, 19; Isaiah 53:5, 6; Romans 8:32; 2 Corinthians 5:21; Romans 3:26; Ephesians 1:6,7; Ephesians 2:7",
      "tags": [
        "London Baptist Confession 1689",
        "Justification",
        "Forensic Justification",
        "Satisfaction"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10f",
    "subtopicName": "Eternal Justification Question",
    "sectionId": "confessional",
    "entry": {
      "title": "Justification Is Decreed Eternally but Applied in Time",
      "text": "God did from all eternity decree to justify all the elect, and Christ did in the fullness of time die for their sins, and rise again for their justification; nevertheless, they are not justified personally, until the Holy Spirit doth in time due actually apply Christ unto them.",
      "confession": "London Baptist Confession 1689",
      "chapter": "11.4",
      "proofs": "Galatians 3:8; 1 Peter 1:2; 1 Timothy 2:6; Romans 4:25; Colossians 1:21,22; Titus 3:4-7",
      "tags": [
        "London Baptist Confession 1689",
        "Justification",
        "Eternal Justification Question",
        "Application"
      ]
    }
  },
  {
    "locusId": "l10",
    "topicId": "t10f",
    "subtopicName": "Forensic Justification",
    "sectionId": "confessional",
    "entry": {
      "title": "God Continues to Forgive the Sins of the Justified",
      "text": "God doth continue to forgive the sins of those that are justified, and although they can never fall from the state of justification, yet they may, by their sins, fall under God's fatherly displeasure; and in that condition they have not usually the light of his countenance restored unto them, until they humble themselves, confess their sins, beg pardon, and renew their faith and repentance.",
      "confession": "London Baptist Confession 1689",
      "chapter": "11.5",
      "proofs": "Matthew 6:12; 1 John 1:7, 9; John 10:28; Psalms 89:31-33; Psalms 32:5; Psalms 51; Matthew 26:75",
      "tags": [
        "London Baptist Confession 1689",
        "Justification",
        "Forensic Justification",
        "Pardon"
      ]
    }
  },

    "topicId": "t10f",
    "subtopicName": "Forensic Justification",
    "sectionId": "confessional",
    "entry": {
      "title": "One Justification under Both Testaments",
      "text": "The justification of believers under the Old Testament was, in all these respects, one and the same with the justification of believers under the New Testament.",
      "confession": "London Baptist Confession 1689",
      "chapter": "11.6",
      "proofs": "Galatians 3:9; Romans 4:22-24",
      "tags": [
        "London Baptist Confession 1689",
